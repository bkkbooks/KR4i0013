front:
  text: 花間集序
  hash: sha256:acf6be2fdc0c66a2ce7e2ad8d20c5c14859ea014093e1f1ad700d5fd1942c162
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_000-1a}
body:
  text: 唐歐陽烱撰鏤玉雕瓊擬化工而逈巧裁花剪葉奪春艶以爭鮮是以唱雲謡則金母詞清挹霞醴則穆王心醉名高白雪聲聲自合鶯歌響遏青雲字字偏諧鳳律楊栁大堤之句樂府相傳芙蓉曲渚之篇豪家自製莫不争門髙下三千玳瑁之簮兢冨罇前數十珊瑚之樹則有錦筳公子繡幌佳人遞葉葉之花笺文抽麗錦舉纎纎之玊指拍桉香檀不無清絶之辭用助嬌嬈之態自南朝之宫體扇北里之倡風何止言之不文所謂秀而不實有唐巳降率土之濵家家香逕春風寕㝷越艶䖏䖏紅樓夜月自鎖嫦娥在明皇朝則有李太白應制清平樂詞四首近代温飛卿復有金筌集邇来作者無媿前人今衛尉少卿字弘基以拾翠洲邉自淂羽毛之異織綃泉􅔄獨殊機杼之功廣㑹衆賔時延佳論因集近来詩客曲子詞五百首分為十二卷以烱粗預知音辱請命題仍為序引昔郢人有歌陽春者號為絶唱乃命之為花间集庶以陽春之甲将使西園英哲用資羽盖之歡南國嬋娟休唱蓮舟之引萬暦壬寅孟夏玄覧齋重梓花間集叙目温助教廷筠六十六首皇甫先軰松十一首韋相荘四十七首薛侍郎昭藴十九首牛給事嶠三十二首張舎人泌二十七首毛司徒文錫三十一首牛學士希濟十一首歐陽舎人烱十七首和學士凝三十首顧太尉夐五十五首孫少監光憲六十首魏太尉承斑十五首鹿太尉䖍扆六首閻處士選八首尹参卿鶚六首毛秘書熈震二十九首李季才洵三十七首花間集叙目花間集𥙷叙目上卷李翰林白七首張翰林志和五首元刺史結四首劉尚書禹錫十一首李慱士渉三首王司馬建六首下卷白尚書居易八首薛京兆能一首徐昌圗一首伎劉燕哥一首無名氏二首李中主景一首李後主煌二首馮學士延巳二首花間集𥙷叙目
