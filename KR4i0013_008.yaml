  text: 花間集卷八
  hash: sha256:8f5fa70860fcf615bae2548a381fd07032aa0d201671efecd9676d4103591a2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_008-1a}
body:
  text: 顧敻四十三首河傳燕揚晴景小窗屏暖鴛鴦交頸菱花掩却翠鬟欹慵整海棠簾外影繡幃香斷金􅗌鶒無消息心事空相憶倚東風春正濃愁紅淚班衣上重其二曲檻春晚碧流紋細緑楊絲軟露花鮮杏枝繁鶯囀野蕪平似剪直是人間到天上堪逰賞醉眼疑屏障對池塘惜韶光斷腸為花須盡狂其三棹舉舟去波光渺渺不知何處岸花汀草共依依雨微鷓鴣相逐飛天涯離恨江聲咽啼猿切此意向誰説艤蘭橈獨無憀魂銷小爐香欲焦甘州子一爐龍麝錦帷傍屏掩映燭熒煌禁樓刁斗喜𥘉長羅薦繡鴛鴦山枕上私語口脂香其二每逢清夜與良辰多悵望定傷神雲迷水隔意中人寂寞繡羅茵山枕上幾點淚痕新其三曾如劉阮訪仙蹤深洞客此時逢綺筵散後繡衾同欵曲見韶容山枕上長是怯晨鍾其四露桃花裡小樓深持玉盞聽瑶琴醉歸青瑣入鴛衾月色照衣襟山枕上翠鈿鎮眉心其五紅爐深夜醉調笙𫾣拍處玉纎輕小屏古畫岸低平煙月滿間庭山枕上燈背臉波橫玉樓春月照玉樓春漏促颯颯風搖庭砌竹夢驚鴛𬒳覺來時何處管絃聲斷續惆悵少年逰冶去枕上兩蛾攢細緑曉鶯簾外語花枝背帳猶殘紅蠟燭其二栁影玉樓春日晚雨細風輕煙草軟畫堂鸚鵡語雕籠金粉小屏猶半掩香滅繡幃人寂寂倚欄無語愁思逺恨郎何處縱踈狂長使含啼眉不展其三月皎露華窗影細風送菊香粘繡𬒮博山爐冷水沉微惆悵金閨終日閉懶展羅衾垂玉筯羞對菱花篸寶髻良宵好事枉教休無計那他獨耍壻其四拂水雙飛來去燕曲檻小屛山六扇春愁凝思結眉心緑綺懶調紅錦薦話别情多心欲顫玉筯恨留紅粉面鎮長獨立到黃昏却怕良宵頻夢見浣溪沙春色迷人恨正賖可堪蕩子不還家細風輕露著梨花簾外有情雙燕揚檻前無力緑楊斜小屏狂夢極天涯其二紅藕香寒翠渚平月籠虛閣夜蛩清塞鴻驚夢雨牽情寶帳玉爐殘麝冷羅衣金縷暗塵生小窗孤燭淚縱橫其三荷芰風輕簾幕香繡衣鸂鶒淥回塘小屏間掩舊瀟湘恨入空幃鸞影獨淚凝雙臉渚蓮光薄情年少悔思量其四惆悵經年别謝娘月窗花院好風光此時相望最情傷青鳥不來傅錦字瑶姬何處瑣蘭房忍教魂夢兩茫茫其五庭菊飄黃玊露濃冷沙隈砌隱鳴蛩何期良夜得相逢背帳風搖紅臘滴惹香暖夢繡衾重覺來枕上怯晨鍾其六雲淡風高葉亂飛小庭寒雨緑苔微深閨人靜掩屏幃粉黛暗愁金帶枕鴛鴦空繞畫羅衣那堪辜負不思歸其七雁響遙天玊漏清小紗窗外月朧明翠幃金鴨炷香平何處不歸音信斷良宵空使夢魂驚簟涼枕冷不勝情其八露白蟾明又到秋佳期幽會兩悠悠夢牽情役幾時休記得䛏人微斂黛無言斜倚小書樓暗思前事不勝愁酒泉子楊栁舞風輕惹春煙殘雨杏花愁鶯正語畫樓東錦屏寂寞思無窮還是不知消息鏡塵生珠淚滴損儀容其二羅帶縷金蘭麝煙凝魂斷畫屏欹雲鬢亂恨難任幾回垂淚滴鴛衾薄情何處去月臨窗花滿樹信沉沉其三小檻日斜風度緑窗人悄悄翠幃間掩舞雙鸞舊香寒别來情緒轉難判韶顔看却老依俙粉上有啼痕暗銷魂其四黛薄紅深約掠緑鬟雲膩小鴛鴦金翡翠稱人心錦鱗無處傳幽意海燕蘭堂春又去隔年書千點淚恨難任其五掩却菱花收拾翠鈿休上面金蟲玊燕瑣香奩恨厭厭雲鬟半墜懶重篸淚侵山枕濕銀燈背帳夢方酣雁飛南其六水碧風清入檻細香紅藕膩謝娘斂翠恨無涯小屏斜堪憎蕩子不還家謾留羅帶結帳深枕膩炷沉煙負當年其七黛怨紅羞掩映畫堂春欲暮殘花微雨隔青樓思悠悠芳菲時莭看將度寂寞無人還獨語畫羅濡香粉汚不勝愁楊栁枝秋夜香閨思寂寥漏迢迢鴛幃羅幌麝煙銷燭光搖正憶玉郎逰蕩去無尋處更聞簾外雨蕭蕭滳芭蕉遐方怨簾影細簟紋平象紗籠玉指縷金羅扇輕嫩紅雙臉似花明兩條眉黛逺山橫鳳簫歇鏡塵生遼塞音書絶夢魂長暗驚玉郎經歲負娉婷教人爭不恨無情獻衷心繡鴛鴦帳暖畫孔雀屏欹人悄悄月明時想昔年歡笑恨今日分離銀缸背銅漏永阻佳期小爐煙細虗閣簾垂幾多心事暗地思惟𬒳嬌娥牽役魂夢如癡金閨裡山枕上始應知應天長瑟瑟羅裙金線縷輕透鵝黃香畫袴垂交帶盤鸚鵡裊裊翠翹移玉步背人勻檀注慢轉橫波偷覷斂黛春情暗許倚屛慵不語訴裏情香滅簾垂春漏永整鴛衾羅帶重雙鳯縷黃金窗外月光臨沉沉斷腸無處尋負春心其二永夜拋人何處去絶來音香閣掩眉斂月將沉爭忍不相尋怨孤衾換我心為你心始知相憶深荷葉杯春盡小庭花落寂寞憑檻斂雙眉忍教成病憶佳期知摩知知摩知其二歌彂誰家筵上寥亮别恨正悠悠蘭缸背帳月當樓愁摩愁愁摩愁其三弱栁好花盡拆晴陌陌上少年郎滿身蘭麝撲人香狂摩狂狂摩狂其四記淂那時相見膽顫鬢亂四肢柔泥人無語不擡頭羞摩羞羞摩羞其五夜久歌聲怨咽殘月菊冷露微微看看濕透縷金衣歸摩歸歸摩歸其六我憶君詩最苦知否字字盡關心紅箋為寄表情深吟摩吟吟摩吟其七金鴨香濃鴛𬒳枕膩小髻簇花鈿腰如細栁臉如蓮憐摩憐憐摩憐其八曲砌蝶飛煙暖春半花彂抑垂條花如雙臉栁如腰嬌摩嬌嬌摩嬌其九一去又乖期信春盡滿院長莓苔手拈裙帶獨徘徊來摩來來摩來漁歌子曉風清幽沼緑倚欄凝望珍禽浴畫簾垂翠屏曲滿袖荷香馥郁好攄懷堪寓目身間心靜平生足酒杯深光影促名利無心較逐花間集卷八
