front:
  text: 花間集卷十一
  hash: sha256:7c6955a748e7f543831d70b9c158caf586bd49ed1ddbef974198221f1f158f63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_011-1a}
body:
  text: 鹿虔扆思越人翠屏欹銀燭背漏殘清夜迢迢雙帶繍窠盤錦薦淚侵花暗香銷珊瑚枕膩鴉鬟亂玉纎慵整雲散苦是適來新夢見離腸爭不千斷虞美人卷荷香淡浮煙渚緑嫩擎新雨鎖窗踈透曉風清象床珍簟泠光輕水紋平九疑黛色屏斜掩枕上眉心欽不堪相望病將成鈿昏檀粉淚縱橫不勝情閻選八首虞美人粉融紅膩蓮房綻臉動雙波慢小魚銜玉鬢叉橫石榴裙染象紗輕轉娉婷偷期錦浪荷深處一夢雲蕪雨臂留檀印齒痕香深秋不寐漏𥘉長儘思量其二椘腰蠐領團香玉鬢疊深深緑月娥星眼笑微頻栁夭桃艷不勝春晚粧勻水紋簟映青紗帳霧罩秋波上一枝嬌卧醉芙蓉良宵不得與君同恨忡忡臨江仙雨停荷芰逗濃香岸邉蟬噪垂楊物華空有舊池塘不逢仙子何處夢襄王珍簟對欹鴛枕冷此來塵暗凄涼欲憑危檻恨偏長藕花珠綴猶似汗凝粧其二十二高峰天外寒竹梢輕拂仙壇寶衣行雨在雲端畫簾深殿香霧冷風殘欲問椘王何處去翠屏猶掩金鵉猿啼明月照空灘孤舟行客驚夢亦艱難浣沙溪寂寞流蘇冷繡茵倚屏山枕惹香塵小庭花露泣濃春劉阮信非仙洞客常娥終是月中人此生無路訪東鄰八拍蠻雲鎖嫩黃煙柳細風吹紅蒂雪梅殘光影不勝閨閣恨行行坐坐黛眉攢其二愁鎖黛眉煙易慘淚飄紅臉粉難勻憔悴不知緣底事遇人推道不宜春河傳秋雨秋雨無畫無夜滴滴霏霏暗燈涼簟怨分離妖姬不勝悲西風稍急喧窗竹停又續膩臉懸雙玉几回邀約雁來時違期堆歸人不歸尹鶚六首臨江仙一畨荷芰生池沼檻前風送馨香昔年於此伴蕭娘相偎佇立牽惹敘裏腸時逞笑容無限態還如􅔽蓞爭芳别來虗遣思悠揚慵窺往事金鎖小蘭房其二深秋寒夜銀河靜月明深院中庭西窗鄊夢等間成逡巡覺後特地恨難平紅燭半消殘熖短依稀暗背銀屏枕前何事最傷情梧桐葉上點點露珠零滿官花月沉沉人悄悄一炷後庭香􅒁風流帝子不歸來滿地禁花慵掃離恨多相見少何處醉迷三島漏清宫樹子規啼愁鎖碧窗春曉杏園芳嚴籹嫩臉花明教人見了關情含羞舉步越羅輕稱娉停終朝咫尺窺香閣迢遙似隔層城何時休遣夢相縈入雲屏醉公子暮煙籠蘚砌戟門猶未閉盡日醉尋春歸來月滿身離鞍偎繍𬒮墜巾花亂綴何處惱佳人檀䀶衣上新菩薩蠻隴雲暗合秋天白俯窗獨坐窺煙陌樓際角重吹黃昏方醉歸荒唐難共語明日還應去上馬出門時金鞍莫與伊毛熙震二十一首浣沙溪春暮黃鶯下砌前水晶簾影露珠懸綺霞低映晚晴天弱桞萬條垂翠帶殘紅滿地碎香鈿蕙風飄蕩散輕煙其二花謝香紅煙景迷滿庭芳草緑萋萋金鋪間掩繍簾低紫燕一雙嬌語碎翠屏十二晚峰齊夢魂銷散醉空閨其三晚起紅房醉欲銷緑鬟雲散􅒁金翹雪香花語不朦嬌好是向人柔弱處玉纎時急繍裙腰春心牽惹轉無憀其四一隻橫叉墜髻叢靜眠珍簟起來慵繍羅紅嫩抹酥􅎍羞斂細蛾魂暗斷困迷無語思猶濃小屏香靄碧山重其五雲薄羅裙綬帶長滿身新裛瑞龍香翠鈿斜映艷梅籹佯不覷人空婉約笑和嬌語太娼狂忍教牽恨暗形相其六碧玉冠輕􅒁燕叉捧心無語步香階緩移弓底繍羅鞋暗想歡娛何計好豈堪期約有時乖日髙深院正忘懷其七半醉疑情臥繍茵睡容無力缷羅裙玉籠鸚鵡厭聽聞慵整落叉金翡翠像梳欹鬢月生雲錦屏綃幌麝煙薰臨江仙南齊天子寵嬋姢六宫羅綺三千潘妃嬌艷獨芳妍椒房蘭洞雲雨降神仙縱態迷歡心不足風流可惜當年纎腰婉約步金蓮妖君傾國猶自至今傳其二幽閨𣣔曙聞鶯囀紅窗月影微明好風頻謝落花聲隔幃殘燭猶照綺屏筝繍𬒳錦茵眠玉暖炷香斜􅒁輕煙淡蛾羞斂不朦情暗思間夢何處逐雲行更漏子秋色清河影淡深户燭寒光暗綃幌碧錦衾紅博山香炷融更漏咽蛩鳴切滿院霜華如雪新月上薄雲收映簾懸五鈎其二煙月寒秋夜靜漏轉金壺初永羅幕下繡屏空燈花結碎紅人消悄愁無了思夢不成難曉長憶淂與郎期竊香私語時女冠子碧桃紅杏遲日媚籠光影綵霞深香暖薰鶯語風清引鶴音翠鬟冠玉葉霓袖捧瑶琴應共吹簫侣暗相尋其二修娥慢臉不語檀心一點小山粧蟬鬢低含緑羅衣淡拂黃悶來深院裡間步落花傍纎手輕輕整玉爐香清平樂春光欲暮寂寞間庭户粉蝶雙雙穿檻舞簾卷晚天踈雨含愁獨倚閨幃玉罏煙斷香微正是銷魂時莭東風滿樹花飛南歌子逺山愁黛碧橫波慢臉明膩香紅玉茜羅輕深院晚堂人靜理銀筝鬢動行雲影裙遮點屐聲嬌羞愛問曲中名楊桞杏花時莭幾多情其二惹恨還添恨牽腸即斷腸凝情不語一枝芳獨映畫簾間立繡衣香暗想為雲女應憐傅粉郎晚來輕步出閨房髻慢叉橫無力縱猖狂河滿子寂寞芳菲暗度歲華如箭堪驚𬗟想舊歡夛少事轉添春思難平曲檻絲埀金桞小窗絃斷銀筝深院空聞燕語滿園間落花輕一片相思休不得忍教長日愁生誰見夕陽孤夢覺來無限傷情其二無語殘粧淡薄􅍭羞嚲𬒮輕盈幾度香閨眠過曉綺窗初日微明雲母帳中偷惜水晶枕上初驚笑靨嫩疑花析愁眉翠斂山橫相望只教添悵恨整鬟時見纎瓊獨倚朱扉間立誰知别有深情小重山梁燕雙飛畫閣前寂寥多少恨懶孤眠曉來間處想君憐紅羅帳金鴨冷沉煙誰信損嬋姢倚屏啼玉筯濕香鈿四肢無力上鞦韆羣花謝愁對艷陽天定西畨蒼翠濃隂滿院鶯對語蝶交飛戲薔薇斜日倚欄風好餘香出繡衣未得玉郎消息幾時歸木蘭花掩朱扉鈎翠箔滿院鶯聲春寂寞勻粉淚恨檀郎一去不歸花又落對斜暉臨小閣前事豈堪重想著金帶冷畫屏幽寶帳慵薰蘭麝薄花間集卷十一
