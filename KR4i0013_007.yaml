front:
  text: 花間集卷七
  hash: sha256:8979039e80964cf4b4d7dc424d484fb0e21034c8a08ad16cb0ff2cb20384945a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_007-1a}
body:
  text: 歐陽炯十七首浣溪沙落絮殘鶯半日天玉柔花醉只思眠惹窗映竹滿爐煙獨掩畫屏愁不語斜欹瑶枕髻鬟偏此時心在阿誰邊其二天碧羅衣拂地垂美人𥘉著更相冝宛風如舞透香肌獨坐含嚬吹鳳竹園中緩步折花枝有情無力泥人時其三相見休言有淚珠酒闌重得敘歡娛鳳屏鴛枕宿金鋪蘭麝細香聞喘息綺羅纎縷見肌膚此時還恨薄情無三字令春欲盡日遲遲牡丹時羅幌卷翠簾垂彩箋書紅粉淚兩心知人不在燕空歸負佳期香燼落枕函欹月分明花淡薄惹相思南鄉子嫩草如煙石榴花彂海南天日暮江亭春影淥鴛鴦浴水逺山長看不足其二畫舸停橈槿花籬外竹橫橋水上逰人沙上女回顧笑指芭蕉林裏住其三岸逺沙平日斜歸路晚霞眀孔雀自憐金翠尾臨水認得行人驚不起其四洞口誰家木蘭船繫木蘭花紅袖女郎相引去逰南浦笑倚春風相對語其五二八花鈿胸前如雪臉如蓮耳墜金環穿瑟瑟霞衣窄笑倚江頭招逺客其六路入南中挄榔葉暗蓼花紅兩岸人家微雨後收紅豆樹底纎纎擡素手其七袖斂絞綃採香深洞笑相邀藤杖枝頭蘆酒滳鋪葵席豆䓻花間趖晚日其八翡翠鵁鶄白蘋香裏小沙汀島上隂隂秋雨色蘆花撲數隻漁船何處宿獻衷心見好花顔色爭笑東風雙臉上晚粧同閉小樓深閣春景重重三五夜偏有恨月明中情未巳信曾通滿衣猶自染檀紅恨不如雙燕飛舞簾櫳春欲暮殘絮盡栁條空賀明朝憶昔花間𥘉識面紅袖半遮粧臉輕轉石榴裙帶故將纎纖玊指偷撚雙鳳金線碧梧桐瑣深深院誰料得兩情何日教繾綣羡春來雙燕飛到玉樓朝暮相見其二憶昔花間相見後只慿纎手暗拋紅豆人前不解巧傳心事别來依舊辜負春晝碧羅衣上蹙金繡覩對鴛鴦空裛淚痕透想韶顔非久終是為伊只恁偷瘦江城子晚日金陵岸草平落霞明水無情六代繁華暗逐逝波聲空有姑蘇臺上月如西子鏡照江城鳯樓春鳯髻緑雲叢深掩房櫳錦書通夢中相見覺來慵勻面淚臉珠融因想玊郎何處去對淑景誰同小樓中春思無窮倚欄顒望暗牽愁緒栁花飛起東風斜日照簾羅幌香冷粉屏空海棠零落鶯語殘紅和凝二十首小重山春入神京萬木芳禁林鶯語滑蝶飛狂曉花擎露妬啼粧紅日永風和百花香煙瑣栁絲長御溝澄碧水轉池塘時時微雨洗風光天衢逺到處引笙簧其二正是神京爛熳時群仙𥘉折得却詵枝烏犀白紵最相冝精神出御陌袖鞭垂栁色展愁眉管弦分響亮探花期光隂占斷曲江池新榜上名姓徹丹墀臨江仙海棠香老脊江晚小樓霧縠涳𪷟翠鬟𥘉出繡簾中麝煙鸞珮惹蘋風碾玉叉搖􅗌鶒戰雪肌雲鬢將融含情遙指碧波東越王臺殿蓼花紅其二披𫀆窣地紅宫錦鶯語時轉輕音碧羅冠子穩犀簮鳯皇雙颭步搖金肌骨細勻紅玊軟臉波微送春心嬌羞不肯入鴛衾蘭膏光裡兩情深菩薩蠻越梅半拆輕寒裏氷清淡薄籠藍水暖覺杏梢紅逰絲狂惹風間階莎徑碧逺夢猶堪惜離恨又迎春相思難重陳山花子鶯錦蟬縠馥麝臍輕𥚑花草曉煙迷鸂鶒顫金紅掌墜翠雲低星靨笑隈霞臉畔蹙金開襜襯銀泥春思半和芳草嫩緑萋萋其二銀字笙寒調正長水紋簟冷畫屛涼玊腕重金扼臂淡梳粧幾度試香纎手暖一回嘗酒絳脣光佯㺯紅絲蠅拂子打檀郎河滿子正是破瓜年幾含情慣淂人饒桃李精神鸚鵡舌可堪虛度良宵却愛藍羅裙子羡他長束纎腰其二寫得魚箋無限其如花瑣春輝目斷巫山雲雨空教殘夢依依却愛薰香小鴨羡他長在屛幃薄命女天欲曉宫漏穿花聲繚繞窗裡星光少冷霞寒侵帳額殘月光沉樹杪夢斷錦幃空悄悄強起愁眉小望梅花春草全無消息臘雪猶餘蹤迹越嶺寒枝香自拆冷艷竒芳堪惜何事壽陽無處覔吹入誰家橫笛天仙子栁色披衫金縷鳳纎手輕拈紅豆㺯翠蛾雙臉正含情桃花洞瑶臺夢一片春愁誰與共其二洞口春紅飛蔌蔌仙子含愁眉黛緑阮郎何事不歸來懶燒金慵篆玊流水桃花空斷續春光好紗窗暖畫屏間軃雲鬟睡起四肢無力半春間玊指剪裁羅勝金盤點綴酥山窺宋深心無限事小眉彎其二蘋葉軟杏花明畫船輕雙浴鴛鴦出淥汀棹歌聲春水無風無浪春天半雨半晴紅粉相隨南浦晚幾含情採桑子蝤蠐領上訶梨子繡帶雙垂椒户間時竟學樗蒲賭荔枝叢頭鞋子紅編細裙窣金絲無事嚬眉春思翻教阿母疑栁枝軟碧搖煙似送人映花時把翠蛾嚬青青自是風流主慢颭金絲待洛神其二瑟瑟羅裙金縷腰黛眉隈破未重描醉來咬損新花子拽住仙郎盡放嬌其三鵲橋𥘉就咽銀河今夜仙郎自姓和不是昔年攀桂樹豈能月裡索嫦娥漁父白芷汀寒立鷺鷥蘋風輕剪浪花時煙羃羃日遲遲香引芙蓉惹釣絲顧敻六首虞美人曉鶯啼破相思夢簾捲金泥鳯宿粧猶在酒𥘉醒翠翹慵整倚雲屏轉娉婷香檀細畫侵桃臉羅𬒮輕輕斂佳期堪恨再難尋緑蕪滿院栁成隂負春心其二觸簾風送景陽鍾鴛𬒳繡花重曉幃𥘉卷冷煙濃翠勻粉黛好儀容思嬌慵起來無語理朝粧寶匣鏡凝光緑荷相倚滿池塘露清枕簟藕花香恨悠揚其三翠屏間掩垂珠箔絲而籠池閣露粘紅藕咽清香謝娘嬌㥛不成狂罷朝粧小金􅗌鶒沉煙細膩枕堆雲髻淺眉微斂注檀輕舊歡時有夢魂驚悔多情其四碧桐梧映紗窗晚花謝鶯聲懶小屏屈曲掩青山翠幃香粉玉爐寒兩蛾攢顛狂年少輕離别辜負春時節畫羅紅𬒮有啼䀶魂銷無語倚閨門欲黃昏其五深閨春色勞思想恨共春蕪長黃鸝嬌囀䛏芳妍杏枝如畫倚輕煙瑣窗前憑欄愁立雙蛾細柳影斜搖砌玉郎還是不還家教人魂夢逐楊花繞天涯其六少年艷質勝瓊英早晚别三清蓮冠穩篸鈿箆橫飄飄羅袖碧雲輕畫難成遲遲少轉腰身裊翠靨眉心小醮壇風急杏枝香此時恨不駕鵉皇訪劉郎花間集卷七
