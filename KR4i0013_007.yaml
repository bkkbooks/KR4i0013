front:
  text: 花間集卷七
  hash: sha256:8979039e80964cf4b4d7dc424d484fb0e21034c8a08ad16cb0ff2cb20384945a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_007-1a}
body:
  text: 歐陽烱十七首浣溪沙落絮殘鶯半日天玉柔花醉只思眠惹䆫映竹滿爐烟獨掩画屏愁不語斜欹瑶枕髻鬟偏此時心在阿誰邊其二天碧羅衣拂地垂美人𥘉着更相冝宛風如舞透香肌獨㘴含嚬吹鳳竹園中緩歩折花枝有情無力泥人時其三相見休言有淚珠酒䦨重得叙歡娱鳳屏鴛枕宿金鋪蘭麝細香聞喘息綺羅纎縷見肌膚此時還恨薄情無三字令春欲盡日遲遲牡丹時羅幌卷翠簾垂彩箋書紅粉淚両心知人不在燕空歸負佳期香燼落枕凾欹月分明花澹薄惹相思南郷子嫰艸如烟石榴芲彂海南天日暮江亭春影淥鴛鴦浴水逺山長看不足其二画舸停橈槿花籬外竹横橋水上逰人沙上女廻顧笑指芭蕉林裏住其三㟁逺沙平日斜歸路晚霞眀孔雀自憐金翠尾臨水認得行人驚不𧺫其四洞口誰家木蘭船繋木蘭芲紅䄂女郎相引去逰南浦咲倚春風相對語其五二八花鈿胸前如雪臉如蓮耳墜金環穿瑟瑟霞衣窄咲倚江頭招逺客其六路入南中挄榔葉暗蓼花紅両㟁人家微雨後收紅豆樹底纎纎擡素手其七䄂歛絞綃採香深洞咲相邀藤杖枝頭蘆酒滳鋪葵席豆䓻芲間趖晚日其八翡翠鵁鶄白蘋香裏小沙汀島上隂隂秋雨色蘆花撲數隻漁船何䖏宿獻衷心見好花顔色争咲東風㕠臉上晚粧同閉小樓深閤春景重重三五夜偏有恨月朙中情未巳信曾通滿衣猶自染檀紅恨不如㕠燕飛舞簾櫳春欲暮殘絮盡栁條空賀朙朝憶昔花間𥘉識面紅䄂半遮粧臉輕轉石榴裙帶故将纎繊玊指偷撚㕠鳳金線碧梧桐瑣深㴱院誰料得両情何日教繾綣羡春来㕠燕飛到玉樓朝暮相見其二憶昔花間相見後只慿纎手暗抛紅豆人前不觧巧傳心事别来依舊辜負春晝碧羅衣上蹙金綉覩對鴛鴦空裛淚痕透想韶顔非乆終是為伊只恁偷瘦江城子晚日金陵㟁艸平落霞明水無情六代繁華暗逐逝波聲空有姑蘇䑓上月如西子鏡照江城鳯樓春鳯髻綠雲叢深掩房櫳錦書通梦中相見覺来慵勻面淚臉珠融因想玊郎何䖏去對㳤景誰同小樓中春思無窮倚欄顒望闇牽愁緒栁芲飛𧺫東風斜日照簾羅幌香冷粉屏空海棠零落鶯語殘紅和凝二十首小重山春入神京萬木芳禁林鶯語滑蝶飛狂曉花擎露妬啼粧紅日永風和百花香煙瑣栁絲長御溝澄碧水轉池塘時時㣲雨洗風光天衢逺到䖏引笙簧其二正是神京爛熳時群仙𥘉折得㕁詵枝烏犀白紵最相冝精神出御陌䄂鞭垂栁色展愁眉管弦分響亮探花期光隂占断曲江池新榜上名姓徹丹墀臨江仙海棠香老脊江晚小樓霧縠涳𪷟翠鬟𥘉出繡簾中麝烟鸞珮惹蘋風碾玉釵揺􅗌鶒戦雪肌雲鬢将融含情遥指碧波東越王䑓殿蓼花紅其二披𫀆窣地紅宫錦鶯語時轉䡖音碧羅冠子穏犀簮鳯皇㕠颭歩摇金肌骨細匀紅玊軟臉波微送春心嬌羞不肯入鴛衾蘭膏光裡両情㴱菩薩蠻越梅半拆䡖寒裏氷清澹薄籠藍水暖覺杏梢紅逰絲狂惹風閑堦莎徑碧逺梦猶堪惜離恨又迎春相思難重陳山花子鶯錦蟬縠馥麝臍䡖𥚑芲艸暁烟迷鸂鶒顫金紅掌墜翠雲低星靨咲隈霞臉畔蹙金開䄡襯銀泥春思半和芳艸嫰綠萋萋其二銀字笙寒調正長水紋簟冷画屛凉玊腕重金扼臂澹梳粧幾度試香纎手暖一迴嘗酒絳脣光佯㺯紅絲蝇拂子打檀郎河滿子正是破瓜年幾含情慣淂人饒桃李精神鸚鵡舌可堪虚度良宵却爱藍羅裙子羡他長束纎腰其二寫得魚牋無限其如芲瑣春輝目㫁巫山雲雨空教殘梦依依却愛薫香小鴨羡他長在屛幃薄命女天欲暁宫漏穿花聲繚繞牎裡星光少冷霞寒侵帳額殘月光沉樹杪夣㫁錦幃空悄悄強𧺫愁眉小望梅花春艸全無消息臘雪猶餘蹤跡越嶺寒枝香自拆冷艶竒芳堪惜何事壽陽無䖏覔吹入誰家横笛天仙子栁色披衫金縷鳳纎手䡖拈紅豆㺯翠蛾㕠臉正含情桃花洞瑶䑓梦一片春愁誰與共其二洞口春紅飛蔌蔌仙子含愁眉黛綠阮郎何事不歸來懶燒金慵篆玊流水桃花空㫁續春光好紗窓暖画屏閒軃雲鬟睡𧺫四肢無力半春間玊指剪裁羅勝金盤點綴酥山窺宋㴱心無限事小眉彎其二蘋葉軟杏花明画船䡖㕠浴鴛鴦出淥汀棹歌聲春水無風無浪春天半雨半晴紅粉相随南浦晚幾含情採桑子蝤蠐領上訶梨子繡帶雙垂椒户閑時竟學樗蒲賭荔枝叢頭鞋子紅編細裙窣金絲無事嚬眉春思飜教阿母疑栁枝軟碧摇烟似送人映花時把翠蛾嚬青青自是風流主慢颭金絲待洛神其二瑟瑟羅裙金縷腰黛眉隈破未重描醉來咬損新花子拽住仙郎盡放嬌其三鵲橋𥘉就咽銀河今夜仙郎自姓和不是昔年攀桂樹豈能月裡索嫦娥漁父白芷汀寒立鷺鷥蘋風䡖剪浪花時煙羃羃日遲遲香引芙蓉惹釣絲顧夐六首虞美人曉鶯啼破相思梦簾捲金泥鳯宿粧猶在酒𥘉醒翠翹慵整倚雲屏轉娉婷香檀細画侵桃臉羅𬒮䡖輕歛佳期堪恨再難㝷綠蕪滿院栁成隂負春心其二觸簾風送景陽鍾鴛𬒳繡花重暁幃𥘉卷冷煙濃翠匀粉黛好儀容思嬌慵起來無語理朝粧寳匣鏡凝光綠荷相倚滿池塘露清枕簟藕芲香恨悠揚其三翠屏閒掩垂珠箔絲而籠池閣露粘紅藕咽清香謝娘嬌㥛不成狂罷朝粧小金􅗌鶒沉烟細膩枕堆雲髻淺眉微歛注檀輕舊懽時有梦魂驚悔多情其四碧桐梧映紗䆫晚花謝鶯聲嬾小屏屈曲掩青山翠幃香粉玉爐寒両蛾攅顛狂年少䡖離别辜負春時節画羅紅𬒮有啼㾗魂銷無語倚閨門欲黄昏其五深閨春色勞思想恨共春蕪長黄鸝嬌囀䛏芳妍杏枝如画倚䡖烟瑣窓前凭欄愁立㕠蛾細桺影斜揺砌玉郎還是不還家教人魂梦逐楊芲繞天涯其六少年艶質勝瓊英早晚别三清蓮冠穏篸鈿箆横飄飄羅䄂碧雲䡖画難成遲遲少轉腰身褭翠靨眉心小醮壇風急杏枝香此時恨不駕鵉皇訪劉郎花間集卷七
