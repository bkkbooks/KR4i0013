front:
  text: 花間集卷十二
  hash: sha256:7ebd3c43c9eff86f36e03148307e4f86733300d2048d7b9e919d0280fa5c70c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_012-1a}
body:
  text: 毛熙震八首後庭花鶯啼燕語芳菲莭瑞庭花發昔時歡宴歌聲揭管弦清越自從陵谷追逰歇畫梁塵黦傷心一片如圭月間鎖官闕其二輕盈舞妓􅍭芳艷競籹新臉步瑶珠翠修蛾斂膩鬟雲染歌聲慢發開檀點繍衫斜掩時將纎手勻紅臉笑拈金靨其三越羅小袖新香蒨薄籠金釧倚闌無語搖輕扇半遮勻面春殘日暖鶯嬌懶滿庭花片爭不教人長相見畫堂深院酒泉子間臥繡幃慵想萬般情寵錦檀偏翅股重翠雲欹暮天屏上春山碧映香煙霧隔蕙蘭心魂夢役斂蛾眉其二鈿匣舞鵉隱映艷紅修碧月梳斜雲鬢膩粉香寒曉花微斂輕呵展􅒁叉金燕軟日初升簾半捲對殘粧菩薩蠻梨花滿院飄香雪髙樓夜靜風箏咽斜月照簾帷憶君和夢稀小窗燈影背燕語驚愁態屏掩斷香飛行雲山外歸其二繡簾髙軸臨塘看雨翻荷芰真珠散殘暑晚初涼輕風渡水香無憀悲往事爭那牽情思光影暗相催等間秋又來其三天含殘碧融春色五陵薄幸無消息盡日掩朱門離愁暗斷魂鶯啼芳樹暖燕拂廽塘滿寂寞對屏山相思醉夢間李珣三十七首浣沙溪入夏偏冝淡薄粧越羅衣褪鬱金黃翠鈿檀注助容光相見無言還有恨幾廽拚却又思量月窗香徑夢悠揚其二晚出間庭看海棠風流學得內家粧小叉橫戴一枝芳鏤玉梳斜雲鬢膩縷金衣透雪肌香暗思何事立殘陽其三訪舊傷離欲斷魂無因重見玉樓人六街微雨鏤香塵早為不逢巫峽夢那堪虗度錦江春遇花傾酒莫辭頻其四紅藕花香到檻頻可堪間憶似花人舊歡如夢絶音塵翠疊畫屏山隱隱冷鋪紋簟水潾潾斷魂何處一蟬新漁歌子楚山青湘水緑春風淡蕩看不足草芊芊花簇簇漁艇棹歌相續信浮沉無管束釣廽乘月歸灣曲酒盈樽雲滿屋不見人間榮辱其二荻花秋瀟湘夜橘州佳景如屏畫碧煙中明月下小艇垂綸𥘉罷水為鄊蓬作舍魚羹稻飯常餐也酒盈杯書滿架名利不將心挂其三桞垂絲花滿樹鶯啼椘岸春天暮棹輕舟出深浦緩唱漁歌歸去罷垂綸還酌醑孤村遙指雲遮處下長汀臨淺渡驚起一行沙鷺其四九疑山三湘水蘆花時莭秋風起水雲間山月裡棹月穿雲逰戲鼓清琴傾渌蟻扁舟自淂消遙志任東西無定止不議人間醒醉巫山一假雲有客經巫峽停橈向水湄楚王曽此夢瑶姬一夢杳無期塵暗珠簾卷香銷翠幄垂西風逈首不勝悲暮雨灑空祠其二古廟依青嶂行宫枕碧流水聲山色鎖粧樓往事思悠悠雲雨朝還暮煙花春復秋啼猿何必近孤舟行客自多愁臨江仙簾捲池心小閣虗暫涼間步徐徐芰荷經雨半凋踈拂堤垂柳蟬噪夕陽餘不語低鬟幽思逺玉叉斜墜雙魚幾回偷看寄來書離情别恨相隔欲何如其二鶯報簾前暖日紅玉罏殘麝猶濃起來閨思尚踈慵别愁春夢誰解此情悰強整嬌姿臨寶鏡小池一朵芙蓉舊歡無處再尋蹤更堪回顧屏畫九疑峰南鄉子煙漠漠雨凄凄岸花零落鷓鴣啼逺客扁舟臨野渡思鄉處潮退水平春色暮其二蘭棹舉水紋開競携蕂籠採蓮來廽塘深處遙相見邀同宴渌酒一巵紅上面其三歸路近扣舷歌採真珠處水風多曲岸小橋山月過煙深鎖豆􅛌花垂千萬朵其四乘綵舫過蓮塘棹歌驚起睡鴛鴦遊女帶花偎伴笑爭窈窀競折團荷遮晚照其五傾渌蟻泛紅螺間邀女伴簇笙歌避暑信船輕浪裡間逰戲夾岸荔枝紅蘸水其六雲帶雨浪迎風釣翁廽棹碧灣中春酒香熟鱸魚美誰同醉纜却扁舟蓬底睡其七沙月靜水煙輕芰荷香裡夜船行緑鬟紅臉誰家女遙相顧緩唱棹歌極浦去其八漁市散渡船稀越南雲樹望中微行客待潮天欲暮送春浦愁聽猩猩啼瘴雨其九攏雲髻背犀梳焦紅衫映緑羅𥚑越王臺下春風暖花盈岸逰賞與邀鄰女伴其十相見處晚晴天刺桐花下越臺前暗裡廽眸深屬意遺雙翠騎象背人先過水女冠子星髙月午丹桂青松深處醮壇開金磬𫾣清露珠幢立翠苔步虗聲縹眇想像思徘徊曉天歸去路指蓬萊其二春山夜靜愁聞洞天踈磬玉堂虗細霧垂珠佩輕煙曵翠𥚑對花情􅎃􅎃望月步徐徐劉阮今何處絶來書酒泉子寂寞青樓風觸繡簾珠碎撼月朦朧花暗淡鎖春愁尋思往事依稀夢淚臉露桃紅色重鬢欹蟬叉墮鳳思悠悠其二雨漬花零紅散香凋池兩岸别情遙春歌斷掩銀屏孤帆早晚離三楚間理鈿筝愁幾許曲中情絃上語不堪聽其三秋雨聮綿聲散敗荷叢裡那堪深夜枕上聽酒初醒牽愁惹思更無停燭暗香凝天欲曉細和煙冷和雨透簾中其四秋月嬋姢皎潔碧紗窗外照花穿竹冷沉沉印他心凝露滴砌蛩吟驚覺謝娘殘夢夜深斜傍枕前來影徘徊望逺行春日遲遲思寂寥行客關山路遙瓊窗時聽語鶯嬌栁絲牽恨一條條休暈繡罷吹簫貌逐殘花暗凋同心猶結舊裙腰忍辜風月度良宵其二露滴幽庭葉落時愁聚簫娘桞眉玉郎一去負佳期水雲迢遞雁書遲屏半掩枕斜欹蠟淚無言對垂吟蛩斷續漏頻移入窗明月鑒空帷菩薩蠻回塘風起波紋細刺桐花裡門斜閉殘日照平蕪雙雙飛鷓鴣征帆何處客相見還相隔不語𣣔魂銷望中煙水遙其二等間將度三春景簾垂碧砌參差影曲檻日初斜杜鵑啼落花恨君容易處又話瀟湘去凝思倚屏山淚流紅臉斑其三隔簾微雨雙飛燕砌花零落紅深淺捻得寶筝調心隨征棹遙楚天雲外路動便經年去香斷畫屏深舊歡何處尋西溪子金鏤翠鈿浮動粧罷小窗圓夢日髙時春巳老人來到滿地落花慵掃無語倚屏風泣殘紅虞美人金籠鶯報天將曙驚起分飛處夜來潛與玉郎期多情不覺酒醒遲失歸期映花避月遙相送膩髻偏垂鳯却迥嬌步入香閨倚屏無語撚雲箆翠眉低河傳去去何處迢迢巴楚山水相連朝雲暮雨依舊十二峰前猿聲到客船愁腸豈異丁香結因離别故國音書絶想佳人花下對明月春風恨應同其二春暮微雨送君南浦愁斂雙蛾落花深處啼鳥似逐離歌粉檀珠淚和臨流更把同心結情哽咽後會何時莭不堪回首相望已隔汀洲櫓聲幽花間集卷十二終
