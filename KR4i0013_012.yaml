front:
  text: 花閒集卷十二
  hash: sha256:2b8921dad486614b501b3fb2d57156c70217736bd453721da69188b478923285
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_012-1a}
body:
  text: 毛熈震八首後庭花鶯啼燕語芳菲莭瑞庭花發昔時歡宴歌聲掲管弦清越自従陵谷追逰歇画梁塵黦傷心一片如珪月閑鎻官闕其二輕盈舞妓􅍭芳艶競籹新臉歩瑶珠翠脩蛾歛膩鬟雲染歌聲慢發開檀點繍衫斜掩時将纎手勻紅臉咲拈金靨其三越羅小䄂新香蒨薄籠金釧倚闌無語摇䡖扇半遮勻面春殘日暖鶯嬌懶滿庭花片争不教人長相見画堂深院酒泉子閑臥繡幃慵想萬般情寵錦檀偏翅股重翠雲欹暮天屏上春山碧映香烟霧隔蕙蘭心魂夢役歛蛾眉其二鈿匣舞鵉隐映艶紅修碧月梳斜雲鬢膩粉香寒曉花微歛輕呵展􅒁釵金燕軟日初昇簾半捲對殘粧菩薩蛮梨花滿院飄香雪髙樓夜静風箏咽斜月照簾帷憶君和夣稀小窓燈影背燕語驚愁態屏掩㫁香飛行雲山外歸其二繡簾髙軸臨塘㸔雨翻荷芰真珠散殘暑晩初凉䡖風渡水香無憀悲徃事争那牽情思光影暗相催等閑秋又来其三天含殘碧融春色五陵薄幸無消息盡日掩朱門離愁暗㫁魂鶯啼芳樹煖燕拂廽塘滿寂寞對屏山相思醉夢間李珣三十七首浣沙溪入夏偏冝淡薄粧越羅衣褪欝金黄翠鈿檀注助容光相見無言還有恨幾廽拚却又思量月窓香逕夢悠颺其二晩出閑庭看海棠風流學得内家粧小釵横戴一枝芳鏤玉梳斜雲鬢膩縷金衣透雪肌香暗思何事立殘陽其三訪舊傷離欲㫁魂無因重見玉樓人六街微雨鏤香塵早爲不逢巫峡夢那堪虗度錦江春遇花傾酒莫辭頻其四紅藕芲香到檻頻可堪閑憶似芲人舊歡如夣絶音塵翠叠画屏山隐隐冷鋪紋簟水潾潾㫁魂何䖏一蝉新漁歌子䠂山青湘水緑春風澹蕩㸔不足草芊芊芲簇簇漁艇棹歌相續信浮沉無管束釣廽乗月歸湾曲酒盈樽雲滿屋不見人間榮辱其二荻花秋瀟湘夜橘州佳景如屏画碧烟中明月下小艇垂綸𥘉罷水為鄊蓬作舎魚羹稻飯常飡也酒盈杯書滿架名利不将心挂其三桞垂絲花滿樹鶯啼椘㟁春天暮棹䡖舟出深浦緩唱漁歌歸去罷垂綸還酌醑孤村遥指雲遮䖏下長汀臨淺渡驚起一行沙鷺其四九疑山三湘水蘆花時莭秋風起水雲間山月裡棹月穿雲逰戲鼓清琹傾渌蟻扁舟自淂消遥志任東西無定止不議人間醒醉巫山一叚雲有客經巫峡停橈向水湄楚王曽此夣瑶姬一夢杳無期塵暗珠簾卷香銷翠幄垂西風逈首不勝悲暮雨洒空祠其二古廟依青嶂行宫枕碧流水聲山色鎻粧樓徃事思悠悠雲雨朝還暮烟花春復秋啼猿何必近孤舟行客自多愁臨江仙簾捲池心小閣虗蹔凉閑歩徐徐芰荷經雨半凋踈拂堤垂柳蟬噪夕陽餘不語低鬟幽思逺玉釵斜墜雙魚㡬廻偷㸔寄来書離情别恨相隔欲何如其二鶯報簾前煖日紅玉罏殘麝猶濃起来閨思尚踈慵别愁春夢誰觧此情悰強整嬌姿臨寳鏡小池一朶芙蓉舊歡無䖏再㝷蹤更堪囬頋屏画九疑峰南郷子烟漠漠雨凄凄岸花零落鷓鴣啼逺客扁舟臨野渡思郷䖏潮退水平春色暮其二蘭棹舉水紋開競携蕂籠採蓮来廽塘深䖏遥相見邀同宴渌酒一巵紅上面其三歸路近扣舷歌採真珠䖏水風多曲岸小橋山月過烟深鎻荳􅛌花垂千萬朶其四乗綵舫過蓮塘棹歌驚起睡鴛鴦㳺女帶花偎伴咲争窈窀競折團荷遮晚照其五傾渌蟻泛紅螺閑邀女伴簇笙歌避暑信船輕浪裡閑逰戲夹岸荔枝紅蘸水其六雲帶雨浪迎風釣翁廽棹碧湾中春酒香熟鱸魚羙誰同酔䌫却扁舟蓬底睡其七沙月静水烟輕芰荷香裡夜舡行緑鬟紅臉誰家女遥相頋緩唱棹歌極浦去其八漁市散渡船稀越南雲樹望中微行客待潮天欲暮送春浦愁聴猩猩啼瘴雨其九攏雲髻背犀梳焦紅衫映緑羅𥚑越王䑓下春風煖花盈岸逰賞與邀隣女伴其十相見䖏晚晴天刺桐花下越䑓前暗裡廽眸深属意遺㕠翠騎象背人先過水女冠子星髙月午丹桂青松深䖏醮壇開金磬𫾣清露珠幢立翠苔歩虗聲縹緲想像思徘徊曉天歸去路指蓬莱其二春山夜静愁聞洞天踈磬玉堂虗細霧垂珠佩䡖烟曵翠𥚑對花情􅎃􅎃望月歩徐徐劉阮今何䖏絶来書酒泉子寂寞青樓風觸綉簾珠碎撼月朦朧花暗澹鎖春愁㝷思徃事依稀夢淚臉露桃紅色重鬂欹蟬釵堕鳳思悠悠其二雨漬花零紅散香凋池両㟁别情遥春歌㫁掩銀屏孤㠶早晚離三䠂閑理鈿筝愁幾許曲中情絃上語不堪聴其三秋雨聮緜聲散敗荷叢裡那堪深夜枕上聴酒初醒牽愁惹思更無停燭暗香凝天欲暁細和煙冷和雨透簾中其四秋月嬋姢皎潔碧紗窓外照花穿竹冷沉沉印他心凝露滴砌蛩吟驚斍謝娘殘夣夜深斜傍枕前来影徘徊望逺行春日遲遲思寂寥行客関山路遥瓊窓時聴語鶯嬌栁絲牽恨一條條休暈繡罷吹簫貌逐殘花暗凋同心猶結舊裙腰忍辜風月度良宵其二露滴幽庭葉落時愁聚簫娘桞眉玉郎一去負佳期水雲迢逓雁書遲屏半掩枕斜欹蠟淚無言對垂吟蛩㫁續漏頻移入窓明月鍳空帷菩薩蛮廻塘風起波紋細刺桐花裡門斜閉殘日照平蕪䨇䨇飛鷓鴣征㠶何䖏客相見還相隔不語𣣔魂銷望中烟水遥其二等閑将度三春景簾垂碧砌参差影曲檻日初斜杜䳌啼落花恨君容易䖏又話瀟湘去凝思倚屏山淚流紅臉斑其三隔簾微雨雙飛燕砌花零落紅深淺捻得寳筝調心随征棹遥楚天雲外路動便經年去香㫁画屏深舊歡何䖏㝷西溪子金鏤翠鈿浮動粧罷小窓圓夣日髙時春巳老人来到滿地落花慵掃無語倚屏風泣殘紅虞羙人金籠鶯報天将曙驚起分飛䖏夜来潜與玉郎期多情不覺酒醒遲失歸期映花避月遥相送膩髻偏垂鳯却㢠嬌歩入香閨倚屏無語撚雲箆翠眉低河傳去去何䖏迢迢巴楚山水相連朝雲暮雨依舊十二峰前猿聲到客船愁腸豈異丁香結因離别故國音書絶想佳人花下對明月春風恨應同其二春暮微雨送君南浦愁歛雙蛾落花深䖏啼鳥似逐離歌粉檀珠淚和臨流更把同心結情哽咽後會何時莭不堪囬首相望已隔汀洲櫓聲幽花間集卷十二終
