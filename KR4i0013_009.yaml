front:
  text: 花間集卷九
  hash: sha256:43392a0f7b04643e763621bbde42a6844fddf0cea18f552d17a484a6c77efe52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_009-1a}
body:
  text: 顧敻六首臨江仙碧染長空池似鏡倚樓間望凝情滿衣紅藕細香清象床枕簟山障掩玊琴橫暗想昔時歡笑事如今羸得愁生博山罏暖淡煙輕蟬吟人靜殘日傍小窗明其二幽閨小檻春光晚栁濃花淡鶯稀舊歡思想尚依依翠顰紅斂終日損芳菲何事狂夫音信斷不如梁燕猶歸畫當深處麝煙微屏虗枕冷風細雨霏霏其三月色穿簾風入竹倚屏雙黛愁時砌花含露兩三枝如啼恨臉魂斷損容儀香燼暗銷金鴨冷可堪辜負前期繡𥜗不整鬢鬟欹幾夕惆悵情緒在天涯漠漠秋雲淡紅藕香侵檻枕倚小山屏金鋪向晚扄睡起橫波慢獨望情何限衰栁數聲蟬魂銷似去年其二岸桞垂金線而晴鶯百囀家住緑楊邊往來多少年馬嘶芳草逺高樓簾半卷斂袖翠蛾攢相逢爾許難更漏子舊歡娛新悵望擁鼻含嚬樓上濃栁翠晚霞微江鷗接翼飛簾半捲屏斜掩逺岫參羌迷眼歌滿耳酒盈樽前非不要論孫光憲三十六首浣溪沙蓼岸風多橘柚香江邊一望楚天長片帆煙際閃孤光目送征鴻飛杳杳思隨流水去茫茫蘭紅波碧憶瀟湘其二桃杏風香簾幕間謝家門户約花關畫梁幽語燕𥘉還繡閣數行題了壁曉屏一枕酒醒山却疑身似夢魂間其三花漸凋踈不耐風畫簾垂地晚堂空墮階縈蘚舞愁紅膩粉半粘金靨子殘香猶暖繡薰籠蕙心無處與人同其四攬鏡無言淚欲流凝情半日懶梳頭一庭踈雨濕春愁楊栁秪知傷怨别杏花應信損嬌羞淚沾魂斷軫離憂其五半踏長𥚑宛約行晚簾踈處見分明此時堪恨昧平生早是銷魂殘燭影更愁聞著品弦聲杳無消息若為情其六蘭沐𥘉休曲檻前暖風遲日洗頭天濕雲新斂未梳蟬翠𬒮半將遮粉臆寶叉長欲墜香肩此時模樣不禁憐其七風遞殘香出繡簾團窠金鳳舞襜襜落花微雨恨相兼何處厺來狂太甚空推宿酒睡無厭爭教人不别猜嫌其八輕打銀筝墜燕泥斷絲高罥畫樓西花冠間上午墻啼粉籜半開新竹徑紅苞盡落舊桃蹊不堪終日閉深閨其九烏帽斜欹倒佩魚靜街偷步訪仙居隔墻應認打門𥘉將見客時微掩斂得人憐處且生踈低頭羞問壁邊書河傳太平天子等間遊戲疏河千里桞如絲隈倚渌波春水長淮風不起如花殿腳三千女爭雲兩何處留人住錦帆風煙際紅燒空魂迷大業中其二栁拖金縷著煙籠霧濛濛落絮鳳凰舟上楚女妙舞雷喧波上鼓龍爭虎戰分中土人無主桃葉江南渡襞花箋艷思牽成篇宫娥相與傳其三花落煙薄􅒜家池閣寂莫春深翠娥輕斂意沉吟沾襟無人知此心玉罏香斷霜灰冷簾鋪影梁燕歸紅杏晚來天空悄然孤眠枕檀雲髻偏其四風颭波斂團河閃閃珠傾露點木蘭舟上何處吳娃越艷藕花紅照臉大堤狂殺襄陽客煙波隔渺渺湖光白身巳歸心不歸斜暉逺汀鸂鷘飛菩薩蠻月華如水籠香砌金鐶碎撼門𥘉閉寒影墮髙簷鈎垂一面簾碧煙輕裊裊紅顫燈花笑即此是髙唐掩屏秋夢長其二花冠頻鼓墻頭翼東方淡白連窗色門外早鶯聲背樓殘月明薄寒籠醉態依舊鉛華在握手送人歸半拖金縷衣其三小庭花落無人掃踈香滿地東風老春晚信沉沉天涯何處尋曉堂屏六扇眉共湘山逺爭奈別離心近來尤不禁其四青巖碧洞經朝兩隔花相喚南溪厺一隻木蘭船波平逺浸天扣舷驚翡翠嫩玉擡香臂紅日欲沉西煙中遙解携其五木綿花映叢祠小越禽聲裏春光曉銅鼓與蠻歌南人祈賽多客帆風正急茜袖偎檣立極浦幾回頭煙波無限愁河瀆神汾水碧依依黃雲落葉𥘉飛翠華一厺不言歸廟門空掩斜暉四壁隂森排古畫依舊瓊輪羽駕小殿沉沉清夜銀燈飄落香灺其二江上草芉芊春晚湘妃廟前一方卯色楚南天數行征鴈聮翩獨倚朱欄情不極魂斷終朝相憶兩漿不知消息逺汀時起鸂鷘虞美人紅窗寂寂無人語暗淡梨花雨繡羅紋地粉新描慱山香炷旋抽條暗魂銷天涯一去無消息終日長相憶教人相憶幾時休不堪棖觸别離愁淚還流其二好風微揭簾旌起金翼鵉相倚翠簷愁聽乳禽聲此時春態暗關情獨難平畫堂流水空相翳一穗香遙曵教人無處寄相思落花芳草過前期沒人知後庭花景陽鐘動宫鶯囀露涼金殿輕飈吹起瓊花旋玉葉如剪晚來高閣上珠簾捲見墜香千片修娥慢臉陪雕輦後庭新宴其二石城依舊空江國故宫春色七尺青絲芳草緑絶世難得玉英凋落盡更何人識野棠如織只是教人添怨憶悵望無極生查子寂莫掩朱門正是天將暮暗淡小庭中滴滴梧桐雨繡工夫牽心緒配盡鴛鴦縷待得沒人時偎倚論私語其二暖日䇿花驄嚲鞚垂楊陌芳草惹煙青落絮隨風白誰家繡轂動香塵隱映神仙客狂殺玉鞭郎咫尺音容隔其三金井墮高梧玉殿籠斜月永巷寂無人斂態愁堪絶玉罏寒香燼滅還似君恩歇翠輦不歸來幽恨將誰説臨江仙霜拍井梧乾葉墮翠幃雕檻𥘉寒薄鉛殘黛稱花冠含情無語延佇倚欄杆杳杳征輪何處厺離愁别恨千般不堪心緒正多端鏡奩長掩無意對孤鵉其二暮雨凄凄深院閉燈前凝坐𥘉更玊叉低壓鬢雲橫半垂羅幕相映燭光明終是有心投漢佩低頭但理秦筝燕雙鵉偶不勝情只愁明發將逐楚雲行酒泉子空磧無邊萬里陽關道路馬蕭蕭人去去隴雲愁香貂舊製戎衣窄胡霜千里白綺羅心魂夢斷上高樓其二曲檻小樓正是鶯花二月思無憀愁欲絶鬱離襟展屏空對瀟湘水眼前千萬里淚淹紅眉斂翠恨沉其三斂態窗前裊裊雀叉拋􅖪燕成雙鵉對影耦新知玉纎淡拂眉山小鏡中嗔共照翠連姢紅縹眇早粧時清平樂愁腸欲斷正是青春半連理分枝鵉失伴又是一埸離散掩鏡無語眉低思隨芳草萋萋慿仗東風吹夢與郎終日東西其二等間無語春恨如何厺終是踈狂留不住花暗栁濃何處盡日目斷魂飛晚窗斜界殘暉長恨朱門薄暮繡鞍驄馬空歸更漏子聽寒更聞逺堆半夜蕭娘深院扃繡户下珠簾滿庭噴玉蟾人語靜香閨冷紅幕半垂清影雲雨態蕙蘭心此情江海心其二今夜期來日别相對祗堪愁絶偎粉面撚瑶簮無言淚滿襟銀箭落霜華薄墻外曉雞咿喔聽囑付惡情悰斷腸西復東卷九
