front:
  text: 花間集卷十
  hash: sha256:0bc9a4724287f522ab046f312ebd706d7a556cec2e7cdf808900e41f05ff688e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_010-1a}
body:
  text: 孫光憲二十四首女冠子蕙風芝露壇際殘香輕度蘂珠宫苔點分圎碧桃花踐破紅品流巫峽外名籍紫薇中真侣墉城會夢魂通其二淡花瘦玉依約神仙粧束佩瓊文瑞露通宵貯幽香盡日焚碧煙籠絳節黃藕冠濃雲勿以吹簫伴不同羣風流子茅舍槿籬溪曲雞犬自南自北菰葉長水葓開門外春波漲渌聽織聲促軋軋鳴梭穿屋其二樓倚長衢欲暮瞥見神仙伴侣微傳粉攏梳頭隱映畫簾開處無語無緒慢曵羅裙歸厺其三金絡玉䘖嘶馬繫向緑楊隂下朱户掩繡簾垂曲院水流花榭歡罷歸也猶在九衢深疸定西畨雞祿山前逰騎邉草白朔天明馬蹄輕鵲面弓離短韔彎來月欲成一隻鳴􅐴雲外曉鴻驚其二帝子枕前秋夜霜幄冷月華明正三更何處戍樓寒笛夢殘聞一聲遙想漢關萬里泪縱橫河滿子冠劍不隨君厺江河還共恩深歌袖半遮眉黛慘淚珠旋滴衣襟惆悵雲愁雨怨斷魂何處相尋玉蝴蝶春欲盡景仍長滿園花正黃粉翅兩悠揚翩翩過短墻鮮飈暖牽逰伴飛去立殘芳無語對簫娘舞衫沉麝香八拍蠻孔雀尾拖金線長怕人飛起入丁香越女沙頭爭拾翠相呼歸去背斜陽竹枝門前春水竹枝白蘋花女兒岸上無人竹枝小艇斜女兒啇女經過竹枝江欲暮女兒散拋殘食竹枝飼神鴉女兒亂繩千結竹枝絆人深女兒越羅萬丈竹枝表長尋女兒楊栁在身竹枝垂意緒女兒藕花落盡竹枝見蓮心女兒思帝鄉如何遣情情更多永日水尚簾下斂羞蛾六幅羅裙窣地微行曵碧波看盡滿池踈雨打圑荷上行杯草草離亭鞍馬從逺道此地分襟燕宋秦吳千萬里無辭一醉野棠開江革濕佇立沾泣征騎駸駸其二離棹逡巡欲動臨極浦故人相送去住心情知不共金船滿捧綺羅愁絲管咽回别帆影滅江浪如雪謁金門留不淂留得也應無益白紵青山如雪色揚州𥘉厺日輕别離甘拋擲江上滿帆風疾却羡彩鴛三十六孤鸞還一隻思越人古臺平芳草逺館娃宫外春深翠黛空留千載恨教人何處相尋綺羅無復當時事露花點滳香淚惆悵遙天橫緑水鴛鴦對對飛起其二渚蓮枯宫樹老長洲廢苑蕭條想像玉人空處所月明獨上溪橋經春𥘉敗秋風起紅蘭緑蕙愁死一片風流傷心地魂銷目斷西子楊栁枝閶門風暖落花乾飛遍江城雪不寒獨有晚來臨水驛間人多憑赤欄干其二有池有榭即濛濛浸潤翻成長飬功恰似有人長點檢著行排立向春風其三根柢雖然傍濁河無妨終日近笙歌驂驂金帶誰堪比還共黃鶯不校多其四萬株枯稿怨亡隋似弔吳臺各自垂好是淮隂明月裡酒樓橫笛不勝吹望梅花數枝開與短墻平見雪蕚紅跗相映引起誰人邉塞情簾外欲三更吹斷離愁月正明空聼隔江聲漁歌子草芊芊波漾漾湖邉草色連波漲沿蓼岸泊楓汀天際玉輪𥘉上扣舷歌聮極望漿聲伊軋知何向黃鵠叫白鷗眠誰似儂家踈曠其二泛流螢明又滅夜涼水冷東灣濶風浩浩笛寥寥萬傾金波澄徹杜若洲香郁烈一聲宿堆霜時莭經霅水過松江盡屬儂家日月魏承斑十五首善薩蠻羅𥚑薄薄秋波染眉間畫時山兩點相見綺羅時深情暗共知翠翹雲鬢動斂態彈金鳯宴罷入蘭房邀人解珮璫其二羅衣穩約金泥畫玳筵一曲當秋夜聲顫覷人嬌雲鬟裊翠翹酒醺紅玉軟眉翠秋山逺繍幌麝煙沉誰人知兩心滿宫花雪霏霏風凛凛玉郎何處狂飲醉時想得縱風流羅帳香幃鴛寢春朝秋夜思君甚愁見繍屏孤枕少年何事負𥘉心淚滴縷金雙袵木蘭花小芙蓉香旖旎碧玉堂深情似水閉寶匣掩金鋪倚屏拖袖愁如醉遲遲好景煙花媚曲渚鴛鴦眠錦翅凝然愁望靜相思一雙笑靨嚬香藥玉樓春寂寂畫堂梁上燕髙卷翠簾橫數扇一庭春色惱人來滿地落花紅幾片愁倚錦屏低雪靣淚滴繡羅金縷線好天涼月盡傷心為是玉郎長不見其二輕斂翠蛾呈皓齒鶯囀一枝花影裏聲聲清逈遏行雲寂寂畫梁塵暗起玉斚滿斟情未已促坐王孫公子醉春風筵上貫珠勻艷色韶顔嬌旎旖訴衷情高歌宴罷月𥘉盈詩情引恨情煙露冷水流輕思想夢難成羅帳裊香平恨頻生思君無計睡還醒隔層城其二春深花簇小樓臺風飄錦繡開新睡覺步香階山枕印紅腮鬢亂墜金叉語檀偎臨行執手重重囑幾千回其三銀漢雲晴玉漏長蛩聲悄畫堂筠簟冷碧窗涼紅臘淚飄香皓月㵼寒光割人腸那堪獨自步池塘對鴛鴦其四金風輕透碧窗紗銀缸熖影斜欹枕臥恨何賖山掩小屏霞雲雨别吳娃想容華夢成幾度繞天涯到君家其五春情滿眼臉紅銷嬌妬索人饒星靨小玉璫搖幾共醉春朝别後憶纎腰夢魂勞如今風葉又蕭蕭恨迢迢生查子煙雨晚晴天零落花無語難話此時心梁燕雙來去琴韻對薰風有恨和情撫腸斷斷絃頻淚滴黃金縷其二寂寞畫堂空深夜垂羅幕燈暗錦屏欹風冷珠簾薄愁恨夢難成何處看歡樂看看又春來還是長蕭索黃鐘樂池塘煙暖草萋萋惆悵間霄含恨愁坐思堪迷遙想玉人情事遠音容渾是隔桃溪偏記同歡秋月低簾外論心花畔和醉暗相携何事春來君不見夢魂長在錦江西漁歌子栁如眉雲似髮蛟綃霧縠籠香雪夢魂驚鍾漏歇窗外曉鶯殘月幾多情無處説落花飛絮清明節少年郎容易别一去音書斷絶􅎷虔戾四首臨江仙金鎖重門荒苑靜綺忩愁對秋空翠華一去寂無蹤玉樓歌吹聲斷已隨風煙月不知人事改夜闌還照深宫藕花相向野堂中暗傷亡國清露泣香紅其二無賴曉鶯驚夢斷起來殘酒𥘉醒映窗絲栁裊煙青翠簾慵卷約砌杏花零一自玉郎逰冶去蓮凋月慘儀形暮天微雨灑間庭手挼裙帶無語倚雲屏女冠子鳯樓琪樹惆悵劉郎一去正春深洞裏愁空結人間信莫尋竹踈齋殿逈松密醮壇隂倚雲低首望可知心其二步虗壇上絳莭霓旌相向引真仙玉珮搖蟾影金爐裊麝煙露濃霜簡􅊜風緊羽衣偏欲留難得住却歸天花間集卷十
