front:
  text: 花問集卷五
  hash: sha256:ee2621fdc3fbf94205e9c83764bcfbf14e2b60485037584477dd9aac9e155c96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_005-1a}
body:
  text: 牛嶠六首酒泉子記得去年烟暖杏園花正彂雪飄香江艸緑柳絲長鈿車纎手卷簾望眉學春山様鳯釵低褭翠鬟上落梅粧定西畨𬗋塞月明千里金甲冷戍樓寒梦長安鄉思望中天濶漏殘星亦殘画角數聲嗚咽雪漫漫玉樓春春入横塘揺淺浪花落小園空惆悵此情誰信為狂夫恨翠愁紅流枕上小玊牎前嗔燕語紅涙滴穿金線縷雁歸不見報郎歸織成錦字封過與西溪子捍撥㕠盤金鳯蝉鬂玉釵揺動画堂前人不語絃觧語弹到昭君怨䖏翠蛾愁不擡頭江城子鵁鶄飛𧺫郡城東碧江空半灘風越王宫殿蘋葉藕花中簾􅐈水樓漁浪𧺫千片雪雨𪷟濛其二極浦烟消水鳥飛離筵分首時送金巵渡口楊花狂雪任風吹日暮空江波浪急芳艸岸雨如絲張泌二十七首浣溪沙鈿轂香車過栁堤樺烟分䖏馬頻嘶為它沉醉不成泥花滿驛亭香露細杜䳌聲断玉蟾低含情無語倚樓西其二馬上凝情億舊逰絶芲淹竹小溪流鈿筝羅幕玉㮻頭早是出門長帶月可堪分𬒮又經秋晚風斜日不勝愁其三獨立寒堦望月華露濃香泛小庭花繡屛愁背一燈斜雲雨自從分散後人間無路到仙家但慿魂夣訪天涯其四依約殘眉理舊黄翠鬟抛擲一簮長暖風晴日罷朝粧閒折海棠看又撚玉纎無力惹餘香此情誰㑹倚斜陽其五翡翠屏開繡幄杠謝娥無力暁粧慵錦幃繡𬒳宿香濃㣲雨小庭春寂寞燕飛鶯語隔簾櫳杏芲凝恨倚東風其六枕障熏爐隔繡幃二年終日両相思杏花明月始應知天上人間何處去舊歡新梦覺來時黄昏㣲雨画簾垂其七花月香寒悄夜塵綺筵幽㑹暗傷神婵姢依約画屛人人不見時還暫語令纔抛後愛㣲顰越羅巴錦不勝香其八偏戴芲冠白玉簮睡容新𧺫意沉吟翠鈿金縷鎮眉心小檻日斜風悄悄隔簾零落杏芲隂㫁香䡖碧瑣愁㴱其九晚逐香車入鳯城東風斜掲繡簾䡖慢廻嬌眼咲盈盈消息未通何計是便湏佯醉且随行依稀聞道太狂生其十小市東門欲雪天衆中依約見神仙蘂黄香画帖金蝉飲散黄昏人艸艸醉容無語立門前馬嘶塵烘一街烟臨江仙煙收湘渚秋江静蕉芲露泣愁紅五雲㕠鶴去無踪幾廻魂㫁凝望向長空翠竹暗留珠淚怨閒調寳瑟波中芲鬟月鬂緑雲重古祠深殿香冷雨和風女冠子露花烟艸寂寞五雲三島正春深貌减濳消玉香殘尚惹襟竹踈虗檻静松宻醮壇隂何事劉郎去信沉沉河傳渺莾雲水惆悵暮㠶去程迢逓夕陽芳艸千里萬里雁聲無限𧺫梦魂悄㫁烟波裡心如醉相見何䖏是錦屛香冷無睡𬒳頭多少淚其二紅杏交枝相映宻密𪷟濛一庭濃艶倚東風香融透簾櫳斜陽似共春光語蝶争舞更引流鶯妬魂銷千片玊罇前神仙瑶池酔暮天酒泉子春雨打窓驚梦覺來天氣暁画堂㴱紅熖小背蘭缸酒香噴鼻懶開缸惆悵更無人共醉舊巢中新燕子語㕠㕠其二𬗋陌青門三十六官春色御溝輦路暗相通杏園風咸陽沽酒寳釵空咲指未央歸去挿芲走馬落殘紅月明中生查子相見稀喜相見相見還相逺檀画荔枝紅金蔓蜻蜓軟魚雁踈芳信㫁花落庭隂晚可惜玊肌膚銷瘦成慵懶思越人燕㕠飛鶯百囀越波堤下長橋闘鈿花筐金匣恰舞衣羅薄纎腰東風澹蕩慵無力黛眉愁聚春碧滿地落花無消息月明腸㫁空憶滿宫花花正芳樓似綺寂寞上陽宫裡鈿籠金瑣睡鴛鴦簾冷露華珠翠嬌艶䡖盈香雪膩細雨黄鶯㕠𧺫東風惆悵欲清明公子橋邊沉醉柳枝膩粉瓊粧透碧紗雪休誇金鳳搔頭墜鬂斜髮交加倚着雲屏新睡覺思梦笑紅腮隱出枕凾花有些些南歌子柳色遮樓暗桐花落砌香画堂開處逺風凉高卷水精簾額襯斜陽其二㟁栁拖烟緑庭花照日紅數聲蜀魄入簾櫳驚㫁碧窓殘梦画屏空其三錦薦紅􅗌鶒羅衣繡鳯皇綺踈飄雪北風狂䈴幕晝垂無事鬰金香江城子碧欄干外小庭中雨初晴暁鶯聲飛絮落芲時莭近清明睡𧺫卷簾無一事勻面了沒心情其二浣花溪上見卿卿臉波秋水明黛眉䡖緑雲高綰金簇小蜻蜓好是問他來得麽和咲道莫多情河瀆神古樹噪寒鴉滿庭楓葉蘆花晝燈當午隔䡖紗画閣珠簾影斜門外徃來祈賽客翩翩㠶落天涯迴首隔江烟火渡頭三両人家胡蝶児胡蝶兒晚春時阿嬌𥘉着淡黄衣倚窓學画伊還似花間見㕠㕠對對飛無端和淚拭胭脂惹教㕠翅垂毛文錫八首虞美人鴛鴦對浴銀塘暖水面蒲梢短垂楊低拂麴塵波蛟絲結網露珠多滴圎荷遥思桃葉呉江碧便是天河隔錦鱗紅鬛影沉沉相思空有梦相㝷意難任其二寳檀金縷鴛鴦枕綬帶盤宮錦夕陽低映小牎明南園緑樹語鶯鶯夣難成玉鑪香暖頻添炷滿地飄䡖絮珠簾不捲度沉烟庭前閒立画鞦韆艶陽天酒泉子緑樹春深燕語鶯啼聲㫁續蕙風飄蕩入芳叢惹殘紅柳絲無力褭烟空金盞不辭湏滿酌海棠芲下思朦朧醉香風喜鶯遷芳春景曖晴煙喬木見鶯遷傳枝隈葉語関関飛過綺叢間錦翼鮮金毳軟百囀千嬌相喚碧紗牎曉怕聞聲驚破鴛鴦暖替成功海棠未坼萬點深紅香包緘結一重重似含羞態邀勒春風蜂來蝶去任遶芳叢昨夜微雨飄􅎈庭中忽聞聲滳井邊桐美人驚𧺫㘴聴晨鍾快教折取戴玊瓏璁西溪子昨夜西溪逰賞芳樹竒芲千様瑣春光金罇滿聴絃管嬌妓舞衫香暖不覺到斜暉馬䭾歸中興樂荳䓻花繁烟艶深丁香軟結同心翠鬟女相與共淘金紅蕉葉裡猩猩語鴛鴦浦鏡中鸞舞絲雨隔荔枝隂更漏子春夜䦨春恨切花外子規啼月人不見梦難慿紅紗一點燈偏怨别是芳節庭下丁香半結宵霧散曉霞輝梁間㕠燕飛花間集卷五
