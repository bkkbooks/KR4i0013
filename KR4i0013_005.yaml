front:
  text: 花問集卷五
  hash: sha256:ee2621fdc3fbf94205e9c83764bcfbf14e2b60485037584477dd9aac9e155c96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_005-1a}
body:
  text: 牛嶠六首酒泉子記得去年煙暖杏園花正彂雪飄香江草緑柳絲長鈿車纎手卷簾望眉學春山樣鳯叉低裊翠鬟上落梅粧定西畨𬗋塞月明千里金甲冷戍樓寒夢長安鄉思望中天濶漏殘星亦殘畫角數聲嗚咽雪漫漫玉樓春春入橫塘搖淺浪花落小園空惆悵此情誰信為狂夫恨翠愁紅流枕上小玊窗前嗔燕語紅淚滴穿金線縷雁歸不見報郎歸織成錦字封過與西溪子捍撥雙盤金鳯蟬鬢玉叉搖動畫堂前人不語絃解語彈到昭君怨處翠蛾愁不擡頭江城子鵁鶄飛起郡城東碧江空半灘風越王宫殿蘋葉藕花中簾􅐈水樓漁浪起千片雪雨𪷟濛其二極浦煙消水鳥飛離筵分首時送金巵渡口楊花狂雪任風吹日暮空江波浪急芳草岸雨如絲張泌二十七首浣溪沙鈿轂香車過栁堤樺煙分處馬頻嘶為它沉醉不成泥花滿驛亭香露細杜鵑聲斷玉蟾低含情無語倚樓西其二馬上凝情億舊逰絶花淹竹小溪流鈿筝羅幕玉㮻頭早是出門長帶月可堪分𬒮又經秋晚風斜日不勝愁其三獨立寒階望月華露濃香泛小庭花繡屛愁背一燈斜雲雨自從分散後人間無路到仙家但慿魂夢訪天涯其四依約殘眉理舊黃翠鬟拋擲一簮長暖風晴日罷朝粧間折海棠看又撚玉纎無力惹餘香此情誰會倚斜陽其五翡翠屏開繡幄杠謝娥無力曉粧慵錦幃繡𬒳宿香濃微雨小庭春寂寞燕飛鶯語隔簾櫳杏花凝恨倚東風其六枕障熏爐隔繡幃二年終日兩相思杏花明月始應知天上人間何處去舊歡新夢覺來時黃昏微雨畫簾垂其七花月香寒悄夜塵綺筵幽會暗傷神嬋姢依約畫屛人人不見時還暫語令才拋後愛微顰越羅巴錦不勝香其八偏戴花冠白玉簮睡容新起意沉吟翠鈿金縷鎮眉心小檻日斜風悄悄隔簾零落杏花隂斷香輕碧瑣愁深其九晚逐香車入鳯城東風斜揭繡簾輕慢回嬌眼笑盈盈消息未通何計是便須佯醉且隨行依稀聞道太狂生其十小市東門欲雪天衆中依約見神仙蘂黃香畫帖金蟬飲散黃昏人草草醉容無語立門前馬嘶塵烘一街煙臨江仙煙收湘渚秋江靜蕉花露泣愁紅五雲雙鶴去無蹤幾回魂斷凝望向長空翠竹暗留珠淚怨間調寶瑟波中花鬟月鬢緑雲重古祠深殿香冷雨和風女冠子露花煙草寂寞五雲三島正春深貌減濳消玉香殘尚惹襟竹踈虗檻靜松密醮壇隂何事劉郎去信沉沉河傳渺莾雲水惆悵暮帆去程迢遞夕陽芳草千里萬里雁聲無限起夢魂悄斷煙波裡心如醉相見何處是錦屛香冷無睡𬒳頭多少淚其二紅杏交枝相映密密𪷟濛一庭濃艷倚東風香融透簾櫳斜陽似共春光語蝶爭舞更引流鶯妬魂銷千片玊樽前神仙瑶池醉暮天酒泉子春雨打窗驚夢覺來天氣曉畫堂深紅熖小背蘭缸酒香噴鼻懶開缸惆悵更無人共醉舊巢中新燕子語雙雙其二𬗋陌青門三十六官春色御溝輦路暗相通杏園風咸陽沽酒寶叉空笑指未央歸去插花走馬落殘紅月明中生查子相見稀喜相見相見還相逺檀畫荔枝紅金蔓蜻蜓軟魚雁踈芳信斷花落庭隂晚可惜玊肌膚銷瘦成慵懶思越人燕雙飛鶯百囀越波堤下長橋鬪鈿花筐金匣恰舞衣羅薄纎腰東風淡蕩慵無力黛眉愁聚春碧滿地落花無消息月明腸斷空憶滿宫花花正芳樓似綺寂寞上陽宫裡鈿籠金瑣睡鴛鴦簾冷露華珠翠嬌艷輕盈香雪膩細雨黃鶯雙起東風惆悵欲清明公子橋邊沉醉柳枝膩粉瓊粧透碧紗雪休誇金鳳搔頭墜鬢斜髮交加倚著雲屏新睡覺思夢笑紅腮隱出枕函花有些些南歌子柳色遮樓暗桐花落砌香畫堂開處逺風涼高卷水精簾額襯斜陽其二岸栁拖煙緑庭花照日紅數聲蜀魄入簾櫳驚斷碧窗殘夢畫屏空其三錦薦紅􅗌鶒羅衣繡鳯皇綺踈飄雪北風狂䈴幕晝垂無事鬱金香江城子碧欄干外小庭中雨初晴曉鶯聲飛絮落花時莭近清明睡起卷簾無一事勻面了沒心情其二浣花溪上見卿卿臉波秋水明黛眉輕緑雲高綰金簇小蜻蜓好是問他來得麼和笑道莫多情河瀆神古樹噪寒鴉滿庭楓葉蘆花晝燈當午隔輕紗畫閣珠簾影斜門外往來祈賽客翩翩帆落天涯回首隔江煙火渡頭三兩人家胡蝶兒胡蝶兒晚春時阿嬌𥘉著淡黃衣倚窗學畫伊還似花間見雙雙對對飛無端和淚拭胭脂惹教雙翅垂毛文錫八首虞美人鴛鴦對浴銀塘暖水面蒲梢短垂楊低拂麴塵波蛟絲結網露珠多滴圎荷遙思桃葉吳江碧便是天河隔錦鱗紅鬛影沉沉相思空有夢相尋意難任其二寶檀金縷鴛鴦枕綬帶盤宮錦夕陽低映小窗明南園緑樹語鶯鶯夢難成玉爐香暖頻添炷滿地飄輕絮珠簾不捲度沉煙庭前間立畫鞦韆艷陽天酒泉子緑樹春深燕語鶯啼聲斷續蕙風飄蕩入芳叢惹殘紅柳絲無力裊煙空金盞不辭須滿酌海棠花下思朦朧醉香風喜鶯遷芳春景曖晴煙喬木見鶯遷傳枝隈葉語關關飛過綺叢間錦翼鮮金毳軟百囀千嬌相喚碧紗窗曉怕聞聲驚破鴛鴦暖替成功海棠未坼萬點深紅香包緘結一重重似含羞態邀勒春風蜂來蝶去任繞芳叢昨夜微雨飄􅎈庭中忽聞聲滳井邊桐美人驚起坐聽晨鍾快教折取戴玊瓏璁西溪子昨夜西溪逰賞芳樹竒花千樣瑣春光金樽滿聽絃管嬌妓舞衫香暖不覺到斜暉馬馱歸中興樂豆䓻花繁煙艷深丁香軟結同心翠鬟女相與共淘金紅蕉葉裡猩猩語鴛鴦浦鏡中鸞舞絲雨隔荔枝隂更漏子春夜闌春恨切花外子規啼月人不見夢難慿紅紗一點燈偏怨别是芳節庭下丁香半結宵霧散曉霞輝梁間雙燕飛花間集卷五
