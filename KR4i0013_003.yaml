front:
  text: 花間集卷三
  hash: sha256:c95208f4c2eda343134386870de0b403922b86d4238440fac6a8a9fecf199fae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_003-1a}
body:
  text: 韋莊三十七首歸國遙春欲暮滿地落花紅帶雨惆悵玉籠鸚鵡單棲無伴侶南望去程何許問花花不語早晚得同歸去恨無雙翠羽其二金翡翠為我南飛傳我意罨畫橋邉春水幾年花下醉别後只知相愧淚珠難逺寄羅幕繡幃鴛𬒳舊歡如夢裡其三春欲曉戲蝶逰蜂花爛熳日落謝家池館栁絲金縷斷睡覺緑鬟風亂畫屏雲雨散間倚慱山長嘆淚流沾皓腕應天長緑槐隂裡黃鶯語深院無人春晝午畫簾垂金鳳舞寂寞繡屏香一炷碧天雲無定處空有夢魂來去夜夜緑窗風雨斷腸君信否其二别來半歲音書絶一寸離腸千萬結難相見易相别又是玊樓花似雪暗相思無處説惆悵夜來煙月想淂此時情切淚沾紅袖黦荷葉杯絶代佳人難得傾國花下見無期一雙愁黛逺山眉不忍更思惟間掩翠屏金鳯殘夢羅幕畫堂空碧天無路信難通惆悵舊房櫳其二記得那年花下深夜𥘉識謝娘時水堂西面畫簾垂携手暗相期惆悵曉鶯殘月相别從此隔音塵如今俱是異鄉人相見更無因清平樂春愁南陌故國音書隔細雨霏霏梨花白燕拂畫簾金額盡日相望王孫塵滿衣上淚痕誰向橋邉吹笛駐馬西望銷魂其二野花芳草寂寞關山道桞吐金絲鶯語早惆悵香閨暗老羅帶悔結同心獨憑朱欄思深夢覺半床斜月小窗風觸鳴琴其三何處逰女蜀國多雲雨雲解有情花解語窣地繍羅金縷粧成不整金鈿含羞待月鞦韆住在緑槐隂裡門臨春水橋邉其四鶯啼殘月繡閣香燈滅門外馬嘶郎欲别正是落花時節粧成不畫蛾眉含愁獨倚金屝去路香塵莫掃掃即郎去歸遲望逺行欲别無言倚畫屏含恨暗傷情謝家庭樹錦雞鳴殘月落邉城人欲别馬頻嘶緑槐千里長堤出門芳草路萋萋雲雨别來易東西不忍别君後却入舊香閨謁金門春漏促金燼暗桃殘燭一夜簾前風撼竹夢魂相斷續有個嬌嬈如玉夜夜繍屏孤宿間抱琵琶尋舊曲逺山眉黛緑其二空相憶無計得傳消息天上嫦娥人不識寄書何處覔新睡覺來無力不忍把伊書迹滿院落花春寂寂斷腸芳草碧江城子恩重嬌多情易傷漏更長解鴛鴦朱唇未動先覺口脂香緩揭繡衾抽皓腕移鳯枕枕潘郎其二髻鬟狼籍黛眉長出蘭房别檀郎角聲嗚咽星斗漸微茫露冷月殘人未起留不住淚千行河傳何處煙雨隋堤春暮栁色蔥蘢畫撓金縷翠旗髙颭香風水光融青娥殿腳春粧媚輕雲裡綽約司花妓江都宫闕清淮月映迷樓古今愁其二春晚風暖錦城花滿狂殺逰人玊鞭金勒尋勝馳驟輕塵惜良晨翠娥爭勸臨卭酒纎纎手拂面垂絲栁歸時煙裏鍾鼓正是黃昏暗銷魂其三錦浦春女繍衣金縷霧薄雲輕花深柳暗時節正是淸明雨𥘉晴玊鞭魂斷煙霞路鶯鶯語一望巫山雨香塵隱映遙見翠檻紅樓黛眉愁天仙子悵望前回夢裡期看花不語苦尋思露桃宫裏小腰肢眉眼細鬢雲垂惟有多情宋玊知其二深夜歸來長酩酊扶入流蘇猶未醒醺醺酒氣麝蘭和驚睡覺笑呵呵長道人生能幾何其三蟾彩霜華夜不分天外鴻聲枕上聞繡衾香冷懶重熏人寂寂葉紛紛才睡依前夢見君其四夢覺雲屏依舊空杜鵑聲咽隔簾櫳玊郎薄幸去無蹤一日日恨重重淚界蓮腮兩線紅其五金似衣裳玊似身眼如秋水鬢如雲霞裙月帔一群群來洞口望煙分劉阮不歸春日曛喜鶯遷人洶洶鼓鼕鼕襟袖五更風大羅天上月朦朧騎馬上虗空香滿衣雲滿路鸞鳳繞身飛舞霓旌絳節一群群引見玉華君其二街鼓動禁城開天上探人廽鳳銜金榜出雲來平地一聲雷鶯已遷龍已化一夜滿城車馬家家樓上簇神仙爭看鶴沖天思帝鄉雲髻墜鳯叉垂髻墜叉垂無力枕函欹翡翠屏深月落漏依依説盡人間天上兩心知其二春日逰杏花吹滿頭陌上誰家年少足風流妾擬將身嫁與一生休縱𬒳無情棄不能羞訴中情燭燼香殘簾未􅐈夢𥘉驚花欲謝深夜月朧明何處按歌聲輕輕舞衣塵暗生負春情其二碧沼紅芳煙雨靜倚蘭橈垂玊珮交帶裊纎腰鴛夢隔星橋迢迢越羅香暗銷墜花翹上行杯芳草灞陵春岸桞煙深滿樓絃管一曲離聲腸寸斷今日送君千萬紅鏤玊盤金鏤盞須勸珍重意莫辭滿其二白馬玊鞭金轡少年郎離别容易迢遞去程千萬里惆悵異鄉雲水滿酌一杯勸和淚須愧珍重意莫辭醉女冠子四月十七正是去年今日别君時忍淚佯低面含羞半斂眉不知魂巳斷空有夢相隨却除天邊月沒人知其二昨夜夜半枕上分明夢見語多時依舊桃花面頻低柳葉眉半羞還半喜欲去又依依覺來知是夢不勝悲更漏子鍾鼓寒樓閣瞑月照古桐金井深院閉小庭空落花香露紅煙桞重春霧薄燈背水窗高閣間倚户暗沾衣待郎郎不歸酒泉子月落星沉樓上美人春睡緑雲傾金枕膩畫屏深子規啼破相思夢曙色東方才動栁煙輕花露重思難任木蘭花獨上小樓春欲暮愁望玊關芳草路消息斷不逢人却斂細眉歸繡户坐看落花空嘆息羅𬒮濕斑紅淚滴千山萬水不曾行魂夢欲教何處覓小重山一閉昭陽春又春夜寒更漏永夢君恩臥思陳事暗消魂羅衣濕紅𬒮有啼痕歌吹隔重閽繞庭芳草緑倚長門萬般惆悵向誰論凝情立宫殿欲黃昏花間集卷三
