front:
  text: 花間集卷三
  hash: sha256:c95208f4c2eda343134386870de0b403922b86d4238440fac6a8a9fecf199fae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_003-1a}
body:
  text: 韋荘三十七首歸國遥春欲暮滿地落花紅帶雨惆悵玉籠鸚鵡单棲無伴侶南望去程何許問芲花不語早晚得同歸去恨無㕠翠羽其二金翡翠爲我南飛傳我意罨画橋邉春水㡬年花下醉别後只知相愧淚珠難逺寄羅幕綉幃鴛𬒳舊歡如夣裡其三春欲暁戯蝶逰蜂芲爛熳日落謝家池舘栁絲金縷㫁睡覺緑鬟風亂画屏雲雨散閒倚慱山長嘆淚流沾皓腕應天長緑槐隂裡黄鶯語深院無人春晝午画簾垂金鳳舞寂寞綉屏香一炷碧天雲無定處空有夣魂來去夜夜緑牎風雨㫁腸君信否其二别來半歲音書絶一寸離腸千萬結難相見易相别又是玊樓花似雪暗相思無處說惆悵夜來烟月想淂此時情切淚沾紅䄂黦荷葉杯絶代佳人難得傾國芲下見無期一㕠愁黛逺山眉不忍更思惟閒掩翠屏金鳯殘夣羅幕画堂空碧天無路信難通惆悵舊房櫳其二記得那年芲下深夜𥘉識謝娘時水堂西面画簾垂携手暗相期惆悵曉鶯殘月相别從此隔音塵如今俱是異鄉人相見更無因清平樂春愁南陌故國音書隔細雨霏霏梨芲白燕拂画簾金額盡日相望王孫塵滿衣上淚痕誰向橋邉吹笛駐馬西望銷魂其二野花芳艸寂寞関山道桞吐金絲鶯語早惆悵香閨暗老羅帶悔結同心獨凭朱欄思深夣覺半床斜月小牎風觸鳴琴其三何處逰女蜀國多雲雨雲觧有情花觧語窣地繍羅金縷粧成不整金鈿含羞待月鞦韆住在緑槐隂裡門臨春水橋邉其四鶯啼殘月綉閣香燈滅門外馬嘶郎欲别正是落芲時節粧成不画蛾眉含愁獨倚金屝去路香塵莫掃掃即郎去歸遟望逺行欲别無言倚画屏含恨暗傷情謝家庭樹錦雞鳴殘月落邉城人欲别馬頻嘶緑槐千里長堤出門芳艸路萋萋雲雨别來易東西不忍别君後却入舊香閨謁金門春漏促金燼暗桃殘燭一夜簾前風撼竹夢魂相㫁續有個嬌嬈如玉夜夜繍屏孤宿閒抱琵琶㝷舊曲逺山眉黛緑其二空相憶無計得傳消息天上嫦娥人不識寄書何處覔新睡覺來無力不忍把伊書跡滿院落花春寂寂㫁腸芳艸碧江城子㤙重嬌多情易傷漏更長觧鴛鴦朱唇未動先覺口脂香緩揭綉衾抽皓腕移鳯枕枕潘郎其二髻鬟狼籍黛眉長出蘭房别檀郎角聲嗚咽星斗漸微茫露冷月殘人未𧺫留不住淚千行河傳何處烟雨隋堤春暮栁色葱蘢画撓金縷翠旗髙颭香風水光融青娥殿脚春粧媚䡖雲裡綽約司花妓江都宫闕清淮月映迷樓古今愁其二春晚風暖錦城花滿狂殺逰人玊鞭金勒㝷勝馳驟䡖塵惜良晨翠娥争勸臨卭酒纎纎手拂面垂絲栁歸時烟裏鍾鼓正是黃昏暗銷魂其三錦浦春女繍衣金縷霧薄雲輕芲深柳暗時節正是淸明雨𥘉晴玊鞭魂㫁煙霞路鶯鶯語一望巫山雨香塵隱映遥見翠檻紅樓黛眉愁天仙子悵望前囬夣裡期㸔花不語苦㝷思露桃宫裏小腰肢眉眼細鬂雲垂惟有多情宋玊知其二深夜歸來長酩酊扶入流蘇猶未醒醺醺酒氣麝蘭和驚睡覺咲呵呵長道人生能㡬何其三蟾彩霜華夜不分天外鴻聲枕上聞綉衾香冷嬾重熏人寂寂葉紛紛纔睡依前夣見君其四夣覺雲屏依舊空杜䳌聲咽隔簾櫳玊郎薄倖去無踪一日日恨重重淚界蓮腮両線紅其五金似衣裳玊似身眼如秋水鬂如雲霞裙月帔一群群來洞口望煙分劉阮不歸春日曛喜鶯遷人洶洶鼓鼕鼕襟袖五更風大羅天上月朦朧騎馬上虗空香滿衣雲滿路鸞鳳遶身飛舞霓旌絳節一群群引見玉華君其二街鼓動禁城開天上探人廽鳳衘金牓出雲來平地一聲雷鶯已遷龍已化一夜滿城車馬家家樓上簇神仙争㸔鶴冲天思帝郷雲髻墜鳯釵垂髻墜釵垂無力枕函欹翡翠屏深月落漏依依說盡人間天上両心知其二春日逰杏花吹滿頭陌上誰家年少足風流妾擬将身嫁與一生休縦𬒳無情棄不能羞訴中情燭燼香殘簾未􅐈夣𥘉驚花欲謝深夜月朧明何處按歌聲輕輕舞衣塵暗生負春情其二碧沼紅芳烟雨静倚蘭橈垂玊珮交帶褭纎腰鴛梦隔星橋迢迢越羅香暗銷墜花翹上行盃芳艸㶚陵春㟁桞烟深滿樓絃管一曲離聲腸寸㫁今日送君千萬紅鏤玊盤金鏤盞須勸珍重意莫辭滿其二白馬玊鞭金轡少年郎離别容易迢逓去程千萬里惆悵異鄉雲水滿酌一盃勸和淚湏愧珍重意莫辭醉女冠子四月十七正是去年今日别君時忍淚佯低面含羞半歛眉不知魂巳㫁空有梦相随却除天邊月没人知其二昨夜夜半枕上分明夢見語多時依舊桃花面頻低桺葉眉半羞還半喜欲去又依依覺來知是夢不勝悲更漏子鍾鼓寒樓閣瞑月照古桐金井深院閉小庭空落花香露紅烟桞重春霧薄燈背水窓高閣閒倚户暗沾衣待郎郎不歸酒泉子月落星沉楼上美人春睡緑雲傾金枕膩画屏深子規啼破相思夣曙色東方纔動栁烟䡖花露重思難任木蘭花獨上小楼春欲暮愁望玊関芳艸路消息㫁不逢人却歛細眉歸綉户㘴㸔落花空嘆息羅𬒮濕斑紅淚滴千山萬水不曾行魂夢欲教何處覓小重山一閉昭陽春又春夜寒更漏永夣君恩臥思陳事暗消魂羅衣濕紅𬒮有啼痕歌吹隔重閽遶庭芳草緑倚長門萬般惆悵向誰論凝情立宫殿欲黄昏花間集卷三
