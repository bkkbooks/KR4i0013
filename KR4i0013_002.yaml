body:
  text: 溫廷筠二十二首河瀆神河上望􅓜祠廟前春雨來時楚山無限鳥飛遲蘭棹空傷别離何處杜鵑啼不歇艷紅開盡如血蟬鬢美人愁絶百花芳草佳節其二孤廟對寒潮西陵風雨蕭蕭謝娘惆悵倚蘭橈淚流玊筯千條暮天愁聽思歸樂早梅香滿山郭回首兩情蕭索離魂何處飄泊其三銅鼓賽神來滿庭幡蓋徘徊水村江浦過風雷楚山如畫煙開離别櫓聲空蕭索玊容惆悵粧薄青麥燕飛落落捲簾愁對珠閣女冠子含嬌含笑宿翠殘紅窈窕鬢如蟬寒玊簮秋水輕紗捲碧煙雪胸鵉鏡裏琪樹鳳樓前寄語青娥伴早求仙其二霞帔雲髮鈿鏡仙容似雪畫愁眉遮語回輕扇含羞下翠幃玊樓相望久花洞恨來遲早晚乘鸞去莫相遺玉胡蝶秋風凄切傷離行客未歸時塞外草先衰江南雁到遲芙容雕嫩臉楊栁墮新眉搖落使人悲斷腸誰得知清平樂上陽春晚宫女愁蛾淺新歲清平思同輦爭奈長安路逺鳯帳鴛𬒳徒燻寂寞花瑣千門􅔡把黃金買賦為妾將上明君其二洛陽愁絶楊栁花飄雪終日行人恣攀折橋下水流嗚咽上馬爭勸離觴南浦鶯聲斷腸愁殺平原年少回首揮淚千行遐方怨憑繡檻解羅幃未得君書斷腸瀟湘春雁飛不知征馬幾時歸海棠花謝也雨霏霏其二花半折雨𥘉晴未捲珠簾夢殘惆悵聞曉鶯宿粧眉淺粉山橫約鬟鵉鏡裏繍羅輕訴衷情鶯語花舞春晝午雨霏微金帶枕宫錦鳳皇帷弱栁暗交飛依依遼陽音信稀夢中歸思帝鄊花花滿枝紅似霞羅袖畫簾腸斷卓香車廽面共人間語戰箆金鳳斜唯有阮郎春盡不歸家蘿江南千萬恨恨極在天涯山月不知心裡事水風空落眼前花搖曳碧雲斜其二梳洗罷獨倚望江樓過盡于帆皆不是斜暉脈脈水悠悠腸斷白蘋洲河傳江畔相喚曉粧鮮􅋖景箇女採蓮請君莫向那岸邉少年好花新滿船紅袖搖曵逐風暖垂玉腕腸向桞絲斷浦南歸浦北歸莫知晚來人已稀其二湖上間望雨蕭蕭煙浦花橋路遙謝娘翠娥愁不銷終朝夢魂迷晚潮蕩子天涯歸棹逺春巳晚鶯語空腸斷若耶溪溪水西栁堤不聞郎馬嘶其三同伴相喚杏花稀蘿裡每愁依違仙客一去燕巳飛不歸淚痕空滿衣天際雲鳥引情逺春巳晚煙靄渡南苑雪梅香栁帶長小娘轉令人意傷蕃女怨萬枝春雪開巳遍細雨雙燕鈿蟬筝金雀扇畫梁相見雁門消息不歸來又飛回其二磧南沙上驚雁趣飛雪千里玊連環金鏃箭年年征戰畫樓離恨錦屏空杏花紅荷葉杯一點露珠凝冷波影滿池塘緑莖紅艷雨相亂腸斷水風涼其二鏡水夜來秋月如雪採蓮時小娘紅粉對寒浪惆悵正思惟其三楚女欲歸南浦朝雨濕愁紅小船搖樣入花裡波起隔西風皇甫松十一首天􅋖子晴野鷺鷥飛一隻水葓花彂秋江碧劉郎此日别天􅋖登綺席淚珠滴十二晚峰髙歷歷其二躑躅花開紅照水鷓鴣飛繞青山觜行人經歲始歸來千萬里錯相遺懊惱天仙應有以浪淘沙灘頭細草接踈林浪惡罾船半欲沉宿鷺眠鷗非舊浦去年沙觜是江心其二蠻歌豆􅞦北人愁蒲雨杉風野艇秋浪起鵁鶄眠不淂寒沙細細入江流楊栁枝春入行宫映翠微玄宗侍女舞煙絲如今桞向空城緑玊笛何人更把吹其二爛熳春歸水國時吳王宫殿栁絲垂黃鶯常呌空閨畔西子無因更得知􅎥得新酌一巵須教玊笛吹錦筵紅蠟燭莫來遲繁紅一夜經風雨是空枝其二摘得新枝枝葉葉春管絃兼美酒最關人平生都得幾十度展香茵夢江南蘭燼落屏上暗紅蕉間夢江南梅熟日夜船吹笛雨蕭蕭人語驛邉橋其二樓上寢殘月下簾旌夢見秣陵惆悵事桃花栁絮滿江城雙髻坐吹笙採蓮子菡萏香連十頃陂舉棹小姑貪戲採蓮遲年少晚來㺯水船頭濕舉棹更脫紅裙裹鴨免年少船頭湖色灔灔秋舉棹貪看年少信船流年少無端隔水拋蓮子舉棹遙𬒳人知半日羞年少韋莊十首浣溪沙淸曉粧成寒食天栁毬斜裊間花鈿捲簾直出畫堂前指點牡丹𥘉綻朵日髙猶自憑朱欄含嚬不語恨春殘其二欲上鞦韆四體慵擬教人送又心忪畫堂簾幕月明風此夜有情誰不極隔墻梨雪又玲瓏玉容憔悴惹微紅其三惆悵蘿餘三月斜孤燈照壁背窗紗小樓髙閣謝娘家暗想玊容何所似一枝春雪凍梅花滿身香霧簇朝霞其四緑樹藏鶯鶯正啼栁絲斜拂白銅堤㺯珠江上草萋萋日暮飲歸何處客繡鞍驄馬一聲嘶滿身蘭麝醉如泥其五夜夜相思更漏殘傷心明月憑闌千想君思我錦衾寒咫尺畫堂深似海憶來惟把舊書看幾時携手入長安菩薩蠻紅樓别夜堪惆悵香燈半捲流蘇帳殘月出門時美人和淚辭琵琶金翠羽絃上黃鶯語勸我早歸家緑窗人似花其二人人盡説江南好逰人只合江南老春水碧于天畫船聽雨眠爐邉人似月皓腕凝雙雪未老莫還鄉還鄉須斷腸其三如今却憶江南樂當時年少春衫薄騎馬倚斜橋滿樓紅袖招翠屏金屈曲醉入花叢宿此度見花枝白頭誓不歸其四勸君今夜須沉醉樽前莫話明朝事珍重主人心酒深情亦深須愁春漏短莫訴金杯滿遇酒且呵呵人生能幾何其五洛陽城裡春光好洛陽才子他鄉老栁暗魏王堤此時心轉迷桃花春水渌水上鴛鴦浴凝恨對殘暉憶君君不知花間集卷二花間集輔卷下白樂天八首長相思深畫眉淺畫眉蟬鬢鬅鬙雲滿衣陽臺行雨回巫山高巫山低暮雨瀟瀟郎不歸空房獨守時其二汴水流泗水流流到瓜州古渡頭吳山點點愁思悠悠恨悠悠恨到歸時方始休月明人倚樓憶江南江南好風景舊曽諳日出江花勝火紅春來江水緑如藍能不憶江南其二江南憶最憶是杭州山寺月中尋桂子郡亭枕上看潮頭何日更重逰其三江南憶其次憶吳宮吳酒一杯春竹葉吳娃雙舞醉芙蓉早晚復相逄楊栁枝依依嫋嫋復青青勾引春風無限情白雪花蘩空撲地絲絲條弱不勝鶯其二紅板紅橋買酒旗館娃宮暖日斜時可憐雨歇東風定萬樹千條各自垂竹枝詞瞿塘峽口冷煙低白帝城頭月向西唱到竹枝聲咽處寒猿晴鳥一時啼薛能一首楊栁枝和風煙雨九重城夾路春隂十里營惟向邉頭不堪望一株憔悴少人行徐昌圗一首木蘭花令沉檀煙起盤紅霧一剪霜風吹繡户漢宫花面學梅粧謝女雪詩裁栁絮長垂天幕孤鵉舞旋炙銀笙雙鳯語紅窗酒病對寒氷永覺相思無夢處伎劉燕哥一首太常引故人别我出陽關無計鎖雕鞍今古别離難兀誰畫蛾眉逺山一樽别酒一聲杜宇寂寞又春殘明月小樓間苐一夜相思淚彈無名氏二首後庭宴千里故鄉十年華屋亂魂飛過屏山簇眼重眉褪不勝春菱花知我銷香玉雙雙燕子歸來應解笑人幽獨斷歌零舞遺恨清江曲萬樹緑低迷一庭紅撲簌撲蝴蝶煙條雨葉緑遍江南岸思歸􅌒客尋芳來較晚岫邉紅日𥘉斜陌上花飛正滿凄涼數聲羌管怨春短玉人應在眀月樓中畫眉懶蠻箋錦字多時魚雁斷恨隨去水東流事與行雲共逺羅衾舊香猶暖李中主一首望逺行碧砌花光照眼明朱扉長日鎮長扄餘寒欲去夢難成爐香煙冷自亭亭遼陽月秣陵砧不傳消息但傳情黃金臺下忽然驚征人歸日二毛生李後主十四首搗練子雲鬢亂晚粧殘帶恨眉兒逺岫攢斜托杏腮春笋嫩為誰和淚倚闌干長相思一重山兩重山山遠天髙煙水寒相思楓葉丹菊花開菊花殘塞雁高飛人未還一簾風月間烏夜啼無言獨上西樓月如鈎寂寞梧桐深院鎖清秋剪不斷理還亂是離愁别是一般滋味在心頭菩薩蠻銅簧韻脆鏘寒竹新聲慢奏移纎玉眼色暗相鈎秋波橫欲流雨雲深繡户來便諧衷素宴罷又成空夢迷春睡中浣溪沙紅日已高三丈透金爐次苐添香獸紅錦地衣隨步皺佳人舞點金叉溜酒惡時拈花蕊嗅别殿遙聞簫鼓奏醜奴兒令轆轤金井梧桐晚幾樹驚秋晝雨如愁百尺蝦須上玉鈎瓊窗春斷雙娥皺回首邉頭欲寄鱗逰九曲寒波不泝流阮郎歸東風吹水日御山春來長是間落花狼籍酒闌珊笙歌醉夢間春睡覺晚粧殘無人整翠鬟留連光景惜朱顔黃昏人倚闌山花子􅔽蓞香銷翠葉殘西風愁起緑波間還與韶光共憔悴不堪看細雨夢回雞塞逺小樓吹徹玉笙寒多少淚珠何限恨倚闌干其二手捲珠簾上玉鈎依前春恨鎖重樓風裡落花誰似主思悠悠青鳥不傳雲外信丁香空結雨中愁回首緑波三峽暮接天流浪淘沙簾外雨潺潺春意闌珊羅衾不暖五更寒夢裡不知身是客一餉貪歡獨自暮憑闌無限江山别時容易見時難流水落花歸去也天上人間望江南多少恨昨夜夢魂中還是舊時逰上苑車如流水馬如龍花月正春風多少淚斷臉復橫頤心事莫將和淚説鳳笙休向淚時吹腸斷更無疑虞美人春月秋月何時了往事知多少小樓昨夜又東風故國不堪回首月明中雕欄玉砌應猶在只是朱顔改問君還有幾多愁恰似一江春水向東流玉樓春晚粧𥘉了明肌雪春殿嬪娥魚貫列笙簫吹斷水雲間重按霓裳歌遍徹臨春誰更飄香屑醉拍闌千情未切歸時體照燭花紅待放馬蹄清夜月一斛珠晚粧初過沉檀輕注些免箇向人微露了香顆一曲清歌暫引櫻桃破羅袖裛殘殷色可杯深旋𬒳香膠涴繡床斜憑嬌無那爛嚼紅茸笑向郎唾馮延巳三首謁金門風乍起吹皺一池春水間引鴛鴦香徑裏手挼紅杏蘂鬪鴨闌干遍倚碧玉搔頭斜墜終日望君君不至舉頭聞鵲喜更漏子夜初長人近别夢覺一窗殘月鸚鵡卧蟪蛄鳴西風寒未成紅蠟燭彈棊局床上畫屏山緑褰繡幌倚瑶琴前歡泪滴襟花間集補卷下
