front:
  text: 花間集卷四
  hash: sha256:39fd7e80368929ee8fe75f2b8c6c8da2dc64310a1e75145e842aba370749f98e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_004-1a}
body:
  text: 薛昭藴十九首浣溪沙紅蓼渡頭秋正雨印沙鷗跡自成行整鬟飄䄂野風香不語􅍭嚬深浦裏㡬廻愁殺棹船郎燕歸㠶盡水茫茫其二鈿匣菱芲錦帶垂静臨蘭檻缷頭時約鬟低珥算歸期茂苑草青湘渚濶夢餘空有漏依依二年终日損芳菲其三粉上依稀有淚痕郡庭花落歛黄昏逺情深恨與誰論記得去年寒食日延秋門外卓金輪日斜人散暗銷魂其四握手河橋栁似金蜂須䡖惹百花心蕙風蘭思寄清琴意滿便同春水滿情深還似酒盃深楚烟湘月雨沉沉其五簾下三間出寺墻滿堦垂栁緑隂長嫩紅䡖翠間濃粧瞥地見時猶可可却來閒處暗思量如今情事隔僊郷其六江館淸秋䌫客船故人相送夜開筵麝烟蘭𦦨簇花鈿正是㫁魂迷楚雨不堪離恨咽湘絃月高霜白水連天其七傾國傾城恨有餘㡬多紅淚泣姑蘓倚風凝睇雪肌膚呉主山河空落日越王宫殿半平蕪藕芲菱蔓滿重湖其八越女淘金春水上歩揺雲鬂珮鳴璫渚風江艸又清香不為逺山凝翠黛只因􅍭恨向斜陽碧桃花謝憶劉郎喜遷鶯殘蟾落暁鍾鳴羽化覺身䡖乍無春睡有餘醒杏苑雪初晴𬗋陌長襟䄂冷不是人間風景廻看塵土似前生休羡谷中鶯其二金門暁玊京春駿馬驟䡖塵樺烟深處白衫新認得化龍身九陌喧千户啟滿袖桂香風細杏園歡宴曲江濵自此占芳辰其三淸明節雨晴天得意正當年馬驕泥軟錦連乹香袖半籠鞭花色融人競賞盡是綉鞍米鞅日斜無計更留連歸路艸和烟小重山春到長門春艸靑玊堦華露滴月隴明東風吹㫁𬗋簫聲宫漏促簾外暁啼鶯愁極梦難成紅粧流宿涙不勝情手挼裙帶遶堦行思君切羅幌暗塵生其二秋到長門秋草黄画梁㕠燕去出宫墻玊簫無𣸪理霓裳金蝉墜鸞鏡掩休粧憶昔在昭陽舞衣紅綬帶繡鴛鴦至今猶惹御罏香魂夢㫁愁聴更漏長離别難寳馬暁鞴雕鞍羅幃乍别情難那堪春㬌媚送君千萬里半粧珠翠落露華寒紅蠟燭青絲曲偏能鈎引淚闌干良夜促香塵緑魂欲迷檀眉半歛愁低未别心先咽欲語情難說出芳艸路東西揺袖立春風急櫻芲楊栁雨萋萋相見歡羅𥜗繍𬒮香紅画堂中細艸平沙蕃馬小屏風卷羅幕凭粧閤思無窮暮雨䡖烟魂㫁隔簾櫳醉公子慢綰青絲髮光砑呉綾襪床上小燻籠韶州新退紅叵耐無端處捻得従頭汚惱得眼慵開問人閒事來女冠子求仙去也翠鈿金箆盡捨入嵒巒霧捲黄羅帔雲彫白玉冠野烟溪洞冷林月石橋寒静夜松風下禮天壇其二雲羅霧縠新授明威法籙䧏真函髻綰青絲髮冠抽碧玊篸徃來雲過五去住島經三正遇劉郎使啟瑶緘謁金門春滿院疊損羅衣金線睡覺水精簾未捲簷前㕠語燕斜掩金鋪一扇滿地落芲十片蚤是相思腸欲㫁忍交頻夢見牛嶠二十六首栁枝解凍風來末上靑觧垂羅䄂拜卿卿無端裊娜臨官路舞送行人過一生其二呉王宫裏色偏深一簇纎條萬縷金不憤錢塘蘓小小引郎松下結同心其三橋北橋南千萬條恨伊張緒不相饒金覊白馬臨風望認得楊家静婉腰其四狂雪随風撲馬飛惹烟無力𬒳春欺莫教移入靈和殿宫女三千又妬伊其五褭翠籠烟拂暖波舞裙新染麴塵羅章華䑓畔隋堤上傍得春風爾許多女冠子緑雲高髻點翠匀紅時世月如眉淺笈含㕠靨低聲唱小詞眼看惟恐化魂蕩欲相随玊趾廻嬌歩約佳期其二錦江烟水卓女燒春濃美小檀霞繍帶芙容帳金釵芍藥芲額黄侵膩髮臂釧透紅紗栁暗鶯啼䖏認郎家其三星冠霞帔住在蘂珠宫裡佩丁當明翠揺蟬翼纎珪理宿粧醮壇春艸緑藥院杏花香青鳥傳心事寄劉郎其四㕠飛㕠舞春晝後園鶯語卷羅幃錦字書封了銀河雁過遟鴛鴦排寳帳豆􅞦綉連枝不語匀珠淚落花時萝江南啣泥燕飛到画堂前占得杏梁安稳䖏體䡖惟有主人憐堪羡好因縁其二紅繡𬒳両両間鴛鴦不是鳥中偏愛爾爲縁交頸睡南塘全勝薄情郎感㤙多両條紅粉淚多少香閨意強攀桃李枝歛愁眉陌上鶯啼蝶舞桞花飛栁芲飛願得郎心憶家還歸早其二自従南浦别愁見丁香結近來情轉深憶鴛衾㡬度将書托煙雁淚盈襟禮月求天願君知我心應天長玊樓春望晴烟㓕舞衫斜卷金條脫黄鸝嬌囀聲𥘉歇杏花飄盡龍山雪鳳釵低赴節筵上王孫愁絶鴛鴦對啣羅結両情深夜月其二㕠眉澹薄藏心事淸夜背燈嬌又醉玊釵横山枕膩寳帳鴛鴦春睡美别經時無限意虗道相思憔悴莫信綵箋書裡賺人腸㫁字更漏子星漸稀漏頻轉何䖏輪臺聲怨香閨掩杏花紅月明楊栁風挑錦字記情事惟願両心相似収淚語背燈眠玊釵横枕邉其二春夜闌更漏促金燼暗挑殘燭驚梦㫁錦屏深両鄊明月心閨艸碧望歸客還是不知消息辜負我悔憐君告天天不聞其三南浦情紅粉淚争奈両人深意低翠黛卷征衣馬嘶霜葉飛招手别寸膓結還是去年時節書託雁萝歸家覺來江月斜望江怨東風急惜别花時手頻執羅幃愁獨入馬嘶殘雨春蕪濕倚門立寄語薄情郎粉香和淚泣菩薩蠻舞裙香暖金泥鳯画梁語燕驚殘梦門外柳芲飛玉郎猶未歸愁匀紅粉淚眉剪春山翠何䖏是遼陽錦屏春晝長其二栁花飛䖏鶯聲急晴街春色香車立金鳳小簾開臉波和恨來今宵求梦想難到青樓上羸得一塲愁鴛衾誰並頭其三玉釵風動春幡急交枝紅杏籠煙泣樓上望卿卿䆫寒新雨晴熏爐蒙翠𬒳繡帳鴛鴦睡何䖏最相知羡他𥘉画眉其四画屏重叠巫陽翠楚神尚有行雲意朝暮㡬般心向他情謾深風流今古隔虗作瞿塘客山月照山花梦廽燈影斜其五風簾燕舞鶯啼栁粧䑓約鬂低纎手釵重髻盤珊一枝紅牡丹門前行樂客白馬嘶春色故故墜金鞭廻頭應眼穿其六緑雲鬂上飛金雀愁眉歛翠春烟薄香閤掩芙容画屏山㡬重窓寒天欲曙猶結同心苣啼粉汚羅衣問郎何日歸其七玊樓氷簟鴛鴦錦粉融香汗流山枕簾外轆轤聲歛眉含咲驚柳隂烟漠漠低鬂蝉釵落須作一生拚盡君今日歡花間集卷四
