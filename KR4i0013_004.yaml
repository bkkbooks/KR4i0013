front:
  text: 花間集卷四
  hash: sha256:39fd7e80368929ee8fe75f2b8c6c8da2dc64310a1e75145e842aba370749f98e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_004-1a}
body:
  text: 薛昭藴十九首浣溪沙紅蓼渡頭秋正雨印沙鷗迹自成行整鬟飄袖野風香不語􅍭嚬深浦裏幾回愁殺棹船郎燕歸帆盡水茫茫其二鈿匣菱花錦帶垂靜臨蘭檻缷頭時約鬟低珥算歸期茂苑草青湘渚濶夢餘空有漏依依二年終日損芳菲其三粉上依稀有淚痕郡庭花落斂黃昏逺情深恨與誰論記得去年寒食日延秋門外卓金輪日斜人散暗銷魂其四握手河橋栁似金蜂須輕惹百花心蕙風蘭思寄清琴意滿便同春水滿情深還似酒杯深楚煙湘月雨沉沉其五簾下三間出寺墻滿階垂栁緑隂長嫩紅輕翠間濃粧瞥地見時猶可可却來間處暗思量如今情事隔仙鄉其六江館淸秋纜客船故人相送夜開筵麝煙蘭𦦨簇花鈿正是斷魂迷楚雨不堪離恨咽湘絃月高霜白水連天其七傾國傾城恨有餘幾多紅淚泣姑蘇倚風凝睇雪肌膚吳主山河空落日越王宫殿半平蕪藕花菱蔓滿重湖其八越女淘金春水上步搖雲鬢珮鳴璫渚風江草又清香不為逺山凝翠黛只因􅍭恨向斜陽碧桃花謝憶劉郎喜遷鶯殘蟾落曉鍾鳴羽化覺身輕乍無春睡有餘醒杏苑雪初晴𬗋陌長襟袖冷不是人間風景回看塵土似前生休羡谷中鶯其二金門曉玊京春駿馬驟輕塵樺煙深處白衫新認得化龍身九陌喧千户啓滿袖桂香風細杏園歡宴曲江濵自此占芳辰其三淸明節雨晴天得意正當年馬驕泥軟錦連乾香袖半籠鞭花色融人競賞盡是繡鞍米鞅日斜無計更留連歸路草和煙小重山春到長門春草靑玊階華露滴月隴明東風吹斷𬗋簫聲宫漏促簾外曉啼鶯愁極夢難成紅粧流宿淚不勝情手挼裙帶繞階行思君切羅幌暗塵生其二秋到長門秋草黃畫梁雙燕去出宫墻玊簫無𣸪理霓裳金蟬墜鸞鏡掩休粧憶昔在昭陽舞衣紅綬帶繡鴛鴦至今猶惹御罏香魂夢斷愁聽更漏長離别難寶馬曉鞴雕鞍羅幃乍别情難那堪春景媚送君千萬里半粧珠翠落露華寒紅蠟燭青絲曲偏能鈎引淚闌干良夜促香塵緑魂欲迷檀眉半斂愁低未别心先咽欲語情難説出芳草路東西搖袖立春風急櫻花楊栁雨萋萋相見歡羅𥜗繍𬒮香紅畫堂中細草平沙蕃馬小屏風卷羅幕憑粧閣思無窮暮雨輕煙魂斷隔簾櫳醉公子慢綰青絲髮光砑吳綾襪床上小燻籠韶州新退紅叵耐無端處捻得從頭汚惱得眼慵開問人間事來女冠子求仙去也翠鈿金箆盡捨入嵒巒霧捲黃羅帔雲雕白玉冠野煙溪洞冷林月石橋寒靜夜松風下禮天壇其二雲羅霧縠新授明威法籙降真函髻綰青絲髮冠抽碧玊篸往來雲過五去住島經三正遇劉郎使啓瑶緘謁金門春滿院疊損羅衣金線睡覺水精簾未捲簷前雙語燕斜掩金鋪一扇滿地落花十片蚤是相思腸欲斷忍交頻夢見牛嶠二十六首栁枝解凍風來末上靑解垂羅袖拜卿卿無端裊娜臨官路舞送行人過一生其二吳王宫裏色偏深一簇纎條萬縷金不憤錢塘蘇小小引郎松下結同心其三橋北橋南千萬條恨伊張緒不相饒金羈白馬臨風望認得楊家靜婉腰其四狂雪隨風撲馬飛惹煙無力𬒳春欺莫教移入靈和殿宫女三千又妬伊其五裊翠籠煙拂暖波舞裙新染麴塵羅章華臺畔隋堤上傍得春風爾許多女冠子緑雲高髻點翠勻紅時世月如眉淺笈含雙靨低聲唱小詞眼看惟恐化魂蕩欲相隨玊趾回嬌步約佳期其二錦江煙水卓女燒春濃美小檀霞繍帶芙容帳金叉芍藥花額黃侵膩髮臂釧透紅紗栁暗鶯啼處認郎家其三星冠霞帔住在蘂珠宫裡佩丁當明翠搖蟬翼纎圭理宿粧醮壇春草緑藥院杏花香青鳥傳心事寄劉郎其四雙飛雙舞春晝後園鶯語卷羅幃錦字書封了銀河雁過遲鴛鴦排寶帳豆􅞦繡連枝不語勻珠淚落花時蘿江南銜泥燕飛到畫堂前占得杏梁安穩處體輕惟有主人憐堪羡好因緣其二紅繡𬒳兩兩間鴛鴦不是鳥中偏愛爾為緣交頸睡南塘全勝薄情郎感恩多兩條紅粉淚多少香閨意強攀桃李枝斂愁眉陌上鶯啼蝶舞桞花飛栁花飛願得郎心憶家還歸早其二自從南浦别愁見丁香結近來情轉深憶鴛衾幾度將書托煙雁淚盈襟禮月求天願君知我心應天長玊樓春望晴煙滅舞衫斜卷金條脫黃鸝嬌囀聲𥘉歇杏花飄盡龍山雪鳳叉低赴節筵上王孫愁絶鴛鴦對銜羅結兩情深夜月其二雙眉淡薄藏心事淸夜背燈嬌又醉玊叉橫山枕膩寶帳鴛鴦春睡美别經時無限意虗道相思憔悴莫信綵箋書裡賺人腸斷字更漏子星漸稀漏頻轉何處輪臺聲怨香閨掩杏花紅月明楊栁風挑錦字記情事惟願兩心相似收淚語背燈眠玊叉橫枕邉其二春夜闌更漏促金燼暗挑殘燭驚夢斷錦屏深兩鄊明月心閨草碧望歸客還是不知消息辜負我悔憐君告天天不聞其三南浦情紅粉淚爭奈兩人深意低翠黛卷征衣馬嘶霜葉飛招手别寸腸結還是去年時節書託雁蘿歸家覺來江月斜望江怨東風急惜别花時手頻執羅幃愁獨入馬嘶殘雨春蕪濕倚門立寄語薄情郎粉香和淚泣菩薩蠻舞裙香暖金泥鳯畫梁語燕驚殘夢門外柳花飛玉郎猶未歸愁勻紅粉淚眉剪春山翠何處是遼陽錦屏春晝長其二栁花飛處鶯聲急晴街春色香車立金鳳小簾開臉波和恨來今宵求夢想難到青樓上羸得一場愁鴛衾誰並頭其三玉叉風動春幡急交枝紅杏籠煙泣樓上望卿卿窗寒新雨晴熏爐蒙翠𬒳繡帳鴛鴦睡何處最相知羡他𥘉畫眉其四畫屏重疊巫陽翠楚神尚有行雲意朝暮幾般心向他情謾深風流今古隔虗作瞿塘客山月照山花夢廽燈影斜其五風簾燕舞鶯啼栁粧臺約鬢低纎手叉重髻盤珊一枝紅牡丹門前行樂客白馬嘶春色故故墜金鞭回頭應眼穿其六緑雲鬢上飛金雀愁眉斂翠春煙薄香閣掩芙容畫屏山幾重窗寒天欲曙猶結同心苣啼粉汚羅衣問郎何日歸其七玊樓氷簟鴛鴦錦粉融香汗流山枕簾外轆轤聲斂眉含笑驚柳隂煙漠漠低鬢蟬叉落須作一生拚盡君今日歡花間集卷四
