front:
  text: 花間集卷一
  hash: sha256:8a5ef4d6e3f4ce687b5b87a03023041decc240ec86f61c3f31803081a5de7e3d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_001-1a}
body:
  text: 唐衛尉少卿趙崇祚集溫廷筠四十四首菩薩蠻小山重疊金明滅鬢雲欲度香腮雪懶起畫蛾眉㺯粧梳洗遲照花前後鏡花面交相映新帖繡羅𥜗雙雙金鷓鴣其二水精簾裡頗黎枕暖香惹夢鴛鴦錦江上栁如煙雁飛殘月天藕絲秋色淺人勝參差剪雙鬢隔香紅玉叉頭上風其三蘂黃無限當山額宿粧隱笑紗窗隔相見牡丹時暫來還别離翠叉金作股叉上蝶雙舞心事竟誰知月明花滿枝其四翠翹金鏤雙鸂鶒水紋細起春池碧池上海棠梨雨晴紅滿枝繡衫遮笑靨煙草粘飛蝶青瑣對芳菲玉關音信稀其五杏花含露團香雪緑楊陌上多離别燈在月隴明覺來聞曉鶯玉鈎褰翠幕粧淺舊眉薄春夢正關情鏡中蟬鬢輕其六玊樓明月長相憶桞絲裊娜春無力門外草萋萋送君聞馬嘶畫羅金翡翠香燭消成淚花落子規啼緑窗殘夢迷其七鳳皇相對盤金縷牡丹一夜經微雨明鏡照新粧鬢輕雙臉長畫樓相望久欄外垂絲桞音信不歸來社前雙燕迥其八牡丹花謝鶯聲歇緑楊滿院中庭月相憶夢難成背窗燈半明翠鈿金壓臉寂寞香閨掩人逺淚闌干燕飛春又殘其九滿宫明月梨花白故人萬里關山隔金雁一䨥飛淚痕沾繡衣小園芳草緑家住越溪曲楊栁色依依燕歸君不歸其十寶函鈿雀金􅗌鷘沉香關上吳山碧楊栁又如絲驛橋春雨時畫樓音信斷芳草江南岸鸞鏡與花枝此情誰淂知其十一南園滿地堆輕絮愁聞一霎清明雨雨後却斜陽杏花零落香無言勻睡臉枕上屏山掩時莭欲黃昏無憀獨倚門其十二夜來皓月才當午重簾悄悄無人語深處麝煙長臥時留薄粧當年還自惜往事那堪憶花露月明殘錦衾知曉寒其十三雨睛夜合玲瓏日萬枝香裊紅絲拂間夢憶金堂滿庭萱草長繡簾垂􅟞眉黛逺山緑春水渡溪橋憑欄魂欲消其十四竹風輕動庭除冷珠簾月上玲瓏影山枕隱穠粧緑檀金鳳皇兩蛾愁黛淺故國吳宫逺春恨正關情畫樓殘點聲更漏子桞絲長春雨細花外漏聲迢遞驚塞鴈起城鳥畫屏金鷓鴣香霧薄透簾幕惆悵謝家池閣紅燭背繡簾垂夢殘君不知其二星斗稀鍾鼓歇簾外曉鶯殘月蘭露重栁風斜滿庭堆落花虗閣上倚欄望還似去年惆悵春欲暮思無窮舊歡如夢中其三金雀叉紅粉面花裡暫時相見知我意感君憐此情須問天香作穗蠟成淚還似兩人心意山枕膩錦衾寒覺來更漏殘其四相見稀相憶久眉淺淡煙如栁垂翠幕結同心待郎燻繡衾城上月白如雪蟬鬢美人愁絶宫樹暗鵲橋橫玊籖𥘉報明其五背江樓臨海月城上角聲嗚咽堤栁動島煙昏兩行征雁分京口路歸帆渡正是芳菲欲度銀燭盡玉繩低一聲村落雞其六玉罏香紅蠟淚偏照畫堂秋思眉翠薄鬢雲殘夜長衾枕寒梧桐樹三更雨不道離情正苦一葉葉一聲聲空階滴到明歸國遙香玊翠鳯寶叉垂􅟞鈿交勝金粟越羅春水渌畫堂照簾殘燭蘿餘更漏促謝娘無限心曲曉屏山斷續其二雙臉小鳯戰箆金颭艷舞衣無力風欽藕絲秋色染錦帳繍幃斜掩露珠清曉簟粉心黃蘂花靨黛眉山兩點酒泉子花映栁條間向緑萍池上憑欄干窺細浪雨瀟瀟近來音信兩踈索洞房空寂寞掩銀屏垂翠箔度春宵其二日映紗窗金鴨小屏山碧故鄉春煙藹隔背蘭缸宿粧惆悵倚高閣千里雲影薄草𥘉齊花又落燕雙雙其三楚女不歸樓枕小河春水月孤明風又起杏花飛玉叉斜篸雲鬟髻裙上金縷鳯八行書千里夢雁南飛其四羅帶惹香猶繫别時紅豆淚痕新金縷舊斷離腸一雙嬌燕語雕梁還是去年時節緑隂濃芳草歇桞花狂定西畨漢使昔年離别攀弱桞折寒梅上高臺千里玉關春雪雁來人不來羌笛一聲愁絶月徘徊其二海燕欲飛調羽萱草緑杏花紅隔簾攏雙鬢翠霞金縷一枝春艷濃樓上月明三五瑣窗中其三細雨曉鶯春晚人似玊桞如眉正相思羅幕翠簾𥘉􅐈鏡中花一枝腸斷塞門消􅒚雁來稀楊桞枝冝春苑外最長條間裊春風伴舞腰正是玉人腸斷處一渠春水赤欄橋其二南內墻東御路傍須知春色栁絲黃杏花未肯無情思何事行人最斷腸其三蘇小門前栁萬條毿毿金線拂平槗黃鶯不語東風起深閉朱門伴舞腰其四金縷毿毿碧瓦溝六宮眉黛惹香愁晚來更帶龍池雨半拂欄于半入樓其五館娃宫外鄴城西逺映征帆近拂堤繫得王孫歸意切不關芳草緑萋萋其六兩兩黃鸝色似金裊枝啼露動芳音春來幸自長如線可惜牽纏蕩子心其七御栁如絲映九重鳳皇窗映繍芙蓉景陽樓畔千條路一面新粧待曉風其八織錦機邉鶯語頻停梭垂淚憶征人塞門三月猶蕭索縱有垂楊未覺春南歌子手裏金鸚鵡胸前繍鳯皇偷眼暗形相不如從嫁與作鴛鴦其二似帶如絲栁團酥握雪花簾捲玊鈎斜九衢塵欲暮逐香車其三撲蕊添黃子呵花滿翠鬟鴛枕映屏山月明三五夜對芳顔其六轉盻如波眼娉婷似栁腰花裡暗相招憶君腸欲斷恨春宵其七懶拂鴛鴦枕休逢翡翠裙羅帳罷罏燻近來心更切為思君花間集卷一花間集輔卷上西吳溫博編次李白七首菩薩蠻平林漠漠煙如織寒山一帶傷心碧暝色入高樓有人樓上愁闌干空佇立宿鳥歸飛急何處是歸程長亭更短亭憶秦娥簫聲咽秦娥夢斷秦樓月秦樓月年年栁色霸陵傷别樂逰原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕清平樂令禁庭春晝鶯羽披新繍百草巧求花下閗只賭珠璣滿斗日晚却理殘粧御前間舞霓裳誰道腰支窈窕折旋消得君王其二禁闈秋夜月探金忩罅玉帳鴛鴦噴沉麝時落銀燈香灺女伴莫話孤眠六宮羅綺三千一笑皆生百媚宸逰教在誰邉清平調辭名花傾國兩相歡長得君王帶笑看解釋春風無限意沉香亭北倚闌干其二一枝紅豔露凝香雲雨巫山枉斷腸借問漢宮誰得似可憐飛燕倚新粧其三雲想衣裳花想容春風拂檻露華濃若非群玉山頭見定向瑶臺月下逢張志和五首漁歌子西塞山前白鷺飛桃花流水鱖魚肥青篛笠緑蓑衣斜風細雨不須歸其二青草湖中月正圓巴陵漁父棹歌連釣車子橛頭船樂在風波不用􅋖其三松江蟹舍主人歡菰飯􅐜羔亦共餐楓葉落荻花乾醉宿漁舟不覺寒其四霅溪灣裏釣魚翁舴艋為家西復東江上雪浦邉風笑著荷衣不嘆窮其五釣臺漁父褐為裘兩兩三三舴艋舟能縱棹慣乘流長江白浪不須憂元結四首欵乃曲千里楓林煙雨深無朝無暮有猿吟停橈靜聽曲中意好似雲山韶􆀄音其二零陵郡北湘水東浯溪形勝滿湘中溪口石顛堪自逸誰人能伴作漁翁其三湘江二月春水平滿月和風冝夜行唱橈欲過平陽戍守吏相呼問姓名其四下瀧船似入深淵上瀧船似欲升天瀧南始到九嶷郡應絶高人乘興船安陌上無窮樹惟有垂楊管别離其三楊子江頭煙景迷隋家宮樹拂金堤嵯峨猶有當時色半蘸波中水鳥棲其四花蕚樓前𥘉種時美人樓上鬪腰肢如今拋擲長街裏露葉如啼欲恨誰其五和風煙雨九重城夾路春隂十里營惟向邉頭不堪望一株憔悴少人行竹枝詞白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動鄉情其二山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁其三江上朱樓新雨晴瀼西春水縠紋生橋東橋西好楊栁人來人去唱歌行其四日出三竿春霧消江頭蜀客駐蘭橈憑寄狂夫書一𥿄家住成都萬里橋其五兩岸山花似雪開家家春酒滿銀杯昭君坊中多女伴永安宮外踏青來其六瞿塘嘈嘈十二灘此中道路古來難長恨人心不如水等間平地起波瀾其七巫峽蒼蒼煙雨時清猿啼在最髙枝個裏愁人腸自斷由來不是此聲悲其八城西門前灔澦堆年年波浪不能摧懊惱人心不如石少時東去復西來其九山上層層桃李花雲間煙火是人家銀釧金叉來負水長刀短笠去燒畬其十楊栁青青江水平聞郎江上唱歌聲東邉日出西邉雨道是無情還有情李涉三首竹枝詞十二峰頭月欲低空舲灘上子規啼孤舟一夜東歸客泣向東風憶建溪其二荆門灘急水潺潺兩岸猿啼煙滿山渡頭年少應官去月落西陵望不還其三石壁千重樹萬重白雲斜掩碧芙蓉昭君溪上年年月獨自嬋姢色最濃王建六首古調笑團扇團扇美人並來遮靣玉顔憔悴三年誰復啇量管絃絃管絃管春草昭陽路斷其二胡蝶胡蝶飛上金花枝葉君前對舞春風百葉桃花樹紅紅樹紅樹燕語鶯啼日暮其三羅袖羅袖暗舞春風已舊遙看歌舞玉樓好日新粧坐愁愁坐愁坐一世虗生虛過其四楊栁楊栁日暮白沙渡口船頭江水茫茫啇人少婦斷腸腸斷腸斷鷓鴣夜來失伴三臺令池北池南草緑殿前殿後花紅天子千秋萬歲未央明月清風其二魚藻池邉射鴨芙蓉苑裡看花日色赭黃相似不著紅鸞扇遮花間集輔卷上
