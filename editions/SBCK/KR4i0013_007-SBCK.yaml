front:
  text: 花間集卷七
  hash: sha256:8979039e80964cf4b4d7dc424d484fb0e21034c8a08ad16cb0ff2cb20384945a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_007-1a}
body:
  text: 歐陽烱十七首浣溪沙落絮殘鶯半日天玉柔花醉只思眠惹䆫映竹滿爐􅃄獨掩画屏愁不語斜欹瑶枕髻鬟偏此時心在阿誰􅁁其二天碧羅衣拂地垂美人􅀄着更相冝宛風如舞透香肌獨㘴含嚬吹􅃫竹園中緩歩折花枝有情無力泥人時其三相見休言有淚珠酒䦨重得叙歡娱􅃫屏鴛枕􅀫金鋪蘭麝細香聞喘息綺羅纎縷見肌膚此時還恨薄情無三字令春欲盡日遲遲牡丹時羅幌卷翠􅄕垂彩箋書紅粉淚両心知人不在燕空歸􅀒佳期香燼落枕凾欹月分明花澹薄惹相思南郷子嫰艸如􅃄石榴芲彂海􅀯天日暮江亭春影淥鴛鴦浴水逺山長看不足其二画舸停橈槿花籬外竹横橋水上逰人沙上女􅅆顧􅀏指芭蕉林裏住其三㟁逺沙平日斜歸路晚霞眀孔雀自憐金翠尾臨水認得行人驚不􅁸其四洞口誰家木蘭船繋木蘭芲紅䄂女􅀰相引去逰南浦咲􅀝春風相對語其五二八花鈿􅅐前如雪臉如蓮耳墜金環穿瑟瑟霞衣窄咲􅀝江頭招逺客其六路入南中挄榔葉暗蓼花紅両㟁人家微雨後􅀵紅豆樹底纎纎􅎑素手其七䄂歛絞綃採香深洞咲相邀藤杖枝頭蘆酒滳鋪葵席豆䓻芲間趖晚日其八翡翠鵁鶄白蘋香裏小沙汀島上隂隂秋雨色蘆花撲數􅃗漁船何䖏􅀫獻􅂨心見好花顔色争咲東風㕠臉上晚粧同閉小樓深閤春景重重三五夜偏有恨月朙中情未巳信曾通滿衣猶自染檀紅恨不如㕠燕飛舞􅄕櫳春欲暮殘絮盡栁條空賀朙朝憶昔花間􅀄識面紅䄂半􅃒粧臉輕轉石榴裙帶故将纎繊玊指偷撚㕠􅃫金線碧梧桐􅃈深􅅧院誰料得両情何日教繾綣羡春来㕠燕飛到玉樓朝暮相見其二憶昔花間相見後只慿纎手暗抛紅豆人前不觧巧傳心事别来依舊􅇳􅀒春晝碧羅衣上蹙金綉覩對鴛鴦􅆰裛淚痕透想韶顔非乆終是為伊只恁偷瘦江城子晚日金陵㟁艸平落霞明水無情六代繁􅂠暗逐逝波聲􅆰有姑蘇䑓上月如西子鏡照江城鳯樓春鳯髻綠雲叢􅀷掩房櫳錦書通梦中相見􅁴来慵勻面淚臉珠融因想玊􅀰何䖏去對㳤景誰同小樓中春思無窮􅀝欄顒望闇牽愁緒栁芲飛􅁸東風斜日照􅄕羅幌香冷粉屏􅆰海棠零落鶯語殘紅和凝二十首小重山春入神京萬木芳禁林鶯語滑蝶飛狂曉花擎露妬啼粧紅日永風和百花香煙瑣栁絲長御溝澄碧水轉池塘時時㣲雨洗風光天衢逺到䖏引笙簧其二正是神京爛熳時群仙􅀄折得㕁詵枝烏犀白紵最相冝精神出御陌䄂鞭垂栁色展愁眉管弦分響亮探花期􅊍隂占断曲江池新榜上名姓徹丹墀臨江仙海棠香老脊江晚小樓霧縠涳􅄥翠鬟􅀄出繡􅄕中麝􅃄鸞珮惹蘋風碾玉􅁫揺􅗌鶒􅀾雪肌雲鬢将融含情遥指碧波東越王䑓殿蓼花紅其二披􅂁窣地紅宫錦鶯語時轉䡖音碧羅冠子穏犀簮鳯皇㕠颭歩摇金肌􅇧細匀紅玊軟臉波微送春心嬌羞不肯入鴛衾蘭膏光􅂻両情􅅧菩薩蠻越梅半拆䡖寒裏氷清澹薄籠藍水暖􅁴杏梢紅逰絲狂惹風閑堦莎徑碧逺梦猶堪惜離恨又迎春相思難重陳山花子鶯錦蟬縠馥麝臍䡖􅅂芲艸暁􅃄迷鸂鶒顫金紅掌墜翠雲低星靨咲隈霞臉畔蹙金開䄡襯銀泥春思半和芳艸嫰綠萋萋其二銀字笙寒調正長水紋簟冷画屛凉玊腕重金扼臂澹梳粧幾度試香纎手暖一􅂞嘗酒絳脣光佯㺯紅絲蝇拂子打檀􅀰河滿子正是破瓜年幾含情慣淂人饒桃李精神鸚鵡舌可堪虚度良宵却爱藍羅裙子羡他長束纎腰其二寫得魚牋無限其如芲􅃈春輝目㫁巫山雲雨空教殘梦依依却愛薫香小鴨羡他長在屛幃薄命女天欲暁宫漏穿花聲繚繞牎􅂻星光少冷霞寒侵帳額殘月光沉樹杪夣㫁錦幃空悄悄強􅁸愁眉小望梅花春艸全無消息臘雪猶餘蹤跡越􅊐寒枝香自拆冷艶竒芳堪惜何事壽陽無䖏覔吹入誰家横􅅇天仙子栁色披衫金縷􅃫纎手䡖拈紅豆㺯翠蛾㕠臉正􅅤情桃花洞瑶䑓梦一片春愁誰與共其二洞口春紅飛蔌蔌仙子􅅤愁眉黛綠阮􅀰何事不歸來􅂴燒金慵􅂐玊流水桃花空㫁續春光好紗窓暖画屏閒軃雲鬟睡􅁸四肢無力半春間玊指剪裁羅勝金盤􅀧綴酥山窺宋􅅧心無限事小眉彎其二蘋葉軟杏花明画船䡖㕠浴鴛鴦出淥汀棹歌聲春水無風無浪春天半雨半晴紅粉相随南浦晚幾􅅤情採桑子蝤蠐領上訶梨子繡帶雙垂􅎛户閑時竟學樗蒲賭荔枝叢頭鞋子紅編細裙窣金絲無事嚬眉春思飜教阿母疑栁枝軟碧摇烟似送人映花時把翠蛾嚬青青自是風流主慢颭金絲待洛神其二瑟瑟羅裙金縷腰黛眉隈破未重描醉來咬損新花子拽住仙􅀰盡放嬌其三鵲橋􅀄就􅍋銀河今夜仙郎自姓和不是昔年攀桂􅀣豈􅀎月􅂻索嫦娥漁父白芷汀寒立鷺鷥蘋風䡖剪浪花時煙羃􅇈日遲遲香引芙蓉惹釣絲顧夐六首虞美人曉鶯啼破相思梦􅄕捲金泥鳯􅀫粧猶在酒􅀄醒翠翹慵整􅀝雲屏轉娉婷香檀細画侵桃臉羅􅃑䡖輕歛佳期堪恨􅂯難㝷綠蕪滿院栁成隂􅀒春心其二觸簾風送景陽鍾鴛􅀍繡花重暁幃􅀄卷冷煙濃翠匀粉黛好儀容思嬌慵起來無語理朝粧寳匣鏡凝光綠荷相􅀝滿池塘露清枕簟藕芲香恨悠揚其三翠屏閒掩垂珠箔絲而籠池閣露粘紅藕􅍋清香謝娘嬌㥛不成狂罷朝粧小金􅗌鶒沉􅃄細膩枕堆雲髻淺眉微歛注檀􅁿舊懽時有梦魂驚悔多情其四碧桐梧映紗䆫晚花謝鶯聲􅈸小屏屈曲掩青山翠幃香粉玉爐寒両蛾攅顛狂年少䡖離别􅇳􅀒春時節画羅紅􅃑有啼㾗魂銷無語􅀝閨門欲黄昏其五深閨春色勞思想恨共春蕪長黄􅕢嬌囀䛏芳妍杏枝如画􅀝䡖􅃄􅃈窓前凭欄愁立㕠蛾細桺影斜揺砌玉􅀰還是不還家教人魂梦逐楊芲繞天涯其六少年艶質勝瓊英早晚别三清蓮冠穏篸鈿箆横飄飄羅䄂碧雲䡖画難成遲遲少轉腰身褭翠靨眉心小醮壇風急杏枝香此時恨不駕鵉皇訪劉􅀰花間集卷七
