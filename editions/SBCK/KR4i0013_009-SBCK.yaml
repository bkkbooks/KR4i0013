front:
  text: 花間集􅃃九
  hash: sha256:2e5bb0add06020468f7b74c6b622355bdf5a0f794df0de1f9694d99e32eded6e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_009-1a}
body:
  text: 顧夐六首臨江仙碧染長空池似鏡􅀝樓閒望凝情滿衣紅藕細香清象床枕簟山障掩玊琴横暗想昔時􅂬􅀏事如今羸得愁生愽山罏暖澹􅃄䡖蟬吟人静殘日傍小窓明其二幽閨小檻春光晚栁濃芲澹鶯稀舊􅂬思想尚依依翠顰紅歛終日損芳菲何事狂夫音信㫁不如梁燕猶㱕画當深䖏麝􅃄微屏虗枕冷風細雨霏霏其三月色穿􅄕風入竹􅀝屏㕠黛愁時砌花含露両三枝如啼恨臉魂㫁損容儀香燼暗銷金鴨冷可堪􅇳􅀒前期繡􅃭不整鬂鬟欹幾夕惆悵情緒在天涯漠漠秋雲澹紅藕香侵檻枕􅀝小山屏金鋪向晚扄睡起横波慢獨望情何限衰栁數聲蝉魂銷似去年其二岸桞垂金線而晴鶯百囀家住緑楊􅁁徃來多少年馬嘶芳草逺高樓􅄕半卷歛䄂翠蛾攅相逢爾許難更漏子舊􅂬娯新悵望擁鼻含嚬樓上濃栁翠晚霞微江鷗接翼飛􅄕半捲屏斜掩逺岫参羗迷眼歌滿耳酒盈罇前非不要論孫光憲三十六首浣溪沙蓼㟁風多橘柚香江􅁁一望楚天長片㠶煙際閃􅀌光目送征鴻飛杳杳思隨流水去茫􅃼蘭紅波碧憶瀟湘其二桃杏風香􅄕幕閒謝家門户約芲闗画梁幽語燕􅀄還繡閣數行題了壁曉屏一枕酒醒山却疑身似梦魂間其三花漸凋踈不耐風画􅄕垂地晚堂空堕堦縈蘚舞愁紅膩粉半粘金靨子殘香猶暖繡薫籠蕙心無䖏與人同其四攬鏡無言涙欲流凝情半日􅂴梳頭一庭踈雨濕春愁楊栁秪知傷怨别杏芲應信損嬌羞淚沾魂㫁軫離憂其五半踏長􅅂宛約行晚􅄕踈䖏見分明此時堪恨昧平生早是銷魂殘燭影更愁聞着品弦聲杳無消息若爲情其六蘭沐􅀄休曲檻前暖風遲日洗頭天濕雲新歛未梳蝉翠􅃑半􅀅􅃒粉臆寳釵長欲墜香肩此時模様不禁憐其七風遞殘香出繡􅄕團窠金鳳舞䄡䄡落花㣲雨恨相兼何䖏厺来狂太甚空推􅀫酒睡無厭争教人不别猜嫌其八輕打銀筝墜燕􅅺断絲高􅇢画楼西花冠閒上午墻啼粉籜半開新竹逕紅苞盡落舊桃蹊不堪終日閉深閨其九烏㡌斜欹倒佩魚静街偷歩訪仙居隔墻應認打門􅀄􅀅見客時㣲掩歛得人憐䖏且生踈低頭羞問壁􅁁書河傳太平天子等閑遊戯䟽河千里桞如絲隈􅀝渌波春水長淮風不起如花殿脚三千女爭雲兩何䖏留人住錦帆風煙際紅燒空魂迷大業中其二栁拖金􅈁著烟籠霧濛濛落絮鳳凰舟上楚女妙舞雷喧波上皷龍爭虎􅀾分中土人無主桃葉江南渡襞花牋艶思牽成篇宫娥相與傳其三花落􅃄薄􅒜家池閣寂莫春􅅧翠娥􅁿歛意沉吟沾􅁭無人知此心玉罏香㫁霜􅁅冷􅄕鋪影梁燕歸紅杏晚来天空悄然􅀌眠枕檀雲髻偏其四風颭波歛團河閃閃珠傾露􅀧木蘭舟上何䖏吴娃越艶藕花紅照臉大堤狂殺襄陽客烟波隔渺渺湖光白身巳帰心不帰斜暉逺汀鸂䳵飛菩薩蛮月華如水籠香砌金鐶碎撼門􅀄閉寒影墮髙簷鈎垂一面􅄕碧烟􅁿褭褭紅顫燈花咲即此是髙唐掩屏秋夢長其二花冠頻鼓墻頭翼東方澹白連窓色門外早鶯聲背樓殘月明薄寒籠醉態依舊鉛華在握手送人歸半拖金􅈁衣其三小庭花落無人掃踈香滿地東風老春晚信沉沉天涯何䖏㝷曉堂屏六扇眉共湘山逺爭奈別離心近来􅀹不禁其四青巖碧洞􅀴朝兩隔花相喚南溪厺一􅃗木蘭船波平逺浸天扣舷驚翡翠嫩玉􅎑香臂紅日欲沉西烟中遥觧携其五木綿花映叢祠小越禽聲裏春光曉銅鼓與蛮歌南人祈賽多客㠶風正急茜䄂偎檣立極浦幾回頭烟波無限愁河瀆神汾水碧依依黄雲落葉􅀄飛翠華一厺不言歸廟門􅆰掩斜暉四壁隂森排古画依舊瓊輪羽駕小殿沉沉清夜銀燈飄落香灺其二江上草芉芊春晚湘妃廟前一方夘色楚南天數行征鴈聮翩獨􅀝朱欄情不極魂㫁終朝相憶兩􅄴不知消息逺汀時起鸂䳵虞羙人紅牎寂寂無人語暗澹梨花雨繡羅紋地粉新描慱山香炷旋抽條暗魂銷天涯一去無消息終日長相憶教人相憶幾時休不堪棖觸别離愁淚還流其二好風㣲掲􅄕旌起金翼鵉相􅀝翠簷愁聽乳禽聲此時春態暗関情獨难平画堂流水空相翳一穂香遥曵教人無䖏􅀉相思落花芳草過前期沒人知後庭花景陽鐘動宫鶯囀露凉金殿􅁿飈吹起瓊花旋玉葉如剪晚来高閣上珠􅄕捲見墜香千片脩娥慢臉陪雕輦後庭新宴其二石城依舊􅆰江囯故宫春色七尺青絲芳草緑絶世难得玉英凋落盡更何人識野棠如織只是教人添怨憶悵望無極生查子寂莫掩朱門正是天􅀅暮暗澹小庭中滴滴梧桐雨繡工夫牽心緒配盡鴛鴦􅈁待得沒人時偎􅀝論􅀻語其二暖日䇿花騘亸鞚垂楊陌芳草惹烟青落絮隨風白誰家繡轂動香塵􅀮映神仙客狂殺玉鞭􅀰咫尺音容隔其三金井墮高梧玉殿籠斜月永巷寂無人歛態愁堪絶玉罏寒香燼㓕還似君恩歇翠輦不歸来幽恨􅀅誰􅀃臨江仙霜拍井梧乹葉墮翠幃雕檻􅀄寒薄鉛殘黛􅁛花冠含情無語延佇􅀝欄杆杳杳征輪何䖏厺離愁别恨千般不堪心緒正多端鏡奩長掩無意對􅀌鵉其二暮雨凄凄􅅧院閉燈前凝坐􅀄更玊􅁫低壓鬂雲横半垂羅幕相映燭光明終是有心投漢佩低頭但理秦筝燕㕠鵉偶不勝情只愁明發􅀅逐楚雲行酒泉子空磧無􅁁萬里陽関道路馬蕭蕭人去去隴雲愁香貂舊製戎衣窄胡霜千里白綺羅心魂夢断上高楼其二曲檻小樓正是鶯花二月思無憀愁欲絶鬰離􅁭展屏空對瀟湘水眼前千萬里涙淹紅眉歛翠恨沉其三歛態牎前褭褭雀􅁫抛􅖪燕成㕠鵉對影耦新知玉纎澹拂眉山小鏡中嗔共照翠連姢紅縹緲早粧時清平樂愁腸欲㫁正是青春半連理分枝鵉失伴又是一􅂣離散掩鏡無語眉低思隨芳草萋萋慿仗東風吹夢與郎終日東西其二等閑無語春恨如何厺終是踈狂留不住花暗栁濃何䖏盡日目㫁魂飛晚牎斜界殘暉長恨朱門薄暮繡鞍騘馬空歸更漏子聴寒更聞逺㕍半夜蕭娘深院扃繡户下珠簾满庭噴玉蟾人語静香閨冷紅幕半垂清影雲雨態􅈍蘭心此情江海心其二今夜期来日别相對祗堪愁絶偎粉面撚瑶簮無言涙滿􅁭銀箭落霜華薄墻外曉鷄咿喔聴嘱付􅁖情悰㫁腸西復東卷九
