front:
  text: 花間集卷十
  hash: sha256:0bc9a4724287f522ab046f312ebd706d7a556cec2e7cdf808900e41f05ff688e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_010-1a}
body:
  text: 孫光憲二十四首女冠子􅈍風芝露壇際殘香􅁿度蘂珠宫苔􅀧分圎碧桃花踐破紅品流巫峽外名籍紫􅅔中真侣墉城會夢魂通其二澹花痩玉依約神仙粧束佩瓊文瑞露通宵貯幽香盡日焚碧烟籠絳節黄藕冠濃雲勿以吹簫伴不同羣風流子茅舎槿籬溪曲雞犬自南自北菰葉長水葓開門外春波漲渌聴織聲促軋軋鳴梭穿屋其二樓􅀝長衢欲暮瞥見神仙伴侣㣲傳粉攏梳頭隠映画􅄕􅄏䖏無語無緒慢曵羅裙帰厺其三金絡玉䘖嘶馬繫向緑楊隂下朱户掩繡􅄕垂曲院水流芲榭歡罷歸也猶在九衢􅅧疸定西畨雞禄山前逰􅀐邉草白朔天明馬蹄􅁿鵲面􅃓離短韔彎来月欲成一􅃗鳴􅐴雲外暁鴻驚其二帝子枕前秋夜霜幄冷月華明正三更何䖏戍樓寒笛夢殘聞一聲遥想漢関萬里泪縱横河滿子冠劍不隨君厺江河還共恩􅅧􅁔䄂半􅃒眉黛􅆭淚珠旋滴衣􅁭惆悵雲愁雨怨㫁魂何䖏相㝷玉蝴蝶春欲盡景仍長滿園花正黄粉翅兩悠颺翩翩過短墙鮮飈暖牽逰伴飛去立殘芳無語對簫娘舞衫沉麝香八拍蠻孔雀尾拖金線長怕人飛起入丁香越女沙頭爭拾翠相呼歸去背斜陽竹枝門前春水竹枝白蘋花女兒岸上無人竹枝小艇斜女兒啇女􅀴過竹枝江欲暮女兒散抛殘食竹枝飼神鴉女兒亂䋲千結竹枝絆人􅅧女兒越羅萬丈竹枝表長㝷女兒楊栁在身竹枝垂意緒女兒藕花落盡竹枝見蓮心女兒思帝郷如何遣情情更多永日水尚􅄕下歛羞蛾六幅羅裙窣地㣲行曵碧波㸔盡滿池踈雨打圑荷上行盃草草離亭鞍馬従逺道此地分􅁭燕宋秦吳千萬里無辭一醉野棠開江革濕佇立沾泣征􅀐駸駸其二離棹逡廵欲動臨極浦故人相送去住心情知不共金船滿捧綺羅愁絲管􅍋􅅆别帆影㓕江浪如雪謁金門留不淂留得也􅀿無益白紵青山如雪色揚州􅀄厺日􅁿别離甘抛擲江上滿㠶風疾却羡彩鴛三十六􅀌鸞還一隻思越人古臺平芳草逺舘娃宫外春􅅧翠黛空留千載恨教人何䖏相㝷綺羅無復當時亊露花􅀧滳香淚惆悵遥天横緑水鴛鴦對對飛起其二渚蓮枯宫樹老長洲廢􅁐蕭條想像玉人空䖏所月明獨上溪橋経春􅀄敗秋風起紅蘭緑􅈍愁死一片風流傷心地魂銷目㫁西子楊栁枝閶門風暖落花乾飛遍江城雪不寒獨有晚来臨水驛閑人多凭赤欄干其二有池有榭即濛濛浸潤翻成長飬功恰佀有人長􅀧檢着行排立向春風其三根柢雖然傍濁河無妨終日近笙􅁔􅆖􅆖金帯誰堪比還共黄鶯不校多其四萬株枯槁怨亡隋佀弔吳臺各自垂好是淮隂明月􅂻酒楼横笛不勝吹望梅花數枝開與短墻平見雪蕚紅跗相映引起誰人邉塞情􅄕外欲三更吹㫁離愁月正明空聼隔江聲漁􅁔子草芊芊波􅃞􅃞湖邉艸色連波漲沿蓼㟁泊楓汀天際玉輪􅀄上扣舷􅁔聮極望􅄴聲伊軋知何向黄鵠叫白鷗眠誰似儂家踈曠其二泛流萤明又㓕夜凉水冷東灣濶風浩浩笛寥寥萬傾金波澄澈杜若洲香郁烈一聲􅀫㕍霜時莭􅀴霅水過松江盡屬儂家日月魏承斑十五首善薩蠻羅􅅂薄薄秋波染眉間画時山兩􅀧相見綺羅時􅅧情暗共知翠翹雲鬂動歛態弹金鳯宴罷入蘭房邀人觧珮璫其二羅衣穏約金泥画玳筵一曲當秋夜聲顫覷人嬌雲鬟褭翠翹酒醺紅玉軟眉翠秋山逺繍幌麝煙沉誰人知兩心滿宫花雪霏霏風凛凛玉􅀰何䖏狂飲醉時想得縦風流羅帳香幃鴛􅆍春朝秋夜思君甚愁見繍屏􅀌枕少年何亊􅀒􅀄心淚滴􅈁金㕠袵木蘭花小芙蓉香旖旎碧玉堂􅅧情似水閉寳匣掩金鋪􅀝屏拖䄂愁如醉遲遲好景煙花媚曲渚鴛鴦眠錦翅凝然愁望静相思一㕠笑靨嚬香藥玉楼春寂寂画堂梁上燕髙卷翠􅄕横數扇一庭春色惱人来滿地落花紅㡬片愁􅀝錦屏低雪靣淚滴繡羅金􅈁線好天凉月盡傷心為是玉􅀰長不見其二􅁿歛翠蛾呈皓齒鶯囀一枝花影裏聲聲清逈遏行雲寂寂画梁塵暗起玉斚滿斟情未已促坐王孫公子醉春風筵上貫珠匀艶色韶顔嬌旎旖訴􅂨情高􅁔宴罷月􅀄盈詩情引恨情􅃄露冷水流􅁿思想夣難成羅帳褭香平恨頻生思君無計睡還醒隔層城其二春􅅧花簇小楼臺風飄錦綉開新睡􅁴歩香堦山枕印紅腮􅁂亂墜金􅁫語檀偎臨行執手重重囑幾千迴其三銀漢雲晴玉漏長蛩聲悄画堂筠簟冷碧􅆤凉紅臘涙飄香皓月㵼寒光割人腸那堪獨自歩池塘對鴛鴦其四金風􅁿透碧牎紗銀缸熖影斜欹枕臥恨何賖山掩小屏霞雲􅀨别吳娃想容􅂠夢成幾度遶天涯到君家其五春情滿眼臉紅銷嬌妬索人饒星靨小玉璫摇幾共醉春朝别後憶纎腰夢魂劳如今風葉又蕭蕭恨迢迢生查子煙雨晩晴天零落花無語難話此時心梁㷼㕠来去琴韻對薫風有恨和情撫腸㫁㫁絃頻淚滴黄金􅈁其二寂寞画堂空􅅧夜垂羅幕燈暗錦屏欹風冷珠􅄕薄愁恨夢難成何䖏㸔􅂬楽看看又春来還是長蕭索黄鐘楽池塘烟暖草萋萋惆悵間霄含恨愁坐思堪迷遥想玉人情亊遠音容渾是隔桃溪偏記同歡秋月低􅄕外論心花畔和醉暗相携何亊春來君不見夢魂長在錦江西漁歌子栁如眉雲似髪蛟綃霧縠籠香雪夢魂驚鍾漏歇􅆤外暁鶯殘月幾多情無䖏􅀃落花飛絮清明節少年􅀰容易别一去音書㫁絶􅎷䖍戾四首臨江仙金鎻重門􅂽􅁐静綺􅈧愁對秋空翠􅂠一去寂無蹤玉楼􅁔吹聲㫁已随風􅃄月不知人亊改夜闌還照􅅧宫藕花相向野堂中暗傷亡囯清露泣香紅其二無頼暁鶯驚夣断起来殘酒􅀄醒映􅆤絲栁褭􅃄青翠􅄕慵卷約砌杏花零一自玉􅀰逰冶去蓮凋月􅆭儀形暮天㣲雨洒間庭手挼裙帯無語􅀝雲屏女冠子鳯樓琪樹惆悵劉􅀰一去正春􅅧洞裏愁空結人間信莫㝷竹踈齋殿逈松宻醮壇隂􅀝雲低首望可知心其二歩虗壇上絳莭霓旌相向引真僊玉珮摇蟾影金爐褭麝􅃄露濃霜簡􅊜風􅂃羽衣偏欲留难得住却歸天花間集卷十
