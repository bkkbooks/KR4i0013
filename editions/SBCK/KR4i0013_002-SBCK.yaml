front:
  text: 花間集卷二
  hash: sha256:1c0bb5e6b04333f12c19286c276ea2b2d28f97738c5ab83b5df50ea5d29f4738
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_002-1a}
body:
  text: 温廷筠二十二首河瀆神河上望􅓜祠廟前春雨來時楚山無限鳥飛遟蘭棹空傷别離何䖏杜䳌啼不歇艶紅開盡如血蝉鬂美人愁絶百花芳艸佳節其二􅀌廟對寒潮西陵風雨䔥蕭謝娘惆悵􅀝蘭橈淚流玊筯千條暮天愁􅃪思歸樂早梅香滿山郭􅅆首両情䔥索離魂何處飄泊其三銅鼓賽神來滿庭幡葢徘徊水村江浦過風雷楚山如􅀞烟開離别櫓聲􅆰䔥索玊容惆悵粧薄青麥燕飛落落捲􅄕愁對珠閣女冠子含嬌含笑􅀫翠殘紅􅆼窕鬂如蝉寒玊簮秋水輕紗捲碧烟雪􅅐鵉鏡裏琪􅀣鳳楼前􅀉語青娥伴早求仙其二霞帔雲髮鈿鏡仙容似雪画愁眉遮語廻􅁿扇含羞下翠幃玊楼相望乆花洞恨來遟早晚乗鸞去莫相遺玉胡蝶秋風凄切傷離行客未歸時塞外艸先衰江南雁到遟芙容雕嫩臉楊栁堕新眉揺落使人悲㫁腸誰得知清平樂上陽春晚宫女愁蛾淺新􅀊清平思同輦争奈長安路逺鳯帳鴛􅀍徒燻寂寞花􅃈千門􅔡把黄金買賦為妾􅀅上明君其二洛陽愁絶楊栁花飄雪終日行人恣攀折橋下水流嗚咽上馬争􅂆離觴南浦鶯聲断腸愁殺平原年少廻首揮淚千行遐方怨憑綉檻觧羅幃未得君書断腸瀟湘春雁飛不知征馬㡬時㱕海棠花謝也雨霏霏其二花半折雨􅀄晴未捲珠􅄕夢殘惆悵聞曉鶯􅀫粧眉淺粉山横約鬟鵉鏡裏繍羅輕訴衷情鶯語花舞春晝午雨霏㣲金帶枕宫錦鳳皇帷弱栁暗交飛依依遼陽音信稀夢中歸思帝鄊花花滿枝紅似霞羅䄂画􅄕腸㫁卓香車廽面共人閒語戰箆金􅃫斜唯有阮􅀰春盡不歸家萝江南千萬恨恨極在天涯山月不知心􅂻事水風空落眼前芲揺曳碧雲斜其二梳洗罷獨􅀝望江樓過盡于帆皆不是斜暉脉脈水悠悠腸㫁白蘋洲河傳江畔相喚暁粧鮮􅋖景箇女採蓮請君莫向那岸邉少年好花新滿船紅袖揺曵逐風暖垂玉腕腸向桞絲㫁浦南歸浦北歸莫知晚來人已稀其二湖上閒望雨蕭蕭􅃄浦花橋路遥謝娘翠娥愁不銷終朝夢魂迷晚潮蕩子天涯歸棹逺春巳晚鶯語空腸㫁若􅁘溪溪水西栁堤不聞􅀰馬嘶其三同伴相喚杏花稀萝􅂻每愁依違仙客一去燕巳飛不歸淚痕空滿衣天際雲鳥引情逺春巳晚􅃄靄渡南苑雪梅香栁帶長小娘轉令人意傷蕃女怨萬枝春雪開巳遍細雨㕠燕鈿蝉筝金雀扇画梁相見雁門消息不歸來又飛廻其二磧南沙上驚雁趣飛雪千里玊連環金鏃箭年年征􅀾画樓離恨錦屏空杏花紅荷葉盃一􅀧露珠凝冷波影滿池塘緑莖紅艶雨相亂腸断水風凉其二鏡水夜來秋月如雪採蓮時小娘紅粉對寒浪惆悵正思惟其三楚女欲歸南浦朝雨濕愁紅小船揺様入花􅂻波起隔西風皇甫松十一首天􅋖子晴野鷺鷥飛一隻水葓花彂秋江碧劉􅀰此日别天􅋖登綺席涙珠滴十二晚峰髙歴歴其二躑躅花開紅照水鷓鴣飛遶青山觜行人經􅀊始歸來千萬里錯相遺懊惱天仙應有以浪淘沙灘頭細艸接踈林浪􅁖罾船半欲沉􅀫鷺眠鷗非舊浦去年沙觜是江心其二蠻歌豆􅞦北人愁蒲雨杉風野艇秋浪􅁸鵁鶄眠不淂寒沙細細入江流楊栁枝春入行宫映翠微玄宗侍女舞烟絲如今桞向空城緑玊􅅇何人更把吹其二爛熳春歸水國時呉王宫殿栁絲垂黄鶯常呌空閨畔西子無因更得知􅎥得新酌一巵須教玊􅅇吹錦筵紅蠟燭莫來遟䋣紅一夜經風雨是空枝其二摘得新枝枝葉葉春管絃兼美酒最関人平生都得㡬十度展香茵夣江南蘭燼落屏上暗紅蕉間夣江南梅熟日夜船吹􅅇雨䔥蕭人語驛邉橋其二樓上􅆍殘月下簾旌夢見秣陵惆悵事桃芲栁絮滿江城㕠髻坐吹笙採蓮子菡萏香連十頃陂舉棹小姑貪􅃧採蓮遲年少晚來㺯水船頭濕舉棹更脫紅裙裹鴨􅅜年少船頭湖色灔灔秋舉棹貪看年少信船流年少無端隔水抛蓮子舉棹遥􅀍人知半日羞年少􅅊荘十首浣溪沙淸暁粧成寒食天栁毬斜褭間花鈿捲􅄕直出画堂前指􅀧牡丹􅀄綻朶日髙猶自凭朱欄含嚬不語恨春殘其二欲上鞦韆四體慵擬教人送又心忪画堂􅄕幕月明風此夜有情誰不極隔墻梨雪又玲瓏玉容憔悴惹微紅其三惆悵萝餘三月斜孤燈照壁背窓紗小樓髙閣謝娘家暗想玊容何􅀁似一枝春雪凍梅花滿身香霧簇朝霞其四緑樹藏鶯鶯正啼栁絲斜拂白銅堤㺯珠江上草萋萋日暮飲歸何處客繡鞍騘馬一聲嘶滿身蘭麝醉如泥其五夜夜相思更漏殘傷心明月凭闌千想君思我錦衾寒咫尺画堂深似海憶來惟把舊書㸔㡬時携手入長安菩薩蠻紅樓别夜堪惆悵香燈半捲流蘓帳殘月出門時美人和淚辭琵琶金翠羽絃上黄鶯語􅂆我早歸家緑窓人似花其二人人盡􅀃江南好逰人只合江南老春水碧扵天画船􅃪雨眠鑪邉人似月皓腕凝㕠雪未老莫還鄉還鄉湏㫁腸其三如今却憶江􅀯楽當時年少春衫薄􅀐馬􅀝斜橋滿樓紅䄂招翠屏金屈曲醉入花叢􅀫此度見花枝白頭誓不歸其四􅂆君今夜湏沉醉罇前莫話明朝事珍重主人心酒深情亦深湏愁春漏短莫訴金杯滿遇酒且呵呵人生能㡬何其五洛陽城􅂻春光好洛陽才子他鄉老栁暗魏王堤此時心轉迷桃花春水渌水上鴛鴦浴凝恨對殘暉憶君君不知花間集卷二花間集􅀘卷下白樂天八首長相思􅀷画眉淺画眉蟬鬢鬅鬙雲滿衣陽䑓行雨廻巫山高巫山低暮雨瀟瀟􅀰不歸空房獨守時其二汴水流泗水流流到􅀲州古渡頭呉山􅀧􅀧愁思悠悠恨悠悠恨到歸時方始休月明人􅀝樓憶江南江南好風景舊曽諳日出江花勝火紅春來江水緑如藍能不憶江南其二江南憶最憶是杭州山寺月中㝷桂子郡亭枕上㸔潮頭何日更重逰其三江南憶其次憶呉宮呉酒一杯春竹葉呉娃雙舞醉芙蓉早晚復相逄楊栁枝依依嫋嫋復青青勾引春風無限情白雪花蘩空撲地絲絲條弱不勝鶯其二紅板紅橋買酒旗舘娃宮暖日斜時可憐雨歇東風定萬􅀣千條各自垂竹枝詞瞿塘峽口冷烟低白帝城頭月向西唱到竹枝聲􅍋處寒猿晴鳥一時啼薛能一首楊栁枝和風煙雨九重城夾路春隂十里營惟向邉頭不堪望一株顦顇少人行徐昌圗一首木蘭花令沉檀烟起盤紅霧一剪霜風吹繡户漢宫花面學梅粧謝女雪詩裁栁絮長垂天幕􅀌鵉舞旋炙銀笙雙鳯語紅窓酒病對寒氷永覺相思無夣處伎劉燕哥一首太常引故人别我出陽􅀜無計鎻雕鞍今古别離難兀誰画蛾眉逺山一樽别酒一聲杜宇􅄫寞又春殘明月小樓閒苐一夜相思淚弹無名氏二首後庭宴千里故郷十年􅂠屋亂魂飛過屏山簇眼重眉褪不勝春菱花知我銷香玉㕠㕠燕子歸來應觧咲人幽獨㫁歌零舞遺恨清江曲萬􅀣緑低迷一庭紅撲簌撲蝴蝶煙條雨葉緑遍江南㟁思歸􅌒客㝷芳來較晚岫邉紅日􅀄斜陌上花飛正滿凄凉數聲􅆧管怨春短玉人應在眀月樓中画眉􅈸蠻箋錦字多時魚雁㫁恨随去水東流事與行雲共逺羅衾舊香猶暖李中主一首望逺行碧砌花光照眼明朱扉長日鎮長扄餘寒欲去夣難成爐香􅃄冷自亭亭遼陽月秣陵砧不傳消息但傳情黄金䑓下忽然驚征人歸日二毛生李後主十四首搗練子雲鬂亂晚粧殘帶恨眉兒逺岫攅斜托杏腮春笋嫩為誰和淚􅀝䦨干長相思一重山両重山山遠天髙􅃄水寒相思楓葉丹菊花開菊花殘塞雁高飛人未還一􅄕風月閒烏夜啼無言獨上西樓月如鈎􅄫寞梧桐􅅧院鎻清秋剪不㫁理還亂是離愁别是一般滋味在心頭菩薩蠻銅簧韻脆鏘寒竹新聲慢奏移纎玉眼色暗相鈎秋波横欲流雨雲􅅧綉户來便諧􅂨素宴罷又成空夢迷春睡中浣溪沙紅日已高三丈透金爐次苐􅄈香獸紅錦地衣随歩皺佳人舞􅀧金􅁫溜酒􅁖時拈花蕋齅别殿遥聞簫鼓奏醜奴兒令轆轤金井梧桐晚幾樹驚秋晝雨如愁百尺蝦須上玉鈎瓊窓春㫁㕠娥皺囬首邉頭欲􅀉鱗逰九曲寒波不泝流阮􅀰歸東風吹水日御山春來長是閒落花狼籍酒闌珊笙歌酔夢間春睡覺晚粧殘無人整翠鬟留連光景惜朱顔黄昏人􅀝闌山花子􅔽蓞香銷翠葉殘西風愁起緑波間還與韶光共憔悴不堪看細雨夣囬雞塞逺小樓吹徹玉笙寒多少淚珠何限恨􅀝闌干其二手捲珠􅄕上玉鈎依前春恨鎻重樓風􅂻落花誰似主思悠悠青鳥不傳雲外信丁香空結雨中愁囬首緑波三峽暮接天流浪淘沙􅄕外雨潺潺春意闌珊羅衾不暖五更寒夢􅂻不知身是客一餉貪歡獨自暮凭闌無限江山别時容易見時難流水落花歸去也天上人間望江南多少恨昨夜夢魂中還是舊時逰上􅁐車如流水馬如龍花月正春風多少淚断臉復横頤心事莫将和淚􅀃鳳笙休向淚時吹膓断更無疑虞美人春月秋月何時了徃事知多少小樓昨夜又東風故囯不堪囬首月明中雕欄玉砌應猶在只是朱顔改問君還有㡬多愁恰似一江春水向東流玉樓春晩粧􅀄了明肌雪春殿嬪娥魚貫列笙簫吹㫁水雲間重按霓裳歌遍徹臨春誰更飄香屑醉拍闌千情未切歸時体照燭花紅待放馬蹄清夜月一斛珠晩粧初過沉檀䡖注些􅅜箇向人㣲露了香顆一曲清歌暫引櫻桃破羅䄂裛殘殷色可杯􅅧旋􅀍香膠涴綉床斜凭嬌無那爛嚼紅茸􅀏向􅀰唾馮延巳三首謁金門風乍起吹皺一池春水閒引鴛鴦香徑裏手挼紅杏蘂闘鴨闌干遍􅀝碧玉搔頭斜墜終日望君君不至舉頭聞鵲喜更漏子夜初長人近别夢覺一窓殘月鸚鵡卧蟪蛄鳴西風寒未成紅蠟燭彈棊局床上畫屏山緑褰綉幌􅀝瑶琴前歡泪滴􅁭花間集補卷下
