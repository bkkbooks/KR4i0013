front:
  text: 花間集卷八
  hash: sha256:8f5fa70860fcf615bae2548a381fd07032aa0d201671efecd9676d4103591a2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_008-1a}
body:
  text: 顧夐四十三首河傳燕颺晴景小窓屏暖鴛鴦交頸菱花掩却翠鬟欹慵整海棠􅄕外影繡幃香㫁金􅗌鶒無消息心事空相憶􅀝東風春正濃愁紅淚班衣上重其二曲檻春晚碧流紋細綠楊絲軟露花鮮杏枝繁鶯囀野蕪平似剪直是人間到天上堪逰賞醉眼疑屏障對池塘惜韶光㫁腸為花湏盡狂其三棹舉舟去波光􅄅􅄅不知何䖏㟁花汀艸共依依雨微鷓鴣相逐飛天涯離恨江聲􅍋啼猿切此意向誰􅀃艤蘭橈獨無憀魂銷小鑪香欲焦甘州子一鑪龍麝錦帷傍屏掩映燭熒煌禁樓刁斗喜􅀄長羅薦繡鴛鴦山枕上私語口脂香其二每逢清夜與良辰多悵望定傷神雲迷水隔意中人􅄫寞綉羅茵山枕上幾􅀧淚痕新其三曾如劉阮訪仙踪􅀷洞客此時逢綺筵散後繡衾同欵曲見韶容山枕上長是怯晨鍾其四露􅊝芲􅂻小樓深持玉盞聴瑶琴醉歸青􅃈入鴛衾月色照衣􅁭山枕上翠鈿鎮眉心其五紅爐􅅧夜醉調笙􅃻拍䖏玉纎䡖小屏古画㟁低平􅃄月滿間庭山枕上燈背臉波横玉樓春月照玉樓春漏促颯颯風揺庭砌竹夢驚鴛􅀍􅁴來時何䖏管絃聲㫁續惆悵少年逰冶去枕上兩蛾攅細綠曉鶯􅄕外語花枝背帳猶殘紅蠟燭其二栁影玉樓春日晚雨細風䡖􅃄草軟画堂鸚鵡語雕籠金粉小屏猶半掩香㓕繡幃人􅄫􅄫􅀝欄無語愁思逺恨􅀰何䖏縱踈狂長使含啼眉不展其三月皎露華窓影細風送菊香粘繡􅃑博山爐冷水沉微惆悵金閨終日閉􅂴展羅衾垂玉筯羞對菱芲篸寳髻良宵好事枉教休無計那他独耍婿其四拂水㕠飛來去燕曲檻小屛山六扇春愁凝思結眉心緑綺􅈸調紅錦薦話别情多心欲顫玉筯恨留紅粉面鎮長獨立到黄昏却怕良宵頻梦見浣溪沙春色迷人恨正賖可堪蕩子不還家細風䡖露著梨花􅄕外有情㕠燕颺檻前無力緑楊斜小屏狂梦極天涯其二紅藕香寒翠渚平月籠虚閣夜蛩清塞鴻驚梦雨牽情寳帳玉爐殘麝冷羅衣金縷暗塵生小牎􅀌燭淚縱横其三荷芰風䡖簾幕香繡衣鸂鶒淥􅅆塘小屏間掩舊瀟湘恨入􅆰幃鸞影獨淚凝㕠臉渚蓮光薄情年少悔思量其四惆悵經年别謝娘月窓花院好風光此時相望最情傷青鳥不來傅錦字瑶􅁎何䖏􅃈蘭房忍教魂梦両茫茫其五庭菊飄黄玊露濃冷沙隈砌􅀮鳴蛩何期良夜得相逢背帳風揺紅臘滴惹香暖梦繡衾重覺來枕上怯晨鍾其六雲淡風高葉􅅍飛小庭寒雨綠苔微深閨人静掩屏幃粉黛暗愁金帶枕鴛鴦空繞画羅衣那堪􅇳􅀒不思歸其七雁響遥天玊漏清小紗窓外月朧明翠幃金鴨炷香平何䖏不歸音信断良宵空使梦魂驚簟凉枕冷不勝情其八露白蟾明又到秋佳期幽㑹両悠悠梦牽情役幾時休記得䛏人㣲歛黛無言斜􅀝小書樓暗思前事不勝愁酒泉子楊栁舞風輕惹春􅃄殘雨杏花愁鶯正語画樓東錦屏􅄫寞思無窮還是不知消息鏡塵生珠淚滴損儀容其二羅帶縷金蘭麝􅃄凝魂㫁画屏欹雲鬂􅅍恨難任幾􅅆垂淚滴鴛衾薄情何䖏去月臨牎花滿樹信沉沉其三小檻日斜風度綠窓人悄悄翠幃閒掩舞㕠鸞舊香寒别來情緒轉難判韶顔㸔却老依俙粉上有啼痕暗銷魂其四黛薄紅深約掠綠鬟雲膩小鴛鴦金翡翠􅁛人心錦鱗無䖏傳幽意海燕蘭堂春又去隔年書千􅀧淚恨難任其五掩却菱花收拾翠鈿休上􅆕金􅆉玊燕􅃈香奩恨厭厭雲鬟半墜􅂴重篸淚侵山枕濕銀燈背帳夢方酣雁飛南其六水碧風清入檻細香紅藕膩謝娘歛翠恨無涯小屏斜堪憎蕩子不還家謾留羅帶結帳􅅧枕膩炷沉􅃄􅀒當年其七黛怨紅羞掩映画堂春欲暮殘花微雨隔青樓思悠悠芳菲時莭㸔将度􅄫寞無人還獨語画羅濡香粉汚不勝愁楊栁枝秋夜香閨思􅄫寥漏迢迢鴛幃羅幌麝􅃄銷燭光揺正憶玉􅀰逰蕩去無㝷䖏更聞􅄕外雨蕭蕭滳芭蕉遐方怨􅄕影細簟紋平象紗籠玉指縷金羅扇輕嫰紅㕠臉似花明両條眉黛逺山横􅃫簫歇鏡塵生遼塞音書絶梦魂長暗驚玉􅀰經􅀊􅀒娉婷教人争不恨無情獻􅂨心繡鴛鴦帳暖画孔雀屏欹人悄悄月明時想昔年懽咲恨今日分離銀缸背銅漏永阻佳期小爐􅃄細虗閣􅄕垂幾多心事暗地思惟􅀍嬌娥牽役魂梦如癡金閨􅂻山枕上始應知應天長瑟瑟羅裙金線縷􅁿透鵝黄香画袴垂交帯盤鸚鵡褭褭翠翹移玉歩背人匀檀注慢轉横波偷覷歛黛春情暗許􅀝屛慵不語訴裏情香滅􅄕垂春漏永整鴛衾羅帯重㕠鳯縷黄金牎外月光臨沉沉㫁腸無䖏㝷􅀒春心其二永夜抛人何䖏去絶來音香閣掩眉歛月将沉争忍不相㝷怨􅀌衾換我心為你心始知相憶深荷葉杯春盡小庭花落􅄫寞凭檻歛㕠眉忍教成病憶佳期知摩知知摩知其二歌彂誰家筵上寥亮别恨正悠悠蘭缸背帳月當樓愁摩愁愁摩愁其三弱栁好花盡拆晴陌陌上少年􅀰滿身蘭麝撲人香狂摩狂狂摩狂其四記淂那時相見膽顫鬂􅅍四肢柔泥人無語不擡頭羞摩羞羞摩羞其五夜乆歌聲怨􅍋殘月菊冷露㣲㣲看看濕透縷金衣㱕摩㱕㱕摩㱕其六我憶君詩最苦知否字字盡􅀜心紅牋為􅀉表情深吟摩吟吟摩吟其七金鴨香濃鴛􅀍枕膩小䯻簇花鈿腰如細栁臉如蓮憐摩憐憐摩憐其八曲砌蝶飛􅃄暖春半花彂㧕垂條花如㕠臉栁如腰嬌摩嬌嬌摩嬌其九一去又乖期信春盡滿院長莓苔手拈裙帶獨徘徊來摩來來摩來漁歌子曉風清幽沼綠􅀝欄凝望珍禽浴画􅄕垂翠屏曲滿䄂荷香馥郁好攄懷堪寓目身閒心静平生足酒杯深光影促名利無心較逐花間集卷八
