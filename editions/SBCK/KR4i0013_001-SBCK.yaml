front:
  text: 花間集卷一
  hash: sha256:8a5ef4d6e3f4ce687b5b87a03023041decc240ec86f61c3f31803081a5de7e3d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_001-1a}
body:
  text: 唐衛尉少卿趙崇祚集温廷筠四十四首菩薩蠻小山重叠金明㓕鬂雲欲度香顋雪􅂴􅁸画蛾眉㺯粧梳洗遟照花前後鏡花面交相映新帖繡羅􅃭㕠㕠金鹧鴣其二水精􅄕􅂻頗􅀺枕暖香惹夣鴛鴦錦江上栁如烟雁飛殘月天藕絲秋色淺人勝􅂙差剪㕠鬂隔香紅玉􅁫頭上風其三蘂黄無限當山額􅀫粧􅀮咲紗窓隔相見牡丹時暫來還别離翠􅁫金作股􅁫上蝶㕠舞心事竟誰知月明花滿枝其四翠翹金鏤㕠鸂鶒水紋細􅁸春池碧池上海棠梨雨晴紅滿枝繡衫􅃒􅀏靨􅃄草粘飛蝶青􅃈對芳菲玉關音信稀其五杏花含露團香雪緑楊陌上多離别燈在月隴明覺來聞暁鶯玉鈎褰翠幕粧淺舊眉薄春夢正關情鏡中蟬鬂䡖其六玊樓明月長相憶桞絲裊娜春無力門外草萋萋送君聞馬嘶画羅金翡翠香燭消成淚花落子䂓啼緑窓殘夣迷其七鳳皇相對盤金縷牡丹一夜經微雨明鏡照新粧鬂䡖㕠臉長画樓相望乆欄外垂絲桞音信不歸來社前㕠燕迥其八牡丹花謝鶯聲歇緑楊滿院中庭月相憶夣難成背窓燈半明翠鈿金壓臉寂寞香閨掩人逺淚䦨干燕飛春又殘其九滿宫明月梨花白故人萬里関山隔金雁一䨥飛淚痕沾綉衣小園芳艸緑家住越溪曲楊栁色依依燕歸君不歸其十寳函鈿雀金􅗌䳵沉香關上呉山碧楊栁又如絲驛橋春雨時画樓音信㫁芳艸江南㟁鸞鏡與花枝此情誰淂知其十一南園滿地堆䡖絮愁聞一霎清明雨雨後却斜陽杏花零落香無言勻睡臉枕上屏山掩時莭欲黄昏無憀獨􅀝門其十二夜來皓月􅅻當午重􅄕悄悄無人語深處麝􅃄長臥時留薄粧當年還自惜徃事那堪憶花露月明殘錦衾知暁寒其十三雨睛夜合玲瓏日萬枝香褭紅絲拂間夢憶金堂滿庭萱草長繡􅄕垂􅟞眉黛逺山緑春水渡溪橋凭欄魂欲消其十四竹風䡖動庭除冷珠􅄕月上玲瓏影山枕􅀮穠粧緑檀金􅃫皇両蛾愁黛淺故國呉宫逺春恨正関情画樓殘􅀧聲更漏子桞絲長春雨細花外漏聲迢遞驚塞鴈􅁸城鳥画屏金鷓鴣香霧薄透􅄕幕惆悵謝家池閣紅燭背綉􅄕垂夢殘君不知其二星斗稀鍾鼓歇􅄕外暁鶯殘月蘭露重栁風斜滿庭堆落花虗閣上􅀝欄望還似去年惆悵春欲暮思無窮舊歡如夣中其三金雀􅁫紅粉面花􅂻暫時相見知我意感君憐此情須問天香作穗蠟成淚還似両人心意山枕膩錦衾寒覺來更漏殘其四相見稀相憶乆眉淺澹􅃄如栁垂翠幕結同心待􅀰燻綉衾城上月白如雪蝉鬂美人愁絶宫􅀣暗鵲橋橫玊籖􅀄報明其五背江樓臨海月城上角聲嗚咽堤栁動島烟昏両行征雁分京口路歸㠶渡正是芳菲欲度銀燭盡玉繩低一聲村落雞其六玉罏香紅蠟淚偏照画堂秋思眉翠薄鬂雲殘夜長衾枕寒梧桐􅀣三更雨不道離情正苦一葉葉一聲聲空堦滴到明歸國遥香玊翠鳯寳􅁫垂􅟞鈿交勝金粟越羅春水渌画堂照􅄕殘燭萝餘更漏促謝娘無限心曲曉屏山㫁續其二㕠臉小鳯􅀾箆金颭艶舞衣無力風欽藕絲秋色染錦帳繍幃斜掩露珠清曉簟粉心黄蘂花靨黛眉山両􅀧酒泉子花映栁條閒向緑萍池上凭欄干窺細浪雨瀟瀟近來音信両踈索洞房空􅄫寞掩銀屏垂翠箔度春宵其二日映紗牎金鴨小屏山碧故鄉春烟藹隔背蘭缸􅀫粧惆悵􅀝高閣千里雲影薄草􅀄齊花又落燕㕠㕠其三楚女不歸樓枕小河春水月􅀌明風又􅁸杏花飛玉􅁫斜篸雲鬟髻裙上金縷鳯八行書千里夣雁南飛其四羅帶惹香猶繋别時紅豆淚痕新金縷舊㫁離腸一㕠嬌燕語雕梁還是去年時節緑隂濃芳草歇桞花狂定西畨漢使昔年離别攀弱桞折寒梅上高臺千里玉関春雪雁來人不來羗笛一聲愁絶月徘徊其二海燕欲飛調羽萱艸緑杏花紅隔􅄕攏㕠鬂翠霞金縷一枝春艶濃樓上月明三五􅃈牎中其三細雨暁鶯春晚人似玊桞如眉正相思羅幕翠簾􅀄􅐈鏡中花一枝腸㫁塞門消􅒚雁來稀楊桞枝冝春苑外最長條閒褭春風伴舞腰正是玉人腸㫁處一渠春水赤欄橋其二南内墻東御路傍湏知春色栁絲黄杏花未肯無情思何事行人最㫁腸其三蘓小門前栁萬條毵毿金線拂平槗黄鶯不語東風􅁸深閉朱門伴舞腰其四金縷毵毿碧瓦溝六宮眉黛惹香愁晚來更帶龍池雨半拂欄于半入樓其五舘娃宫外鄴城西逺映征㠶近拂堤繫得王孫歸意切不関芳艸緑萋萋其六両両黄鸝色似金褭枝啼露動芳音春來幸自長如線可惜牽􅆞蕩子心其七御栁如絲映九重􅃫皇牎映繍芙蓉景陽樓畔千條路一面新粧待暁風其八織錦機邉鶯語頻停梭垂淚憶征人塞門三月猶蕭索縦有垂楊未覺春南歌子手裏金鸚鵡􅅐前繍鳯皇偷眼暗形相不如從嫁與作鴛鴦其二似帶如絲栁團酥握雪花簾捲玊鈎斜九衢塵欲暮逐香車其三撲蕋添黄子呵花滿翠鬟鴛枕映屏山月明三五夜對芳顔其六轉盻如波眼娉婷似栁腰花􅂻暗相招憶君腸欲断恨春宵其七􅂴拂鴛鴦枕休逢翡翠裙羅帳罷罏燻近來心更切為思君花間集卷一花間集􅀘卷上西呉温博編次李白七首菩薩蠻平林漠漠烟如織寒山一帶傷心碧暝色入高樓有人樓上愁闌干空佇立􅀫鳥歸飛急何處是歸程長亭更短亭憶秦娥簫聲咽秦娥夢㫁秦樓月秦樓月年年栁色覇陵傷别樂逰原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕清平樂令禁庭春晝鶯羽披新繍百草巧求花下閗只賭珠璣滿斗日晚􅁍理殘粧御前閑舞霓裳誰道腰支窈窕折旋消得君王其二禁闈秋夜月探金􅈧罅玉帳鴛鴦噴沉麝時落銀燈香灺女伴莫話􅀌眠六宮羅綺三千一笑皆生百媚宸逰教在誰邉清平調辭名花傾國兩相歡長得君王帯笑看解釋春風無限意沉香亭北􅀝闌干其二一枝紅􅃩露凝香雲􅀨巫山枉㫁腸借問漢宮誰得似可憐飛燕􅀝新粧其三雲想衣裳花想容春風拂檻露華濃若非群玉山頭見定向瑶􅄗月下逢張志和五首漁􅁔子西塞山前白鷺飛桃花流水鱖魚肥青篛笠緑蓑衣斜風細雨不須㱕其二青草湖中月正圓巴陵漁父棹歌連釣車子橛頭船樂在風波不用􅋖其三松江􅈉舎主人歡菰飯􅐜􅅅亦共飡楓葉落荻花乾醉􅀫漁舟不􅁴寒其四霅溪灣裏釣魚翁舴艋爲家西復東江上雪浦邉風咲着荷衣不嘆窮其五釣䑓漁父􅄄爲裘両兩三三舴艋舟能縦棹慣乗流長江白浪不湏憂元結四首欵乃曲千里楓林烟雨深無朝無暮有猿吟停橈静聴曲中意好似雲山韶􆀄音其二零陵郡北湘水東浯溪形勝滿湘中溪口石顛堪自逸誰人能伴作漁翁其三湘江二月春水平滿月和風冝夜行唱橈欲過平陽戍守吏相呼問姓名其四下瀧船似入􅅧淵上瀧船似欲升天瀧南始到九嶷郡應絶高人乗興船安陌上無窮􅀣惟有垂楊管别離其三楊子江頭􅃄景迷隋家宮樹拂金堤嵯峨猶有當時色半蘸波中水鳥棲其四花蕚樓前􅀄種時羙人樓上闘腰肢如今抛擲長街裏露葉如啼欲恨誰其五和風煙􅀨九重城夾路春隂十里營惟向邉頭不堪望一株顦顇少人行竹枝詞白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動郷情其二山桃紅花滿上頭蜀江春水拍山流花紅易衰似􅀰意水流無限似儂愁其三江上朱樓新雨晴瀼西春水縠紋生橋東橋西好楊栁人来人去唱歌行其四日出三竿春霧消江頭蜀客駐蘭橈憑􅀉狂夫書一􅁓家住成都萬里橋其五両㟁山花似雪開家家春酒滿銀杯昭君坊中多女伴永安宮外􅂿青來其六瞿塘嘈嘈十二灘此中道路古來難長恨人心不如水等閒平地􅁸波瀾其七巫峽蒼蒼􅃄雨時清猿啼在最髙枝個裏愁人膓自㫁由來不是此聲悲其八城西門前灔澦堆年年波浪不能摧懊惱人心不如石少時東去復西來其九山上層層桃李花雲間煙火是人家銀釧金􅁫來􅀒水長刀短笠去燒畬其十楊栁青青江水平聞􅀰江上唱歌聲東邉日出西邉雨道是無情還有情李渉三首竹枝詞十二􅈐頭月欲低空舲灘上子䂓啼􅀌舟一夜東歸客泣向東風憶建溪其二荆門灘急水潺潺両㟁猿啼煙滿山渡頭年少應官去月落西陵望不還其三石壁千重樹萬重白雲斜掩碧芙蓉昭君溪上年年月獨自嬋姢色最濃王建六首古調咲團扇團扇美人並來􅃒靣玉顔顦顇三年誰復啇量管絃絃管絃管春艸昭陽路㫁其二胡蝶胡蝶飛上金花枝葉君前對舞春風百葉桃花樹紅紅􅀣紅樹燕語鶯啼日暮其三羅䄂羅䄂暗舞春風已􅃇遥㸔歌舞玉樓好日新粧㘴愁愁㘴愁坐一世虗生虚過其四楊栁楊栁日暮白沙渡口船頭江水茫􅃼啇人少婦㫁腸腸㫁腸㫁鷓鴣夜来失伴三䑓令池北池南草緑殿前殿後花紅天子千秋萬􅀊未央明月清風其二魚藻池邉射鴨芙蓉􅁐􅂻㸔花日色赭黄相似不着紅鸞扇􅃒花間集􅀘卷上
