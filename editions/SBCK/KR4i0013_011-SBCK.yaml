front:
  text: 花間集􅃃十一
  hash: sha256:fc075a8c646eb72791f4de709123c9d7de2393e5433c0d2b4a9546df69841e7b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_011-1a}
body:
  text: 鹿䖍扆思越人翠屏欹銀燭背漏殘清夜迢迢雙帯繍窠盤錦薦淚侵花暗香銷珊瑚枕膩鴉鬟乱玉纎慵整雲散苦是適来新夢見􅄐腸争不千断虞羙人卷荷香澹浮煙渚緑嫩擎新雨鎖窓踈透暁風清象床珍簟泠光輕水紋平九疑黛色屏斜掩枕上眉心欽不堪相望病􅀅成鈿昏檀粉淚縦横不勝情閻選八首虞羙人粉融紅膩蓮房綻臉動􅀟波慢小魚衘玉􅁂􅁫横石榴裙染象紗䡖轉娉婷偷期錦浪荷􅀷䖏一夢雲蕪􅀨臂留檀印齒痕香􅀷秋不􅄰漏􅀄長儘思量其二椘腰蠐領􅇛香玉􅁂疊􅀷深緑月娥星眼􅀏㣲頻栁夭桃艶不勝春晚粧勻水紋簟映青紗帳霧􅇁秋波上一枝嬌卧醉芙蓉良宵不得與君同恨忡忡臨江僊􅀨停荷芰逗濃香岸邉蝉噪垂楊物華空有舊池塘不逢仙子何䖏夢㐮王珍簟對欹鴛枕冷此来塵暗凄凉欲憑危檻恨偏長藕花珠綴猶似汗凝粧其二十二高峰天外寒竹梢䡖拂仙壇寳衣行雨在雲端画􅄕􅀷殿香霧冷風殘欲問椘王何䖏去翠屏犹掩金鵉猿啼明月照空灘孤舟行客驚夢亦艱難浣沙溪􅄫寞流蘇冷綉茵􅀝屏山枕惹香塵小庭花露泣濃春劉阮信非仙洞客常娥終是月中人此生無路訪東隣八拍蛮雲鎖嫩黄烟柳細風吹紅􅎞雪梅殘光影不勝閨閤恨行行坐㘴黛眉攅其二愁鎖黛眉烟易惨淚飄紅臉粉难勻憔悴不知縁底事遇人推道不宜春河傳秋雨秌雨無畫無亱滴滴霏霏暗燈凉簟怨分􅄐妖􅁎不勝悲西風稍急喧窓竹停又續膩臉懸㕠玉几􅅆邀約雁来時違期㕍㱕人不㱕尹鶚六首臨江仙一畨荷芰生池沼槛前風送馨香昔年於此伴蕭娘相偎竚立牽惹叙裏腸時逞咲容無限態還如􅔽蓞爭芳别来虗遣思悠颺慵窺徃亊金鎖小蘭房其二深秋寒夜銀河静月明深院中庭西窓鄊夢等閑成逡廵斍後特地恨難平紅燭半消殘熖短依稀暗背銀屏枕前何亊最傷情梧桐葉上􅀧􅀧露珠零滿官花月沉沉人悄悄一炷後庭香􅒁風流帝子不帰来滿地禁花慵掃􅄐恨多相見少何䖏醉迷三島漏清宫􅀣子規啼愁鎻碧窓春暁杏園芳􅃊籹嫩臉花明教人見了関情含羞舉歩越羅䡖􅁛娉停終朝咫尺窺香閣迢遥似隔層城何時休遣夢相萦入雲屏醉公子暮􅃄籠蘚砌㦸門猶未閉盡日醉㝷春帰来月滿身􅄐鞍偎繍􅃑墜巾花亂綴何䖏恼佳人檀㾗衣上新菩薩蛮隴雲暗合秋天白俯窓獨坐窺􅃄陌樓際角重吹黃昏方醉帰荒唐難共語明日還應去上馬出門時金鞍莫與伊毛熈震二十一首浣沙溪春暮黄鶯下砌前水晶􅄕影露珠懸綺霞低映晚晴天弱桞萬條垂翠帯殘紅滿地碎香鈿􅈍風飄蕩散􅁿􅃄其二花謝香紅􅃄景迷滿庭芳草緑萋萋金鋪閑掩繍􅄕低紫燕一􅀟嬌語碎翠屏十二晚􅈐齊夢魂銷散醉空閨其三晚起紅房醉欲銷緑鬟雲散􅒁金翹雪香花語不朦嬌好是向人柔弱䖏玉纎時急繍裙腰春心牽惹轉無憀其四一􅃗横􅁫墜髻叢静眠珍簟起来慵繍羅紅嫩抺酥􅎍羞歛細蛾魂暗㫁困迷無語思猶濃小屏香靄碧山重其五雲薄羅裙綬帯長滿身新裛瑞龍香翠鈿斜映艶梅籹佯不覷人空婉約笑和嬌語太娼狂􅃘教牽恨暗形相其六碧玉冠䡖􅒁燕􅁫捧心無語歩香堦緩移􅃓底繍羅鞋暗想歡娛何計好豈堪期約有時乖日髙深院正忘懐其七半醉疑情臥繍茵睡容無力缷羅裙玉籠鸚鵡厭聽聞慵整落􅁫金翡翠像梳欹鬂月生雲錦屏綃幌麝􅃄薫臨江仙南齊天子寵嬋姢六宫羅綺三千潘妃嬌艶獨芳妍椒房蘭洞雲雨降神仙縦態迷歡心不􅁕風流可惜當年纎腰婉約歩金蓮妖君傾􅀦猶自至今傳其二幽閨􅁒􅍼聞鶯囀紅窓月影微明好風頻謝落花聲隔幃殘燭猶照綺屏筝繍􅀍錦茵眠玉煖炷香斜􅒁䡖􅃄􅌿蛾羞歛不朦情暗思閑夢何䖏逐雲行更漏子秋色清河影􅌿深户燭寒光暗綃幌碧錦衾紅􅀶山香炷融更漏咽蛩鳴切滿院霜華如雪新月上薄雲􅀵映􅄕懸五鈎其二煙月寒秋夜静漏轉金壺初永羅幕下繡屏空燈花結碎紅人消悄愁無了思夢不成難暁長憶淂與􅀰期􅀼香私語時女􅃣子碧桃紅杏遲日媚籠光影綵霞􅀷香煖薫鶯語風清引鶴音翠鬟冠玉葉霓䄂捧瑶琹應共吹簫侣暗相㝷其二脩娥慢臉不語檀心一􅀧小山粧蝉􅁂低含緑羅衣􅌿拂黄悶来深院􅂻閑歩落花傍纎手䡖䡖整玉爐香清平樂春光欲暮􅄫寞閒庭户粉蝶䨇䨇穿檻舞􅄕卷晚天踈雨含愁獨􅀝閨幃玉罏􅃄㫁香微正是銷魂時莭東風滿􅀣花飛南􅁔子逺山愁黛碧横波慢臉明膩香紅玉茜羅䡖􅀷院晚堂人静理銀筝鬢動行雲影裙􅃒􅀧􅄚聲嬌羞爱問曲中名楊桞杏花時莭㡬多情其二惹恨還添恨牽膓即断腸凝情不語一枝芳獨映画􅄕閒立繡衣香暗想為雲女應憐傅粉􅀰晚来輕歩出閨房髻慢􅁫横無力縱猖狂河滿子寂寞芳菲暗度􅀊華如箭堪驚􅃡想舊􅂬夛少亊轉添春思難平曲檻絲埀金桞小牎絃断銀筝深院空聞燕語滿園閒落花輕一片相思休不得忍教長日愁生誰見夕陽孤夢覺来無限傷情其二無語殘粧􅌿薄􅍭羞亸􅃑輕盈幾度香閨眠過曉綺窓初日微明雲母帳中偷惜水晶枕上初驚咲靨嫩疑花析愁眉翠歛山横相望只教添悵恨整鬟時見纎瓊獨􅀝朱扉閑立誰知别有深情小重山梁燕􅀟飛􅀞閣前寂寥多少恨􅂴孤眠暁来閑䖏想君憐紅羅帳金鴨冷沉烟誰信損嬋姢􅀝屏啼玉筯濕香鈿四肢無力上鞦韆羣花謝愁對艶陽天定西畨蒼翠濃隂滿院鶯對語蝶交飛􅃧薔薇斜日􅀝欄風好餘香出繡衣未得玉􅀰消息幾時歸木蘭花掩朱扉鈎翠箔滿院鶯聲春寂寞匀粉淚恨檀􅀰一去不歸花又落對斜暉臨小閣前亊豈堪重想着金帶冷画屏幽寳帳慵薫蘭麝薄花間集卷十一
