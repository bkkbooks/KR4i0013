front:
  text: 花間集卷六
  hash: sha256:1cde5c5e7d1e947a1c4a4dc5217b27abff6987df99465aa55831c017ac09c335
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_006-1a}
body:
  text: 毛文錫二十三首接賢賓香韉鏤襜五花驄值春景𥘉融流珠噴沫躞蹀汗血流紅少年公子能乘馭金鑣玉轡瓏璁為惜珊瑚鞭不下驕生百步千蹤信穿花從拂栁向九陌追風贊浦子錦帳添香睡金爐換夕薰懶結芙容帶慵拖翡翠裙正是桃夭栁媚那看暮雨朝雲宋玊髙唐意裁瓊欲贈君井州遍春光好公子愛間逰足風流金鞍白馬雕弓寶劔紅纓錦襜出長鞦花蔽膝玉䘖頭尋芳逐勝歡晏絲竹不曾休美人唱揭調是井州醉紅樓堯年舜日樂聖永無憂其二秋風緊平磧雁行低陳雲齊蕭蕭颯颯邊聲四起愁聞戍角與征鼙青冢北黑山西沙飛聚散無定往往路人迷鐵衣冷戰馬血沾蹄破蕃奚鳳皇詔下步步躡丹梯紗窗恨新春燕子還來至一雙飛壘巢泥濕時時墜涴人衣後園裡看百花彂香風拂繡户金扉月照紗窗恨依依其二雙雙蝶翅塗鉛粉咂花心綺窗繡户飛來穩畫堂隂二三月愛隨飄絮伴落花來拂衣襟更剪輕羅片傅黃金栁含煙隋堤栁汴河春夾岸緑隂千里龍舟鳳舸木蘭香錦帆張因夢江南春景好一路流蘇羽葆笙歌未盡起橫流鎖春愁其二河橋栁占芳春映水含煙拂路幾回攀折贈行人暗傷神樂府吹為橫笛曲能使離腸斷續不如移植在金門近天恩其三章臺栁近垂旒低拂往耒冠蓋朧隴春色滿皇州瑞煙浮直與路邊江畔别免𬒳離人攀折最憐京兆畫蛾眉葉纎時其四御溝栁占春多半出宫墻婀娜有時倒影蘸輕羅麴塵波昨日金鑾巡上苑風亜舞腰纎軟栽培得地近皇宫瑞煙濃醉花間休相問怕相問相問還添恨春水滿塘生􅗌鶒還相趂昨夜雨霏霏臨眀寒一陳偏憶戍樓人久絶邊庭信其二深相憶莫相憶相憶情難極銀漢是紅墻一帶遙相隔金盤珠露滴兩岸榆花白風搖玉珮清今夕為何夕浣沙溪春水輕波浸緑苔枇杷洲上𬗋檀開晴日眠沙􅗌鶒穩暖相隈羅襪生塵逰女過有人逢著弄珠廽蘭麝飄香𥘉解佩忘歸來其二七夕年年信不違銀河清淺白雲微蟾光鵲影百勞飛每恨蟪蛄憐婺女幾廽嬌妬下鴛機今宵嘉會兩依依月宫春水精宫裡桂花開神仙探幾廽紅芳金蘂繡重臺低傾馬腦杯玉兔銀蟾爭守護姮娥姹女戲相隈遙聽釣天九奏玊皇親看來戀情深滳滴銅壷寒漏咽醉紅樓月宴餘香殿會鴛衾蕩春心真珠簾下曉光侵鶯語隔瓊林寶帳欲開慵起戀情深其二玊殿春濃花爛熳簇神仙伴羅裙窣地縷黃金奏清音酒闌歌罷兩沉沉一笑動君心永願作鴛鴦伴戀情深訴衷情桃花流水漾縱橫春晝彩霞明劉郎去阮郎行惆悵恨難平愁坐對雲屏算歸程何時携手洞邊迎訴衷情其二鴛鴦交頸繡衣輕碧沼藕花馨隈藻荇映蘭汀和雨浴浮萍思歸對心驚想邊庭何時解佩掩雲屏訴裏情應天長平江波暖鴛鴦語兩兩釣船歸極浦蘆州一夜風和雨飛起淺沙翹雪鷺漁燈明逺渚蘭棹今宵何處羅𬒮從風輕舉愁殺採蓮女河漏子紅粉樓前月照碧紗窗外鶯啼夢斷遼陽音信那堪獨守空閨恨對百花時節王孫緑草凄凄巫山一假雲雨霽巫山上雲輕映碧天逺風吹散又相連十二晚峰前暗濕啼猿樹高籠過客船朝朝暮暮楚江邊幾度降神仙臨江仙暮蟬聲盡落斜陽銀蟾影挂瀟湘黃陵廟側水茫茫楚山紅樹煙雨隔高唐岸泊漁燈風颭碎白蘋逺散濃香靈娥鼓瑟韻清商朱絃凄切雲散碧天長牛希濟十一首臨江仙峭碧參差十二峯冷煙寒樹重重瑶姬宫殿是仙蹤金罏珠帳香靄晝偏濃一自楚王驚夢斷人間無路相逄至今雲雨帶愁容月斜江上征棹動晨鍾其二謝家仙觀寄雲岑巖蘿拂地成隂洞房不閉白雲深當時丹竈一粒化黃金石壁霞衣猶半挂松風長似鳴琴時聞唳鶴起前林十洲高會何處許相尋其三渭闕宫城秦樹凋玉樓獨上無憀含情不語自吹簫調清和恨天路逐風飄何事乘龍人忽降似知深意相招三清携手路非遙世間屏障彩筆畫嬌嬈其四江繞黃陵春廟間嬌鶯獨語關關滿庭重疊緑苔斑隂雲無事四散自歸山簫鼓聲稀香燼冷月娥斂盡灣環風流皆道勝人間須知狂客判死為紅顔其五素洛春光瀲灔平千重媚臉𥘉生凌波羅襪勢輕輕煙籠日照珠翠半分明風引寶衣疑欲舞鸞回鳳翥堪驚也知心許恐無成陳王辭賦千載有聲名其六柳帶搖風漢水濵平蕪兩岸爭勻鴛鴦對浴浪䀶新㺯珠逰女微笑自含春輕步暗移蟬鬢動羅裙風惹輕塵水精宫殿豈無因空勞纎手解佩贈情人其七洞庭波浪颭睛天君山一點凝煙此中真境屬神仙玉樓珠殿相映月輪邊萬里平湖秋色冷星辰垂影參然橘林霜重更紅鮮羅浮山下有路暗相連酒泉子枕轉簟涼清逺曉鍾殘夢月光斜簾影動舊爐香夢中説盡相思事纎手勻雙淚去年書今日意斷離腸生查子春山煙欲收天淡稀星小殘月臉邊明别淚臨清曉語巳多情未了回首猶重道記得緑羅裙處處憐芳草中興樂池塘暖碧浸晴暉濛濛栁絮輕飛紅蕊凋來醉夢還稀春雲空有雁歸珠簾垂東風寂寞恨郎拋擲淚濕羅衣謁金門秋已暮重疊關山岐路嘶馬搖鞭何處去曉禽霜滿樹夢斷禁城鍾鼓淚滴枕檀無數一點凝紅和薄霧翠娥愁不語花間集卷六
