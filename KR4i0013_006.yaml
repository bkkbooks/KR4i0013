front:
  text: 花間集卷六
  hash: sha256:1cde5c5e7d1e947a1c4a4dc5217b27abff6987df99465aa55831c017ac09c335
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0013_SBCK_006-1a}
body:
  text: 毛文錫二十三首接賢賓香韉鏤䄡五花騘值春景𥘉融流珠噴沫躞蹀汗血流紅少年公子能乗馭金鑣玉轡瓏璁為惜珊瑚鞭不下驕生百歩千蹤信穿芲從拂栁向九陌追風賛浦子錦帳添香睡金鑪換夕薰懶結芙容帶慵拖翡翠裙正是桃夭栁媚那㸔暮雨朝雲宋玊髙唐意裁瓊欲贈君丼州遍春光好公子愛閒逰足風流金鞍白馬雕弓寳劔紅纓錦䄡出長鞦花蔽膝玉䘖頭㝷芳逐勝歡晏絲竹不曾休美人唱掲調是丼州醉紅樓尭年舜日樂聖永無憂其二秋風緊平磧雁行低陣雲齊蕭蕭颯颯邊聲四起愁聞戍角與征鼙青塚北黑山西沙飛聚散無定徃徃路人迷銕衣冷戰馬血沾蹄破蕃奚鳳皇詔下歩歩躡丹梯紗窓恨新春燕子還來至一㕠飛壘巢泥濕時時墜涴人衣後園裡看百芲彂香風拂綉户金扉月照紗窓恨依依其二㕠㕠蝶翅塗鈆粉咂花心綺牎繡户飛來穏画堂隂二三月愛随飄絮伴落芲來拂衣襟更剪䡖羅片傅黄金栁含烟隋堤栁汴河春夾㟁緑隂千里龍舟鳳舸木蘭香錦㠶張因梦江南春景好一路流蘇羽葆笙歌未盡𧺫横流鎻春愁其二河橋栁占芳春映水含烟拂路幾迴攀折贈行人暗傷神楽府吹爲横笛曲能使離腸㫁續不如移植在金門近天恩其三章䑓栁近垂旒低拂徃耒冠盖朧隴春色滿皇州瑞烟浮直與路邊江畔别免𬒳離人攀折最憐京兆畫蛾眉葉纎時其四御溝栁占春多半出宫墻婀娜有時倒影蘸䡖羅麴塵波昨日金鑾廵上苑風亜舞腰纎軟栽培得地近皇宫瑞烟濃醉芲間休相問怕相問相問還添恨春水滿塘生􅗌鶒還相趂昨夜雨霏霏臨眀寒一陣偏憶戍樓人乆絶邊庭信其二深相憶莫相憶相憶情難極銀漢是紅墻一帶遥相隔金盤珠露滴両㟁榆花白風揺玉珮清今夕為何夕浣沙溪春水輕波浸緑苔枇杷洲上𬗋檀開晴日眠沙􅗌鶒穏暖相隈羅襪生塵逰女過有人逢著弄珠廽蘭麝飄香𥘉觧佩忘歸来其二七夕年年信不違銀河清淺白雲㣲蟾光鵲影百劳飛每恨蟪蛄憐婺女幾廽嬌妬下鴛機今宵嘉㑹両依依月宫春水精宫裡桂芲開神仙探幾廽紅芳金蘂繡重䑓低傾馬腦盃玉兎銀蟾争守護姮娥姹女戯相隈遥聴釣天九奏玊皇親㸔来戀情深滳滴銅壷寒漏咽醉紅樓月宴餘香殿㑹鴛衾蕩春心真珠簾下曉光侵鶯語隔瓊林寳帳欲開慵𧺫戀情㴱其二玊殿春濃花爛熳簇神仙伴羅裙窣地縷黄金奏清音酒闌歌罷両沉沉一咲動君心永願作鴛鴦伴戀情深訴衷情桃花流水漾縱横春晝彩霞明劉郎去阮郎行惆悵恨難平愁㘴對雲屏算歸程何時携手洞邊迎訴衷情其二鴛鴦交頸繡衣䡖碧沼藕花馨隈藻荇映蘭汀和雨浴浮萍思歸對心驚想邊庭何時觧佩掩雲屏訴裏情應天長平江波暖鴛鴦語両両釣船歸極浦蘆州一夜風和雨飛𧺫淺沙翹雪鷺漁燈明逺渚蘭棹今宵何䖏羅𬒮従風輕擧愁殺採蓮女河漏子紅粉樓前月照碧紗窓外鶯啼夣㫁遼陽音信那堪獨守空閨恨對百芲時節王孫綠草凄凄巫山一叚雲雨霽巫山上雲䡖映碧天逺風吹散又相連十二晚峰前暗濕啼猿樹高籠過客船朝朝暮暮楚江邊幾度降神仙臨江仙暮蝉聲盡落斜陽銀蟾影挂瀟湘黄陵廟側水茫茫楚山紅樹烟雨隔高唐㟁泊漁燈風颭碎白蘋逺散濃香靈娥鼓瑟韻清商朱絃凄切雲散碧天長牛希濟十一首臨江仙峭碧参差十二峯冷烟寒樹重重瑶姬宫殿是仙蹤金罏珠帳香靄晝偏濃一自楚王驚夣㫁人間無路相逄至今雲雨帶愁容月斜江上征棹動晨鍾其二謝家仙觀寄雲岑巖蘿拂地成隂洞房不閉白雲深當時丹竈一粒化黄金石壁霞衣猶半挂松風長似鳴琴時聞唳鶴𧺫前林十洲高㑹何䖏許相㝷其三渭闕宫城秦樹凋玉樓獨上無憀含情不語自吹簫調清和恨天路逐風飄何事乗龍人忽降似知深意相招三清携手路非遥世間屏障彩筆画嬌嬈其四江遶黄陵春廟閑嬌鶯獨語關關滿庭重叠綠苔斑隂雲無事四散自歸山簫鼓聲稀香燼冷月娥歛盡灣環風流皆道勝人間湏知狂客判死為紅顔其五素洛春光㶑灔平千重媚臉𥘉生凌波羅襪勢䡖䡖烟籠日照珠翠半分明風引寳衣疑欲舞鸞廻鳳翥堪驚也知心許恐無成陳王辭賦千載有聲名其六桺帶揺風漢水濵平蕪両岸争匀鴛鴦對浴浪㾗新㺯珠逰女㣲咲自含春輕歩暗移蟬鬢動羅裙風惹䡖塵水精宫殿豈無因空勞纎手解佩贈情人其七洞庭波浪颭睛天君山一點凝烟此中真境属神仙玉樓珠殿相映月輪邊萬里平湖秋色冷星辰垂影参然橘林霜重更紅鮮羅浮山下有路暗相連酒泉子枕轉簟凉清逺暁鍾殘夣月光斜簾影動舊鑪香梦中說盡相思事纎手勻㕠淚去年書今日意断離腸生查子春山烟欲收天澹稀星小殘月臉邊明别淚臨清暁語巳多情未了廻首猶重道記得緑羅裙䖏䖏憐芳艸中興樂池塘暖碧浸晴暉濛濛栁絮䡖飛紅蕋凋来醉梦還稀春雲空有雁歸珠簾垂東風寂寞恨郎抛擲淚濕羅衣謁金門秋已暮重叠関山岐路嘶馬揺鞭何䖏去曉禽霜滿樹梦断禁城鍾鼓淚滴枕檀無數一點凝紅和薄霧翠娥愁不語花間集卷六
